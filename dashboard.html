lford progeria syndrome alters the endothelial genetic response to laminar shear stress.", "authors": "Kennedy Crystal C, Carter Jonathan L, Truskey George A", "journal": "Frontiers in physiology", "pub_date": "2025", "abstract": "Hutchinson-Gilford Progeria Syndrome (HGPS) is a fatal, accelerated-aging disease caused by a mutation in the nuclear envelope protein Lamin A. The resulting mutant protein, progerin, accumulates on the nuclear envelope, causing nuclear blebbing, altered gene expression, and other cellular defects. The primary pathology of HGPS is atherosclerosis, leading to stroke or heart attack. Given that atherosclerosis generally begins with endothelial dysfunction, we examined whether the HGPS endothelium has an altered genetic response to shear stress, contributing to atherogenesis. We exposed HGPS and healthy iPSC-derived endothelial cells (viECs) to steady laminar shear stress at 12 dyn/cm Elongation after flow is impaired in HGPS viECs compared with healthy viECs. DE analysis showed fewer significant DE genes and a lower magnitude of gene expression change after flow in HGPS compared with healthy viECs. GSEA identified differences in the gene sets altered by flow-induced DE, including Cholesterol Homeostasis, which was overrepresented in HGPS viECs. LGALS3, encoding the atherosclerosis marker galectin-3, was a main driver of this overrepresentation. RT-PCR confirmed LGALS3 is robustly upregulated in HGPS viECs compared with healthy viECs after flow. Treatment with an adenine base editor correcting the HGPS mutation restored LGALS3 expression to healthy levels. These observations indicate that HGPS ECs have an aberrant molecular response to atheroprotective shear stress, including impaired elongation and upregulation of the pro-inflammatory gene LGALS3, which contributes to atherogenesis in HGPS patients.", "url": "https://pubmed.ncbi.nlm.nih.gov/41815328/", "fetched_at": "2026-04-02T17:11:28.539591"}, {"id": "41357091", "title": "Severe cardiac valvular calcification in two Chinese brothers with mandibuloacral dysplasia type A: a case report.", "authors": "Guo Yi, Zhang Xinyi, Meng Yanfei, Guo Qiuzhe, Wang Xiaoqi et al.", "journal": "Frontiers in cardiovascular medicine", "pub_date": "2025", "abstract": "Mandibuloacral dysplasia type A (MADA) is a rare progeroid syndrome associated with mutations in the Lamin A/C (LMNA) gene, primarily affecting skeletal, cutaneous, and adipose tissues. While certain LMNA gene mutations are known to cause cardiomyopathy and conduction system disease, severe early-onset calcific valvular heart disease is not conventionally considered a typical feature of MADA. This report describes two brothers from a consanguineous Han Chinese family who presented with classical MADA phenotypes alongside severe, early-onset cardiac valvular calcification. Genetic investigation revealed that both affected brothers carried a homozygous missense mutation, c.785A > G (p.Glu262Gly), in the LMNA gene. The elder brother, aged 41, successfully underwent transcatheter aortic valve implantation (TAVI) due to severe aortic valve stenosis. This finding represents the first association, to our knowledge, between the homozygous LMNA c.785A > G (p.Glu262Gly) mutation and significant severe early-onset cardiac valvular calcification manifesting as a prominent feature within the MADA phenotype, thus expanding the clinical spectrum associated with MADA and this specific LMNA variant. This case highlights a potentially underrecognized cardiovascular manifestation in MADA patients and underscores the importance of comprehensive cardiac assessment in affected individuals, particularly those from consanguineous families.", "url": "https://pubmed.ncbi.nlm.nih.gov/41357091/", "fetched_at": "2026-04-02T17:11:28.540453"}], "trials": [{"nct_id": "NCT05394506", "title": "Modifying Factors in Striated Muscle Laminopathies", "status": "RECRUITING", "phase": "NA", "conditions": "Laminopathies, Emery Dreifuss Muscular Dys // ── Stats ─────────────────────────────────────────────────────────────────
document.getElementById("ts").textContent = DATA.stats.last_updated;
document.getElementById("stat-pubs").textContent = DATA.stats.total_pubs;
document.getElementById("stat-trials").textContent = DATA.stats.total_trials;
document.getElementById("stat-recruiting").textContent = DATA.stats.recruiting;
document.getElementById("stat-news").textContent = DATA.stats.total_news;

// ── Tabs ──────────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById("panel-" + name).classList.add("active");
  btn.classList.add("active");
}

// ── Publications ──────────────────────────────────────────────────────────
let pubFilter = "";
function filterPubs() {
  pubFilter = document.getElementById("search-pubs").value.toLowerCase();
  renderPubs();
}

function renderPubs() {
  const filtered = DATA.publications.filter(p =>
    (p.title || "").toLowerCase().includes(pubFilter) ||
    (p.authors || "").toLowerCase().includes(pubFilter) ||
    (p.abstract || "").toLowerCase().includes(pubFilter) ||
    (p.journal || "").toLowerCase().includes(pubFilter)
  );
  document.getElementById("count-pubs").textContent =
    `Showing ${filtered.length} of ${DATA.publications.length} publications`;
  const el = document.getElementById("pubs-list");
  if (!filtered.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🔬</div>No results found.</div>';
    return;
  }
  el.innerHTML = filtered.map(p => `
    <div class="card">
      <div class="card-header">
        <div class="card-title"><a href="${p.url}" target="_blank">${p.title || "—"}</a></div>
        <div class="card-date">${p.pub_date || ""}</div>
      </div>
      <div class="card-meta">
        <strong>${p.journal || "—"}</strong>${p.authors ? " · " + p.authors : ""}
      </div>
      ${p.abstract ? `
        <div class="abstract" id="abs-${p.id}">${p.abstract}</div>
        <span class="toggle-abstract" onclick="toggleAbs('${p.id}', this)">▸ show abstract</span>
      ` : ""}
    </div>
  `).join("");
}

function toggleAbs(id, el) {
  const abs = document.getElementById("abs-" + id);
  abs.classList.toggle("open");
  el.textContent = abs.classList.contains("open") ? "▾ hide abstract" : "▸ show abstract";
}

// ── Trials ────────────────────────────────────────────────────────────────
let trialStatusFilter = "ALL";
let trialSearch = "";

function badgeClass(status) {
  if (!status) return "badge-other";
  const s = status.toUpperCase();
  if (s.includes("RECRUIT")) return "badge-recruiting";
  if (s.includes("ACTIVE") || s.includes("ENROLLING")) return "badge-active";
  if (s.includes("COMPLET")) return "badge-completed";
  return "badge-other";
}

function buildTrialFilters() {
  const statuses = [...new Set(DATA.trials.map(t => t.status).filter(Boolean))];
  const el = document.getElementById("trial-filters");
  el.innerHTML = `<button class="filter-btn active" onclick="setTrialFilter('ALL', this)">All</button>` +
    statuses.map(s => `<button class="filter-btn" onclick="setTrialFilter('${s}', this)">${s.replace(/_/g,' ')}</button>`).join("");
}

function setTrialFilter(status, btn) {
  trialStatusFilter = status;
  document.querySelectorAll("#trial-filters .filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderTrials();
}

function filterTrials() {
  trialSearch = document.getElementById("search-trials").value.toLowerCase();
  renderTrials();
}

function renderTrials() {
  const filtered = DATA.trials.filter(t => {
    const matchStatus = trialStatusFilter === "ALL" || t.status === trialStatusFilter;
    const matchSearch = !trialSearch ||
      (t.title || "").toLowerCase().includes(trialSearch) ||
      (t.conditions || "").toLowerCase().includes(trialSearch) ||
      (t.interventions || "").toLowerCase().includes(trialSearch);
    return matchStatus && matchSearch;
  });
  document.getElementById("count-trials").textContent =
    `Showing ${filtered.length} of ${DATA.trials.length} trials`;
  const el = document.getElementById("trials-list");
  if (!filtered.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🧪</div>No trials found.</div>';
    return;
  }
  el.innerHTML = filtered.map(t => `
    <div class="trial-card">
      <div class="trial-header">
        <div class="trial-title"><a href="${t.url}" target="_blank">${t.title || "—"}</a></div>
        <span class="badge ${badgeClass(t.status)}">${(t.status || "—").replace(/_/g," ")}</span>
      </div>
      <div class="trial-meta">
        <span><strong>${t.nct_id}</strong></span>
        ${t.phase ? `<span>Phase: <strong>${t.phase}</strong></span>` : ""}
        ${t.start_date ? `<span>Start: <strong>${t.start_date}</strong></span>` : ""}
        ${t.primary_end ? `<span>End: <strong>${t.primary_end}</strong></span>` : ""}
        ${t.locations ? `<span>📍 ${t.locations}</span>` : ""}
        ${t.interventions ? `<span>💊 ${t.interventions}</span>` : ""}
      </div>
    </div>
  `).join("");
}

// ── News ──────────────────────────────────────────────────────────────────
let newsFilter = "";
function filterNews() {
  newsFilter = document.getElementById("search-news").value.toLowerCase();
  renderNews();
}
function renderNews() {
  const filtered = DATA.news.filter(n =>
    (n.title || "").toLowerCase().includes(newsFilter) ||
    (n.source || "").toLowerCase().includes(newsFilter) ||
    (n.summary || "").toLowerCase().includes(newsFilter)
  );
  document.getElementById("count-news").textContent =
    `Showing ${filtered.length} of ${DATA.news.length} news items`;
  const el = document.getElementById("news-list");
  if (!filtered.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📰</div>No news found.</div>';
    return;
  }
  el.innerHTML = filtered.map(n => `
    <div class="card">
      <div class="card-header">
        <div class="card-title"><a href="${n.url}" target="_blank">${n.title || "—"}</a></div>
        <div class="card-date">${(n.pub_date || "").substring(0, 16)}</div>
      </div>
      <div class="card-meta"><strong>${n.source || "—"}</strong></div>
      ${n.summary ? `<div style="color:#9aa39b;font-size:12px;line-height:1.7">${n.summary}</div>` : ""}
    </div>
  `).join("");
}

// ── Init ──────────────────────────────────────────────────────────────────
renderPubs();
buildTrialFilters();
renderTrials();
renderNews();
</script>
</body>
