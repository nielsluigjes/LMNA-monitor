<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LMNA Cardiac Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f0e;
    --surface: #141817;
    --surface2: #1c201e;
    --border: #2a2e2b;
    --accent: #b8f5a0;
    --accent2: #5bc4f5;
    --accent3: #f5c45b;
    --danger: #f55b5b;
    --text: #e8ede9;
    --muted: #6b756c;
    --recruiting: #b8f5a0;
    --completed: #6b756c;
    --active: #5bc4f5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    padding: 48px 48px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 24px;
    flex-wrap: wrap;
  }
  .logo-block h1 {
    font-family: 'Fraunces', serif;
    font-size: 2.8rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .logo-block p {
    color: var(--muted);
    margin-top: 6px;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .last-updated {
    color: var(--muted);
    font-size: 11px;
    text-align: right;
  }
  .last-updated span {
    display: block;
    color: var(--accent);
    font-size: 13px;
    margin-top: 2px;
  }

  /* STATS BAR */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-bottom: 1px solid var(--border);
  }
  .stat {
    padding: 28px 40px;
    border-right: 1px solid var(--border);
  }
  .stat:last-child { border-right: none; }
  .stat-num {
    font-family: 'Fraunces', serif;
    font-size: 3rem;
    font-weight: 700;
    line-height: 1;
    color: var(--text);
  }
  .stat-num.green { color: var(--accent); }
  .stat-label {
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* NAV TABS */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 48px;
    gap: 0;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .tab {
    padding: 16px 24px;
    cursor: pointer;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: 'DM Mono', monospace;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* MAIN CONTENT */
  main { padding: 40px 48px; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* SEARCH */
  .search-bar {
    margin-bottom: 28px;
    position: relative;
  }
  .search-bar input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--muted); }

  /* CARDS */
  .card-grid { display: flex; flex-direction: column; gap: 2px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px 24px;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: var(--accent); }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 8px;
  }
  .card-title {
    font-family: 'Fraunces', serif;
    font-size: 1rem;
    font-weight: 300;
    color: var(--text);
    line-height: 1.4;
    flex: 1;
  }
  .card-title a { color: inherit; text-decoration: none; }
  .card-title a:hover { color: var(--accent); }
  .card-date {
    color: var(--muted);
    font-size: 11px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .card-meta {
    color: var(--muted);
    font-size: 11px;
    margin-bottom: 10px;
  }
  .card-meta strong { color: var(--accent2); }
  .abstract {
    color: #9aa39b;
    font-size: 12px;
    line-height: 1.7;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }
  .abstract.open { max-height: 400px; }
  .toggle-abstract {
    color: var(--muted);
    font-size: 10px;
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 8px;
    display: inline-block;
  }
  .toggle-abstract:hover { color: var(--accent); }

  /* BADGES */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 2px;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
    flex-shrink: 0;
  }
  .badge-recruiting { background: rgba(184,245,160,0.15); color: var(--recruiting); border: 1px solid rgba(184,245,160,0.3); }
  .badge-active { background: rgba(91,196,245,0.15); color: var(--active); border: 1px solid rgba(91,196,245,0.3); }
  .badge-completed { background: rgba(107,117,108,0.15); color: var(--completed); border: 1px solid rgba(107,117,108,0.3); }
  .badge-other { background: rgba(245,196,91,0.15); color: var(--accent3); border: 1px solid rgba(245,196,91,0.3); }

  /* TRIAL CARDS */
  .trial-grid { display: flex; flex-direction: column; gap: 2px; }
  .trial-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px 24px;
    transition: border-color 0.15s;
  }
  .trial-card:hover { border-color: var(--accent2); }
  .trial-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 10px; }
  .trial-title {
    font-family: 'Fraunces', serif;
    font-size: 1rem;
    font-weight: 300;
    line-height: 1.4;
  }
  .trial-title a { color: inherit; text-decoration: none; }
  .trial-title a:hover { color: var(--accent2); }
  .trial-meta { display: flex; flex-wrap: wrap; gap: 16px; font-size: 11px; color: var(--muted); }
  .trial-meta span strong { color: var(--text); }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 3rem; margin-bottom: 16px; }

  /* FILTER ROW */
  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(184,245,160,0.08);
  }

  /* RESULT COUNT */
  .result-count { color: var(--muted); font-size: 11px; margin-bottom: 16px; }

  @media (max-width: 768px) {
    header { padding: 24px; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .tabs { padding: 0 24px; overflow-x: auto; }
    main { padding: 24px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-block">
    <h1>LMNA Monitor</h1>
    <p>Cardiac Disease Intelligence Dashboard</p>
  </div>
  <div class="last-updated">
    last updated<span id="ts">—</span>
  </div>
</header>

<div class="stats-bar">
  <div class="stat">
    <div class="stat-num" id="stat-pubs">—</div>
    <div class="stat-label">Publications</div>
  </div>
  <div class="stat">
    <div class="stat-num green" id="stat-recruiting">—</div>
    <div class="stat-label">Recruiting Trials</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="stat-trials">—</div>
    <div class="stat-label">Total Trials</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="stat-news">—</div>
    <div class="stat-label">News Items</div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('publications', this)">Publications</button>
  <button class="tab" onclick="switchTab('trials', this)">Clinical Trials</button>
  <button class="tab" onclick="switchTab('news', this)">News</button>
</div>

<main>

<!-- PUBLICATIONS -->
<div id="panel-publications" class="panel active">
  <div class="search-bar">
    <input type="text" id="search-pubs" placeholder="Search titles, authors, abstracts..." oninput="filterPubs()">
  </div>
  <div class="result-count" id="count-pubs"></div>
  <div class="card-grid" id="pubs-list"></div>
</div>

<!-- TRIALS -->
<div id="panel-trials" class="panel">
  <div class="filter-row" id="trial-filters"></div>
  <div class="search-bar">
    <input type="text" id="search-trials" placeholder="Search trials..." oninput="filterTrials()">
  </div>
  <div class="result-count" id="count-trials"></div>
  <div class="trial-grid" id="trials-list"></div>
</div>

<!-- NEWS -->
<div id="panel-news" class="panel">
  <div class="search-bar">
    <input type="text" id="search-news" placeholder="Search news..." oninput="filterNews()">
  </div>
  <div class="result-count" id="count-news"></div>
  <div class="card-grid" id="news-list"></div>
</div>

</main>

<script>
const DATA = {"publications": [{"id": "41917128", "title": "Correction: An integrative approach to identify novel miRNA-mRNA interaction networks in LMNA-cardiomyopathy.", "authors": "Córdoba-Caballero José, Bonet Fernando, Campuzano Oscar, Sarquella-Brugada Georgia, Perez de Castro Ignacio et al.", "journal": "Scientific reports", "pub_date": "2026-Mar", "abstract": "", "url": "https://pubmed.ncbi.nlm.nih.gov/41917128/", "fetched_at": "2026-04-02T19:17:45.536905"}, {"id": "41879743", "title": "Transcatheter Tricuspid Valve Replacement in a Patient With Small Right Atrium and Multiple Device Leads.", "authors": "Bauer Matthew, Mishell Jacob M, Perdoncin Emily, Ku Ivy, Leung Gordon et al.", "journal": "JACC. Case reports", "pub_date": "2026-Mar", "abstract": "Severe tricuspid regurgitation (TR) in patients with small right atrial (RA) or right ventricular dimensions poses a significant challenge for transcatheter tricuspid valve replacement (TTVR). A 39-year-old woman with prior coronary artery bypass grafting, mitral valve replacement, and LMNA cardiomyopathy with a dual-chamber implantable cardioverter-defibrillator presented with torrential TR. She was deemed to be a poor surgical candidate, and TTVR with the EVOQUE system was aborted due to insufficient RA height. She underwent TTVR with the Laplace system. Imaging confirmed resolution of TR, and the patient had notable and sustained improvements in her functional capacity and quality of life at 6-month follow-up. This case demonstrates the feasibility of the Laplace TTVR system for treating severe TR in a patient with small RA/right ventricular size that precluded the use of currently available commercial TTVR devices. Novel TTVR systems may provide additional options for treating TR in patients with challenging anatomy.", "url": "https://pubmed.ncbi.nlm.nih.gov/41879743/", "fetched_at": "2026-04-02T19:17:45.536943"}, {"id": "41877632", "title": "A Case of Restrictive Dermopathy With Atypical Cardiac Anomalies and a Novel ZMPSTE24 Variant.", "authors": "Kındış Erdem, Varol Ömer", "journal": "American journal of medical genetics. Part A", "pub_date": "2026-Mar", "abstract": "Restrictive Dermopathy (RD, OMIM #275210) is an ultra-rare, lethal genodermatosis caused by defects in lamins and related proteins. RD is caused by biallelic pathogenic variants in ZMPSTE24, which encodes zinc metallopeptidase ZMPSTE24, an enzyme essential for processing prelamin A, the precursor of lamin A. While null variants leading to a total loss of prelamin A processing have been related to neonatally lethal RD, variants preserving residual prelamin A processing function cause an allelic disorder called Mandibuloacral Dysplasia Type B (MAD-B). RD is characterized by taut translucent skin, visible superficial vessels, joint contractures, and dysmorphic features, with death usually occurring within the first month of life. Cardiac anomalies, including ASD and PDA, have been reported in a few patients, most of whom were not genetically confirmed, and transposition of the great arteries (TGA) has been described only once, also without molecular confirmation. We report a patient with restrictive dermatopathy (RD) presenting with double outlet right ventricle (DORV) and pulmonary valve atresia which have not been previously reported in association with RD. Exome Sequencing (ES) was performed, revealing a novel homozygous splice-site variant in ZMPSTE24 (c.1203 + 1G>T). Segregation analysis was performed in the mother and two siblings. To our knowledge, DORV has not previously been reported in an RD patient. This case expands the genotypic spectrum of RD and suggests a possible link with complex cardiac malformations.", "url": "https://pubmed.ncbi.nlm.nih.gov/41877632/", "fetched_at": "2026-04-02T19:17:45.536980"}, {"id": "41864485", "title": "The lamin A/C-P4HB interaction axis regulates endoplasmic reticulum stress and apoptosis in myocardial ischemia-reperfusion injury via a calreticulin-associated mechanism.", "authors": "Zhou Jiahui, Li Xinzhong, Li Na, Wang Min, Sun Guibo et al.", "journal": "Cellular signalling", "pub_date": "2026-Mar", "abstract": "Endoplasmic reticulum stress (ERS) and apoptosis are hallmark pathological features of myocardial ischemia-reperfusion injury (MIRI). Lamin A/C, a nuclear lamina protein associated with cardiac disorders, has been implicated in ERS and apoptosis regulation, yet its role in MIRI remains elusive. Meanwhile, P4HB, an ERS-associated chaperone, may interact with lamin A/C to modulate MIRI progression. We hypothesized that lamin A/C interacts with P4HB to modulate MIRI progression. We assessed the distribution of P4HB and lamin A/C in MIRI SD rat hearts and oxygen-glucose deprivation/reoxygenation (OGD/R)-treated primary neonatal rat cardiomyocytes (PNRCMs). By knocking down lamin A/C expression, we examined the impact of lamin A/C on P4HB distribution, ERS and apoptosis induced by OGD/R modeling. STRING network analysis and protein-protein docking were employed to predict the structural basis of lamin A/C/P4HB interaction. Our results demonstrated OGD/R treatment triggered P4HB nuclear envelope translocation, ERS activation, and apoptosis in PNRCMs, while those effects were attenuated by lamin A/C knockdown. The physical interaction between lamin A/C and P4HB in cardiac tissue was observed under both normal and MIRI conditions. The P4HB-lamin A/C interaction may be dynamically modulated by calreticulin. Collectively, our findings propose that lamin A/C regulates P4HB to mitigate OGD/R-induced ERS and apoptosis, potentially through a calreticulin-mediated dynamic mechanism.", "url": "https://pubmed.ncbi.nlm.nih.gov/41864485/", "fetched_at": "2026-04-02T19:17:45.537013"}, {"id": "41841259", "title": "Simtuzumab Attenuates Loxl2-Mediated Extracellular Matrix Remodeling and Preserves Cardiac Function in ", "authors": "Kervella Marie, Behrens Charlotta S, Peccate Cécile, Guesmia Zoheir, Grandi Fiorella et al.", "journal": "Circulation. Heart failure", "pub_date": "2026-Mar", "abstract": "Dilated cardiomyopathy caused by  Here, we employed human induced pluripotent stem cells (hiPSCs) derived from a patient carrying a  We demonstrated that  Taken together, our findings underscore the crucial role of Loxl2 as a therapeutic target and suggest that its inhibition could be a promising strategy to preserve cardiac function in ", "url": "https://pubmed.ncbi.nlm.nih.gov/41841259/", "fetched_at": "2026-04-02T19:17:45.537142"}, {"id": "41830141", "title": "LMNA-p.Arg78Trp and MYH6-p.Val893Met Mutations Associated with Left Ventricular Noncompaction.", "authors": "Zhang Jing, Bu Xiang, Jiang Xin", "journal": "Combinatorial chemistry & high throughput screening", "pub_date": "2026-Mar", "abstract": "Left ventricular noncompaction (LVNC), an uncommon myocardial disorder, is pathologically defined by the presence of excessive trabecular meshwork and deep intertrabecular recesses within the ventricular chamber. Despite recognized genetic heterogeneity underlying LVNC pathogenesis, the molecular determinants remain incompletely elucidated. We recruited a multigenerational Chinese LVNC pedigree and systematically collected clinical data, comprehensive family histories, and peripheral blood samples from the proband and relatives for genetic investigation. The proband, diagnosed with LVNC by cardiac magnetic resonance, presented with classical morphological features of the disease and ultimately succumbed to sudden cardiac death. Next-generation sequencing identified compound heterozygous missense variants in the proband: LMNA(NM_001257374.1) c.232C>T (p.Arg78Trp) and MYH6(NM_002471.3) c.2677G>A (p.Val893Met). Segregation analysis of two asymptomatic younger family members - diagnosed with LVNC via cardiac magnetic resonance despite lacking obvious clinical symptoms - revealed heterozygosity for either LMNA c.232C>T (p.Arg78Trp) or the MYH6 c.2677G>A (p.Val893Met). Notably, mutation-negative relatives displayed neither clinical manifestations nor echocardiographic evidence of LVNC. These novel pathogenic variants have established the association between genotype and phenotype in familial LVNC, providing critical biomarkers for clinical genetic screening. Our findings have expanded the range of gene mutations associated with LVNC and further enhanced the understanding of the phenotypic characteristics of these mutations. Integrated genetic and cardiac magnetic resonance imaging analyses demonstrated that LMNA c.232C>T (p.Arg78Trp) and/or MYH6 c.2677G>A (p.Val893Met) variants were associated with LVNC.", "url": "https://pubmed.ncbi.nlm.nih.gov/41830141/", "fetched_at": "2026-04-02T19:17:45.537175"}, {"id": "41790128", "title": "Laminopathies: natural history and risk prediction of heart failure.", "authors": "Charron Philippe, Proukhnitzky Julie, Ben Yaou Rabah, Richard Pascale, Dembélé Mohamed et al.", "journal": "European heart journal", "pub_date": "2026-Mar", "abstract": "Patients with LMNA gene variants are at high risk for dilated cardiomyopathy and heart failure (HF), but no prediction model for severe HF events exists. This study aimed to describe the incidence of severe HF events and develop a prediction model in a large cohort of patients with adult-onset laminopathies. From a population of 660 patients enrolled in the French LMNA nationwide registry, 470 adults were included in the derivation cohort. An independent international validation cohort included 245 additional patients. Baseline characteristics at genetic testing were assessed and the cumulative incidence of the primary endpoint HF-major adverse cardiac events (HF-MACE) was calculated, defined as HF hospitalization, HF-related death, mechanical circulatory support, or heart transplantation. Predictors of HF-MACE were studied after excluding patients with left ventricular ejection fraction (LVEF) <30% at baseline using a Fine-Gray competing risk model, adjusted hazard ratio (aHR) with 95% confidence interval (CI), and Harrell's concordance (C-) index. A secondary composite endpoint, without hospitalization, was also studied. Among 470 patients of the derivation cohort, HF-MACE occurred in 65 over a median follow-up of 7.1 years (interquartile range: 3.4-12.1). Four independent predictors of HF-MACE were identified: male sex (aHR 1.86; 95% CI 1.060-3.290), LVEF <50% (aHR 2.18; 95% CI 1.080-4.400), missense variants in head and rod domains (aHR 2.91; 95% CI 1.110-7.630), and complete left bundle branch block (aHR 2.99; 95% CI 1.400-6.400). The C-index of the model was 0.750 (95% CI 0.720-0.780) in the derivation cohort and 0.758 (95% CI 0.720-0.800) in the validation cohort. The 5-year cumulative incidence of HF-MACE was 1.5% (95% CI 0.6-3.6), 5.0% (95% CI 1.8-8.2), and 22.0% (95% CI 15.6-28.4) among patients with 0, 1, and ≥2 risk factors, respectively. In patients with LVEF <30% at baseline, the 1-year incidence of HF-MACE was 50%, and those patients were excluded fro", "url": "https://pubmed.ncbi.nlm.nih.gov/41790128/", "fetched_at": "2026-04-02T19:17:45.537383"}, {"id": "41779407", "title": "Location of LMNA Variants and Clinical Outcomes in Cardiomyopathy.", "authors": "Castrichini Matteo, Ackerman Michael J, Giudicessi John R", "journal": "JAMA cardiology", "pub_date": "2026-Mar", "abstract": "", "url": "https://pubmed.ncbi.nlm.nih.gov/41779407/", "fetched_at": "2026-04-02T19:17:45.537424"}, {"id": "41779390", "title": "Location of LMNA Variants and Clinical Outcomes in Cardiomyopathy-Reply.", "authors": "Bhaskaran Ashwin, Wahbi Karim, Lakdawala Neal K", "journal": "JAMA cardiology", "pub_date": "2026-Mar", "abstract": "", "url": "https://pubmed.ncbi.nlm.nih.gov/41779390/", "fetched_at": "2026-04-02T19:17:45.537449"}, {"id": "41738421", "title": "[Non-dilated left ventricular cardiomyopathy: beyond morphology, towards diagnostic precision].", "authors": "Parisi Vanda, Ditaranto Raffaello, Pasquale Ferdinando, Graziosi Maddalena, Schiavo Maria Alessandra et al.", "journal": "Giornale italiano di cardiologia (2006)", "pub_date": "2026-Mar", "abstract": "The introduction of non-dilated left ventricular cardiomyopathy (NDLVC) represents one of the key highlights of the 2023 European Society of Cardiology guidelines on cardiomyopathies. NDLVC is defined by the presence of left ventricular systolic dysfunction in the absence of ventricular dilation and/or non-ischemic myocardial fibrosis detectable by cardiac magnetic resonance. The clinical manifestation may be arrhythmogenic, with a risk of life-threatening ventricular arrhythmias even in patients with preserved ejection fraction. The phenotypic heterogeneity and variability in clinical expression reflect the complex interplay between genetic predisposition (involving variants in genes such as FLNC, DSP, and LMNA) and environmental, epigenetic, or inflammatory factors. A synergistic approach combining comprehensive clinical and family assessment, electrocardiographic and echocardiographic findings, advanced imaging, and genetic testing enables more accurate phenotypic characterization, definitive diagnosis, and consequently, tailored therapeutic strategies.", "url": "https://pubmed.ncbi.nlm.nih.gov/41738421/", "fetched_at": "2026-04-02T19:17:45.537560"}, {"id": "41690201", "title": "Generation of induced pluripotent stem cell lines from patients with Emery-Dreifuss muscular dystrophy.", "authors": "Chorsi Mey-Sam, Mui Byron J W H, Tan Renke, Fernandez Haley M, Xu Lingyun et al.", "journal": "Stem cell research", "pub_date": "2026-Mar", "abstract": "Emery-Dreifuss muscular dystrophy (EDMD) stems from pathogenic variants in LMNA. We generated two patient-specific iPSC lines from peripheral blood: SCVIi145-A carrying LMNA c.241T > C (p.Tyr81His) and SCVIi146-A carrying LMNA c.357-2A > G. Non-integrating Sendai reprogramming produced stable colonies that expressed undifferentiated human induced pluripotent stem cell (iPSC) state markers, cleared vector RNA by passage 16, and showed normal copy-number profiles by low-pass whole-genome sequencing (LP-WGS). Both lines matched donor STR profiles and formed ectoderm, mesoderm, and endoderm in directed differentiation. These lines enable studies of lamin-associated nuclear defects and support cardiac and skeletal muscle disease modeling.", "url": "https://pubmed.ncbi.nlm.nih.gov/41690201/", "fetched_at": "2026-04-02T19:17:45.537730"}, {"id": "41580472", "title": "An integrative approach to identify novel miRNA-mRNA interaction networks in LMNA-cardiomyopathy.", "authors": "Córdoba-Caballero José, Bonet Fernando, Campuzano Oscar, Sarquella-Brugada Georgia, Perez de Castro Ignacio et al.", "journal": "Scientific reports", "pub_date": "2026-Jan", "abstract": "Dilated cardiomyopathy caused by variants in the LMNA gene leads to malignant arrhythmogenic events, faster phenotype progression and high risk of sudden cardiac death. The pathophysiological mechanisms triggering disease progression remains poorly understood. We investigated the mRNA and miRNA transcriptome in the myocardial tissue of 50-week-old LMNA", "url": "https://pubmed.ncbi.nlm.nih.gov/41580472/", "fetched_at": "2026-04-02T19:17:45.538095"}, {"id": "41574032", "title": "Pathological classification of non-ischaemic dilated cardiomyopathy based on deep learning.", "authors": "Jia Hao, Wang Yifan, Lv Zhimin, Zhao Yiqi, Zhang Ningning et al.", "journal": "European heart journal. Digital health", "pub_date": "2026-Jan", "abstract": "Non-ischaemic dilated cardiomyopathy (NIDCM) is a major cause of heart failure (HF) and heart transplantation (HTx), characterized by heterogeneity in aetiology, clinical phenotype, and disease progression. Nevertheless, precision medicine-based diagnostics and treatment strategies for NIDCM remain lacking. This proof-of-concept study aimed to stratify NIDCM patients by pathological features and identify those at high-risk for malignant arrhythmia (MA) and rapid progression to end-stage HF. 293 NIDCM-HTx patients were included in this study. A total of 3516 heart tissue slides from six representative sites of each patient were analyzed using deep learning-based computational pathology (DL-CPath) and unsupervised clustering to identify pathological subgroups (PGs): PGA, PGB, and PGC. PGA was characterized by interstitial fibrosis, cardiomyocyte vacuolization, microvascular intimal hyperplasia, and myocyte disarray, and had the highest rates of MA ( DL-based pathological classification effectively extracted clinically-meaningful imaging features and enabled the identification of high-risk NIDCM subgroup. Each PG exhibited unique histopathological and clinical characteristics, highlighting distinct phenotypes and risk profiles.", "url": "https://pubmed.ncbi.nlm.nih.gov/41574032/", "fetched_at": "2026-04-02T19:17:45.538139"}, {"id": "41548716", "title": "Role of Cardiovascular Magnetic Resonance in Diagnosis and Management of Muscular Dystrophies.", "authors": "Russo Vincenzo, Hudelo Julien, Marcel Michal, Florence Jeremy, Soulat Gilles et al.", "journal": "Journal of cardiovascular magnetic resonance : official journal of the Society for Cardiovascular Magnetic Resonance", "pub_date": "2026-Jan", "abstract": "Muscular dystrophies encompass a heterogeneous spectrum of inherited myopathies characterized by progressive skeletal muscle degeneration frequently accompanied by life-threatening cardiac involvement. Cardiovascular magnetic resonance (CMR) has become the reference non-invasive imaging modality for the detection, characterization, and longitudinal monitoring of cardiomyopathy involvement across this group of disorders. This state-of-the-art review synthesizes contemporary evidence on the diagnostic and prognostic value of CMR in the most prevalent muscular dystrophies, including Myotonic dystrophy, Duchenne and Becker muscular dystrophies, Emery-Dreifuss muscular dystrophy, laminopathies, facioscapulohumeral muscular dystrophy, and mitochondrial myopathies. CMR uniquely enables high-resolution assessment of ventricular volumes and function, tissue characterization through late gadolinium enhancement (LGE) and parametric mapping (native T1, T2, extracellular volume fraction), and quantitative strain imaging. These techniques uncover subclinical myocardial involvement years before overt dysfunction occurs, providing a robust substrate for early therapeutic intervention. Disease-specific CMR signatures, such as inferolateral subepicardial fibrosis in dystrophinopathies or mid-wall septal enhancement in laminopathies, allow for refined etiological diagnosis and targeted risk stratification. LGE burden and distribution are independently associated with ventricular arrhythmias and adverse cardiac events, transcending the limitations of traditional criteria based on left ventricular ejection fraction for implantable cardioverter-defibrillator selection. Emerging evidence further supports the integration of CMR biomarkers into genotype-guided management strategies and prospective therapeutic trials.", "url": "https://pubmed.ncbi.nlm.nih.gov/41548716/", "fetched_at": "2026-04-02T19:17:45.538169"}, {"id": "41542396", "title": "The Epigenetic Regulator Histone Demethylase KDM5A is Activated and Pathogenic in a Mouse Model of Heart Failure.", "authors": "Deogharia Manisha, Reddy Chitra Lekha, Chaudhuri Ritapa, Chirasani Manogna Sai, Jain Abhinav K et al.", "journal": "bioRxiv : the preprint server for biology", "pub_date": "2026-Jan", "abstract": "Heart failure is a complex disease characterized by the dysregulation of gene expression that culminates in cardiac dysfunction. Epigenetic regulators play a critical role in control of transcription and are increasingly implicated in the pathogenesis of heart failure. We recently showed that the histone demethylase KDM5A is reactivated in the heart of human patients and mouse models of heart failure. However, its pathogenic role in heart failure remained unknown. Utilizing a mouse model of heart failure caused by the deletion of the ", "url": "https://pubmed.ncbi.nlm.nih.gov/41542396/", "fetched_at": "2026-04-02T19:17:45.538201"}, {"id": "41500486", "title": "Cardiovascular prognostic impact of missense vs nonmissense lamin A/C variants: A systematic review and meta-analysis.", "authors": "Guaricci Andrea Igoren, Faggiano Andrea, Wahbi Karim, Barriales-Villa Roberto, Carella Maria Cristina et al.", "journal": "Heart rhythm", "pub_date": "2026-Jan", "abstract": "Variants in the LMNA gene, responsible for laminopathies, are associated with severe cardiovascular outcomes, including arrhythmias and heart failure (HF). However, the differential prognostic impact of missense vs nonmissense variants remains unclear. The primary end point of this systematic review and meta-analysis was to compare the cardiovascular outcome defined as combined malignant ventricular arrhythmias (MVAs) and HF among patients with missense vs nonmissense variants in the LMNA gene. Secondary outcomes included a comparison of MVAs and HF-related events analyzed separately. A systematic search of PubMed, Ovid MEDLINE, and Cochrane Library was conducted according to the Preferred Reporting Items for Systematic Reviews and Meta-Analyses guidelines. Meta-analyses were performed using fixed or random effects models, depending on heterogeneity. PROSPERO identifier: CRD42024584721. 12 studies comprising 1818 participants were included. Of these, 969 had missense variants, and 849 had nonmissense variants. The nonmissense group showed a significantly higher rate of cardiovascular events (30.5% vs 21.3%; odds ratio [OR] 2.22; P < .001). MVAs were more frequent in nonmissense carriers (25.5% vs 18.9%; OR 2.37; P < .001). Although limited by the small number of studies (n = 5) and single-study bias, the incidence of HF-related severe events seemed similar between the groups (18.2% vs 23.9%; OR 0.956; P = .801). Nonmissense LMNA variants are associated with worse cardiovascular outcomes, particularly arrhythmic events, whereas HF-related events seem comparable between nonmissense and missense variants.", "url": "https://pubmed.ncbi.nlm.nih.gov/41500486/", "fetched_at": "2026-04-02T19:17:45.538234"}, {"id": "41265991", "title": "Genetic Risk Stratification in Arrhythmogenic Left Ventricular Cardiomyopathy.", "authors": "Desai Yaanik B, Parikh Victoria N", "journal": "Heart failure clinics", "pub_date": "2026-Jan", "abstract": "Arrhythmogenic left ventricular cardiomyopathy is characterized by early malignant ventricular arrhythmia associated with varying degrees and times of onset of left ventricular dysfunction. Variants in numerous genes have been associated with this phenotype. Here, the authors review the literature on recent cohort studies of patients with variants in desmoplakin, lamin A/C, filamin-C, phospholamban, RBM20, TMEM43, and selected channelopathy genes also associated with structural disease. Unlike traditional sudden cardiac death risk assessment in nonischemic cardiomyopathy, left ventricular systolic function is an insensitive predictor of risk in patients with these genetic diagnoses.", "url": "https://pubmed.ncbi.nlm.nih.gov/41265991/", "fetched_at": "2026-04-02T19:17:45.538701"}, {"id": "41265985", "title": "Epigenetic Regulation in Dilated Cardiomyopathy.", "authors": "Liu Chia-Feng, Leon Steven, Tang W H Wilson", "journal": "Heart failure clinics", "pub_date": "2026-Jan", "abstract": "Dilated cardiomyopathy (DCM) is a nonischemic heart muscle disease characterized by impaired contractility, cardiac dilation, and heart failure, with both genetic and nongenetic causes. Emerging evidence highlights epigenetic mechanisms, including deoxyribonucleic acid methylation, histone modifications, chromatin remodeling, and noncoding RNAs, as critical regulators of gene expression in DCM pathogenesis. This article explores familial DCM linked to pathogenic variants in genes like lamin A/C and titin, as well as nongenetic forms such as diabetic and autoimmune DCM. By summarizing recent discoveries, it highlights the epigenetic factors in bridging genetic and environmental influences, offering potential biomarkers and therapeutic targets for improved DCM management.", "url": "https://pubmed.ncbi.nlm.nih.gov/41265985/", "fetched_at": "2026-04-02T19:17:45.538726"}, {"id": "41752033", "title": "Molecular Insights and Orthopedic Management in Muscular Dystrophies: A Comprehensive Review.", "authors": "Lejman Jan, Pytlak Michał, Danielewicz Anna, Rutz Erich, Latalski Michał et al.", "journal": "International journal of molecular sciences", "pub_date": "2026-Feb", "abstract": "Muscle degeneration is the hallmark of muscular dystrophies-genetically heterogeneous disorders traditionally approached through the lens of molecular pathogenesis or symptomatic management in isolation. Here, we present a deliberately interdisciplinary synthesis that bridges molecular genetics, clinical phenotyping, and evidence-based orthopedic decision-making to address a significant critical gap: the lack of genotype-informed, function-oriented frameworks for musculoskeletal complications. We re-evaluate disease entities-not only by their molecular etiology (e.g., DMD, LMNA, DUX4 dysregulation), but through the prism of orthopedic manifestations as diagnostic gateways and therapeutic milestones. For instance, early rigid spine in ", "url": "https://pubmed.ncbi.nlm.nih.gov/41752033/", "fetched_at": "2026-04-02T19:17:45.537501"}, {"id": "41746849", "title": "Experience on genetic testing for primary dilated cardiomyopathy in a single Austrian genetic center and the role of myocardial inflammation.", "authors": "Manzanilla Romero Héctor Hugo, Steil Anja Savina, Santner Viktoria, Von der Heidt Andreas, Verheyen Nicolas et al.", "journal": "Cardiology", "pub_date": "2026-Feb", "abstract": "Molecular genetic testing is increasingly offered to patients with dilated cardiomyopathy (DCM). The diagnosis of an inherited cardiomyopathy has major implications for medical care of patients and relatives. We report the results of a genotype-phenotype analysis of DCM investigated in Austria. 194 patients with DCM underwent genetic testing over a period of 6 years. We analyzed the clinical and genetic characteristics of 105 DCM patients who showed a genetic variant, and compared the genetic findings and outcome measures of patients with inflammation on endomyocardial biopsy and those without. In 51.4% (54/105) patients at least one likely pathogenic or pathogenic genetic variant (LP/P) was detected. 51 of 105 patients (48.6%) showed only variants of unknown significance (VUS). Most LP/P variants (34,3%) were detected in the TTN gene. Clinical characteristics of the most prevalent genetic subgroups (TTN, LMNA, MYH7, MYH6, DMD, SCN5A) were not significantly different. DCM patients with inflammation had significantly higher frequency of memory of infection, left bundle branch block, mitral valve insufficiency, but normal CK-MB levels. We added a case report where two family members initially were considered to have an inflammatory cardiomyopathy before a pathogenic variant in LMNA was found. Cardiac features of DCM were not predictive of a specific genetic subgroup. We recommend applying multigene panels extensively, since a large proportion of patients without a family history or evidence of inflammation showed a genetic predisposition for DCM. However, the large number of VUS remains a challenge.", "url": "https://pubmed.ncbi.nlm.nih.gov/41746849/", "fetched_at": "2026-04-02T19:17:45.537529"}, {"id": "41713209", "title": "Context-dependent features of transcriptomic landscapes in pregnant mother-neonate dyads of preeclampsia.", "authors": "Cheng Yu-Chun, Lai Yun-Ju, Lian Wei-Shiung, Tsai Ching-Chang, Cheng Hsin-Hsin et al.", "journal": "Clinical and experimental pediatrics", "pub_date": "2026-Feb", "abstract": "Preeclampsia (PE) is a serious complication of pregnancy that affects the offspring and mothers. Those with a history of PE are at higher risk of future cardiometabolic diseases, the etiology of which remains uncertain. To investigate the transcriptomic profiles of mothers and neonates to determine whether certain genes are commonly affected after shared exposure to PE. In this observational study, pregnant motherneonate dyads with PE and healthy normotensive mothers were prospectively recruited. We used RNA sequencing and bioinformatics analysis to characterize the transcriptomic profiles of maternal blood leukocytes (MBLs), cord blood leukocytes (CBLs), and umbilical arterial and venous endothelial cells (UAECs and UVECs, respectively). These results were further validated using real-time reverse transcription polymerase chain reaction. Gene expression during the perinatal/peripartum period was context-dependent in patients with PE and involved various signaling pathways. Inflammationand immune-related signaling pathways in maternal blood and coagulation-related signaling pathways in cord blood were upregulated in the PE group compared to those in the control group. Ten differentially expressed genes were commonly affected in MBLs and CBLs. Maternal LMNA and CBL levels of MAST4 differentiated those with PE from those with normotension in a gestational- age-adjusted model. Maternal levels of ADAMTS2 and CBL levels of ADAMTS2, GABRE, and MMP8 independently determined neonatal gestational age and birth weight. CBL MMP8 levels independently determined maternal blood pressure. However, the transcriptomic profiles of endothelial cells differ from those of blood leukocytes. Heart morphogenesis-related signaling pathways in UAECs and leukocyte cell-cell adhesion-related signaling pathways in UVECs were more involved in PE. The messenger RNA levels of FAT3 and SLC25A18 in the UAECs were higher in the PE group than in the control group. Perinatal and peripartum genes in PE ", "url": "https://pubmed.ncbi.nlm.nih.gov/41713209/", "fetched_at": "2026-04-02T19:17:45.537661"}, {"id": "41688022", "title": "Attenuated lamin A-prohibitin2 interaction leads to mitochondrial dysfunction in LMNA 289 A>G-mediated dilated cardiomyopathy.", "authors": "Nath Subhradip, Prusty Debasish, Islam Sk Ramiz, Manna Soumen Kanti, Sengupta Kaushik et al.", "journal": "The Journal of biological chemistry", "pub_date": "2026-Feb", "abstract": "Lamins are critical in maintaining nuclear homeostasis, chromosome positioning, and modulating mechanotransduction. Recent studies indicated the involvement of lamin A in mitochondrial homeostasis and the regulation of superoxide. Missense mutations in LMNA are linked to a spectrum of diseases known as laminopathies, which include conditions, such as dilated cardiomyopathy (DCM), muscular dystrophy, and progeria. K97E is one such mutation, which leads to DCM with severe phenotypes. In this study, we established direct reduction of interaction between lamin A K97E and prohibitin 2. As a sequel, mitochondria exhibited reduced fusion, elevated fragmentation, and ATP deficiency. On the other hand, impaired RhoA/extracellular signal-regulated kinase/focal adhesion kinase signaling cascade disrupted filamentous actin assembly, thereby promoting actin-mitochondria association, further facilitating mitochondrial fission. This feedback loop led to mitochondrial depolarization, and global metabolic derangement, in particular, reduced glycolytic capacity and incomplete fatty acid oxidation accompanied by elevated superoxide levels. In cardiomyocytes, such dysfunction may be correlated with contractile defects and arrhythmias. Thus, our findings elucidated for the first time the pivotal role of lamin A in cellular bioenergetics and mechanotransduction, offering novel insights into DCM pathophysiology, which could open newer vistas for developing targeted therapeutic strategies.", "url": "https://pubmed.ncbi.nlm.nih.gov/41688022/", "fetched_at": "2026-04-02T19:17:45.537781"}, {"id": "41667453", "title": "Telomere shortening in laminopathic dilated cardiomyopathy.", "authors": "Chang Alex C Y, Pardon Gaspard, Chang Andrew C H, Wang Chenguang, Termglinchan Vittavat et al.", "journal": "NPJ Regenerative medicine", "pub_date": "2026-Feb", "abstract": "Laminopathies are a group of rare disease due to mutations in the LMNA gene, which is crucial for nuclear integrity and cellular rigidity. Depending on the mutation, the disease manifests in striated muscles, adipose tissues, nerves, and the heart. Although many laminopathic patients exhibit accelerated aging syndromes, the connection as to why loss of LMNA drives aging remains unknown. Herein, we present evidence that cardiomyocytes from laminopathic heart sections exhibit shortened telomeres. Patient derived hiPSC-CMs we observed LMNA mutation results in myocardial enlargement and altered contractility in cardiomyocytes. Further, laminopathic murine cardiomyocytes recapitulates telomere attrition phenotype.", "url": "https://pubmed.ncbi.nlm.nih.gov/41667453/", "fetched_at": "2026-04-02T19:17:45.537827"}, {"id": "41654148", "title": "Domain-Specific Speckle-Tracking Longitudinal Strain in LMNA-Related Cardiomyopathy.", "authors": "Castrichini Matteo, Garmany Ramin, Ackerman Michael J, Pellikka Patricia A, Giudicessi John R et al.", "journal": "Journal of the American Society of Echocardiography : official publication of the American Society of Echocardiography", "pub_date": "2026-Feb", "abstract": "", "url": "https://pubmed.ncbi.nlm.nih.gov/41654148/", "fetched_at": "2026-04-02T19:17:45.537854"}, {"id": "41632327", "title": "Association of radiotherapy with atrial fibrillation-related gene expression in breast cancer patients: a study based on the TCGA-BRCA database.", "authors": "Lan Huai, Zhang Chao, Huang Xinyi, Sun Boxuan, Zhu Li et al.", "journal": "Discover oncology", "pub_date": "2026-Feb", "abstract": "Radiotherapy (RT) for breast cancer may increase atrial fibrillation (AF) risk. This study explored the association between RT and expression of AF-related genes in breast tumor tissues. A total of 1094 breast cancer patients (RT group: 1020; non-RT group: 74) were included based on inclusion criteria. Clinical data and RNA-seq profiles (TPM) were retrieved. Six AF-related genes (MYBPC3, LMNA, PKP2, FAM189A2, KDM5B, MYL4) were analyzed. Gene expression was compared using Wilcoxon rank-sum test after Log2(TPM + 1) transformation. Subgroup analyses were conducted by AJCC stage (I–III), laterality (left/right), age (< 65/≥65 years), clinical subtype (Luminal, HER2-positive, Triple-negative), and PAM50 molecular subtype (Basal, Her2, LumA, LumB, Normal). Multivariate linear regression was applied to evaluate RT’s independent effect on gene expression. In tumor tissues, expression levels of MYBPC3, LMNA, and MYL4 were significantly higher in the RT group compared to the non-RT group.Subgroup analysis revealed higher MYBPC3 expression in the RT group specifically in Stage III tumors, but lower expression in left-sided tumors and in patients < 65 years old. LMNA expression was higher in the RT group in Stage III tumors. MYL4 expression was higher in the RT group in Stage II tumors, in both left and right-sided tumors, and in both age groups (< 65 and ≥ 65 years). No significant differences were found across clinical or molecular subtypes for any gene.Multivariate regression confirmed RT as an independent predictor of increased MYL4 expression (β = 0.204), but not for MYBPC3 or LMNA expression. Sensitivity analysis in the 45–65 age subgroup supports the above findings. Based on tumor tissue analysis, breast cancer radiotherapy is associated with altered expression of AF-related genes (particularly MYL4) in tumor tissues, suggesting a potential molecular link worthy of further exploration in relation to atrial fibrillation. These findings warrant future validation in cardiac", "url": "https://pubmed.ncbi.nlm.nih.gov/41632327/", "fetched_at": "2026-04-02T19:17:45.537898"}, {"id": "41627535", "title": "Metabolic Dysregulation in Laminopathies: Implications for Heart Failure and Cardiac Health.", "authors": "Torfs T, Veltrop R J A, Lezzoche G, Heymans S R B, Verdonschot J A J et al.", "journal": "Current heart failure reports", "pub_date": "2026-Feb", "abstract": "Laminopathies are a diverse group of genetic disorders caused by variants in nuclear lamina proteins, with heart failure being a major cause of morbidity and mortality in patients. By shifting the perspective from distinct clinical phenotypes to a continuous spectrum of metabolic observations in laminopathies, this review aims to elucidate the molecular mechanisms underlying metabolic dysregulation in laminopathies and their impact on cardiac health. Emerging evidence links A-type lamins to cellular metabolism, with systemic metabolic changes such as lipodystrophy, insulin resistance and hypertriglyceridemia often detected in laminopathy patients before cardiac symptoms onset. At the molecular level, LMNA variants disrupt the regulation of genes involved in fatty acid, oxidation glucose utilization, and mitochondrial function. These disturbances increase cardiomyocyte susceptibility, promoting fibrosis and apoptosis. Metabolic dysregulation is a recurring observation across the laminopathy spectrum. Targeting metabolic pathways shows preclinical promise for improving cardiac outcomes in patients.", "url": "https://pubmed.ncbi.nlm.nih.gov/41627535/", "fetched_at": "2026-04-02T19:17:45.537983"}, {"id": "41384904", "title": "Autosomal-Recessive LMNA Dilated Cardiomyopathy.", "authors": "Sterner Rosalie M, Coon Lea M, Black John L, Moyer Ann M, Maleszewski Joseph J et al.", "journal": "JACC. Case reports", "pub_date": "2026-Feb", "abstract": "Variants in the LMNA gene (which encodes intermediate filaments lamin A and lamin C) result in a variety of phenotypes that include overlapping features, such as progeroid syndromes, muscular dystrophies, peripheral neuropathies, lipodystrophies, and cardiac disease (including dilated cardiomyopathy and conduction disorders). We describe a case of primary biventricular, nonischemic dilated cardiomyopathy and no myopathic symptoms with a homozygous LMNA c.991C>T (p.Arg331Trp) likely pathogenic variant. The patient, a 39-year-old woman, presented with symptoms of dilated cardiomyopathy and has had ablation, medical management, and a pacemaker placed because of arrythmias. Most LMNA disorders are inherited in an autosomal-dominant fashion, with rare autosomal-recessive laminopathies mainly involving neuromuscular phenotypes. Laminopathies that have involved cardiomyopathies have all been reported to be autosomal dominant. To our knowledge, this is the first reported case of an autosomal-recessive laminopathy with primary dilated cardiomyopathy.", "url": "https://pubmed.ncbi.nlm.nih.gov/41384904/", "fetched_at": "2026-04-02T19:17:45.538266"}, {"id": "41379058", "title": "Truncating Titin and Lamin A/C Variants in Anthracycline-Induced Cardiomyopathy.", "authors": "Advani Pooja P, McPherson Alyssa D, Reddy Joseph S, Schneider Jay W, Baheti Saurabh et al.", "journal": "JACC. Advances", "pub_date": "2026-Feb", "abstract": "Anthracycline chemotherapy-related cardiomyopathy (CCM) is a serious adverse event that can occur several years after completion of therapy. Demographic and clinical risk factors have failed to predict which patients will experience CCM. Genetic variants may account for a significant proportion of interindividual variation and CCM. This study aimed to identify genetic variants in the known idiopathic cardiomyopathy genes that predispose patients to CCM. We developed a cardiotoxicity registry. Patients were (and continue to be) enrolled and consented for chart review and DNA sequencing. We sequenced whole exomes of the first 136 patients (anthracycline, n = 55; anti-HER2 [no anthracycline], n = 71; other chemotherapy, n = 10), primarily focusing on titin (TTN) truncating variants, known to be present in ∼25% of patients with primary dilated cardiomyopathy, and previously reported in 7.5% of patients with CCM, followed by exploration of rare nonsynonymous variants in 62 established genes for idiopathic cardiomyopathy. Eighteen of 55 patients treated with anthracycline experienced CCM. TTN truncating variants were identified in 2 of 18 (11%) CCM patients and absent in 37 patients who did not experience CCM. We identified a pathogenic variant in lamin A/C (p.Arg190Gln) in 1/18 (5.5%) patients and the same rare (p.Glu1127Gly) variant in ryanodine receptor 2 occurred in 2/18 (11%) of patients. We observed enrichment of rare missense variants in patients with anthracycline CCM compared to anti-HER2 therapy without anthracycline CCM (P < 0.00001). Three of 18 anthracycline CCM patients carried likely pathogenic variants in the most common causative genes for idiopathic dilated cardiomyopathy, TTN, and lamin A/C. Rare nonsynonymous variants in ryanodine receptor 2 and other idiopathic cardiomyopathy genes warrant further investigation.", "url": "https://pubmed.ncbi.nlm.nih.gov/41379058/", "fetched_at": "2026-04-02T19:17:45.538304"}, {"id": "41331778", "title": "Outcomes of Ventricular Tachycardia Ablation in Cardiac Laminopathy: An Updated Systematic Review and Single-Arm Meta-Analysis.", "authors": "Castrichini Matteo, Ferreira Felix Iuri, Karlinski Vizentin Vanessa, Garmany Ramin, Huynh Trung et al.", "journal": "Journal of cardiovascular electrophysiology", "pub_date": "2026-Feb", "abstract": "Ventricular tachycardia (VT) is a life-threatening arrhythmia frequently observed in structural heart diseases, including LMNA-related cardiomyopathy, a genetic disorder associated with high risk of sudden cardiac death and progressive systolic dysfunction. While catheter ablation is an established therapeutic option for VT, its efficacy in cardiac laminopathy remains poorly defined. To synthesize available evidence on the role and outcomes of VT ablation in patients with cardiac laminopathy. A systematic review and single-arm meta-analysis was performed in accordance with PRISMA guidelines. PubMed, Embase, and Cochrane databases were searched for studies reporting VT ablation outcomes in LMNA-related cardiomyopathy. An inverse variance random-effects model was applied for meta-analysis of proportions. Seven studies (six cohorts, one abstract) comprising 62 patients (mean age 53.2 ± 9.7 years; 85% male; 88% with implantable cardioverter-defibrillator) were included. An endocardial/endo-epicardial approach was used in 93% of cases. Acute procedural success was achieved in 37% (95% CI: 14%-63%; I² = 27.4%), and 28% required multiple procedures. Over a median follow-up of 26 (9-35) months, VT recurrence occurred in 91% (95% CI: 76%-100%; I² = 37.2%). All-cause mortality was 54% (95% CI: 39%-70%; I² = 28%), predominantly from cardiac causes (51%, 95% CI: 25%-76%; I² = 53%), and 14% (95% CI: 1%-34%; I² = 42%) underwent heart transplantation. In LMNA-related cardiomyopathy, catheter ablation is associated with high VT recurrence, limited long-term success, and substantial cardiovascular mortality and transplantation rates, underscoring the importance of ICD implantation and the need for alternative strategies, including variant-specific and molecularly targeted therapies.", "url": "https://pubmed.ncbi.nlm.nih.gov/41331778/", "fetched_at": "2026-04-02T19:17:45.538384"}, {"id": "41295940", "title": "Sex Differences in Dilated Cardiomyopathy: Evidence Gaps and Future Directions.", "authors": "Stroeks Sophie L V M, Oko-Osi Shanelle, Arasu Arianna, Hirst Jane E, Tayal Upasana Paz et al.", "journal": "Journal of the American College of Cardiology", "pub_date": "2026-Feb", "abstract": "Dilated cardiomyopathy (DCM), which affects 1 in 250 people, is a leading global cause of heart failure and the most common indication for heart transplantation. Evidence suggests that DCM is more prevalent in men, but whether this reflects biological differences or underdiagnosis in women remains uncertain. This review explores the impact of sex on DCM, examining differences in epidemiology, etiology, clinical presentation, treatment response, and outcomes. Women often present with less severe cardiac phenotypes, including lower levels of fibrosis and better left ventricular function, yet the long-term prognosis of DCM in women is less clear. Through a systematic review and meta-analysis, we found that male DCM patients with variants in PLN, DSP, and LMNA had higher arrhythmic event rates compared with TTNtv and BAG3 carriers. In female patients with DCM, those with RBM20, DSP, and PLN variants faced the highest arrhythmic risk, and TTNtv carriers the lowest. PLN and LMNA variants had the highest heart failure risk in both sexes, whereas BAG3, RBM20, and TTN variants had lower heart failure rates in female compared with male carriers. These findings highlight the influence of sex and genotype on clinical outcomes. Current risk-stratification tools, such as those used for implantable cardioverter-defibrillators, may undertreat women owing to reliance on sex-neutral thresholds. We highlight the role of genetic, environmental, and reproductive factors in shaping these disparities, including the influence of pregnancy, pregnancy complications, and menopause. This review identifies key gaps in knowledge and calls for expanded representation of women in DCM studies and the development of sex-specific risk models. Addressing these gaps is essential to improving outcomes and advancing equitable personalized care for all DCM patients.", "url": "https://pubmed.ncbi.nlm.nih.gov/41295940/", "fetched_at": "2026-04-02T19:17:45.538613"}, {"id": "41919383", "title": "Twenty-Five-Year Follow-Up of the MDDC1 Family: A ", "authors": "Capovilla Teresa Maria, Iseppi Manuela, Distaso Salvatore, Gigli Marta, Dal Ferro Matteo et al.", "journal": "Circulation. Genomic and precision medicine", "pub_date": "2026-Apr", "abstract": "", "url": "https://pubmed.ncbi.nlm.nih.gov/41919383/", "fetched_at": "2026-04-02T19:17:45.536147"}, {"id": "41797063", "title": "Generation of the human induced pluripotent stem cell (hiPSC) line AUMCi015-A from a heterozygous carrier of the LMNA p.Q493X rare pathogenic variant.", "authors": "de Vries Dylan K, van den Bout Anouk, de Haan Hugoline, Kouwenberg Janneke, Tijsen Anke J et al.", "journal": "Stem cell research", "pub_date": "2026-Apr", "abstract": "Dilated cardiomyopathy (DCM) caused by rare pathogenic variants in LMNA is a severe hereditary heart disease characterized by lethal arrythmias and progressive heart failure. Here, we describe a human induced pluripotent stem cell (hiPSC) line reprogrammed by non-integrative Sendai virus from dermal fibroblasts of a female DCM patient carrying the heterozygous LMNA p.Q493X rare pathogenic variant. The obtained hiPSCs have a normal karyotype, show high expression of pluripotency markers at the mRNA and protein level, and are able to differentiate into derivatives of all three germ layers. Therefore, this newly-generated hiPSC line enables modeling of DCM caused by rare pathogenic variants in LMNA.", "url": "https://pubmed.ncbi.nlm.nih.gov/41797063/", "fetched_at": "2026-04-02T19:17:45.537309"}, {"id": "41718518", "title": "Dilated Cardiomyopathy and Later Onset Limb-Girdle Muscular Dystrophy Associated With Fukutin and LaminA/C Mutations.", "authors": "Cardona Perez Alejandra, Moenning Renee, Bodkin Cynthia, Gutmann Laurie, Helm Benjamin M et al.", "journal": "JACC. Case reports", "pub_date": "2026-Apr", "abstract": "Nonischemic dilated cardiomyopathy (DCM) can result from pathogenic variants in genes affecting myocardial structure and function. FKTN and LMNA mutations may involve both cardiac and skeletal muscle, consistent with limb-girdle muscular dystrophy (LGMD), with cardiac disease sometimes preceding neuromuscular symptoms. We report on 2 adults presenting with advanced DCM requiring heart transplantation, who were later diagnosed with LGMD. A 22-year-old woman had biallelic FKTN variants, and a 37-year-old man carried a heterozygous LMNA pathogenic variant. Both had elevated creatine kinase prior to proximal muscle weakness. Muscle biopsy and genetic testing confirmed dystrophic processes. These cases demonstrate that genetically mediated DCM may initially present as isolated cardiac disease. Early genetic testing can guide transplant planning, long-term care, and family counseling.", "url": "https://pubmed.ncbi.nlm.nih.gov/41718518/", "fetched_at": "2026-04-02T19:17:45.537590"}, {"id": "41858864", "title": "Case Report: Familial partial lipodystrophy, description of novel and ultrarare variants with distinct phenotypic spectrum.", "authors": "Magno Silvia, Pelosini Caterina, Paoli Melania, Gilio Donatella, Palladino Lavinia et al.", "journal": "Frontiers in endocrinology", "pub_date": "2026", "abstract": "Familial partial lipodystrophy (FPLD) is a rare inherited disorder characterized by selective loss of subcutaneous fat and severe metabolic complications. Eight subtypes of FPLD have been described to date, most of which are caused by variants in genes involved in adipocyte differentiation and lipid metabolism. The most common form, FPLD type 2, is caused by heterozygous variants in the ", "url": "https://pubmed.ncbi.nlm.nih.gov/41858864/", "fetched_at": "2026-04-02T19:17:45.537107"}, {"id": "41799755", "title": "LAP2 Isoform Profile in Heart Ageing and in Cardiac Cell Proliferation and Differentiation: Input From CRISPR-Cas9-mediated LAP2a Knockdown in H9C2.", "authors": "Vadrot Nathalie, Moulin Maryline, Ferreiro Ana, Richard Pascale, Buendia Brigitte et al.", "journal": "International journal of medical sciences", "pub_date": "2026", "abstract": "Haploinsufficiency of Lap2 alpha (LAP2a), a nuclear partner of Lamins A/C, has been associated with cardiac disease in rare cases, but LAP2a function remains largely unknown. To investigate the functional role of LAP2a in cardiomyocytes, we generated clones of embryonic myocardium-derived H9C2 cells in which LAP2a expression was specifically reduced through gene editing of the LAP2a gene ", "url": "https://pubmed.ncbi.nlm.nih.gov/41799755/", "fetched_at": "2026-04-02T19:17:45.537277"}, {"id": "41693767", "title": "Actigraphy-Quantified Physical Activity Measurements in Patients with Symptomatic ", "authors": "Garcia-Pavia Pablo, Cai Xuemei, Di Junrui, Li Huihua, Demanuele Charmaine et al.", "journal": "Digital biomarkers", "pub_date": "2026", "abstract": "Actigraphy-quantified physical activity (PA) allows for continuous measurements of PA that are reflective of real-world day-to-day functioning and morbidity in persons living with cardiomyopathy. This analysis reports the results of actigraphy monitoring and relates these to other clinical outcome assessments in the phase 3, multinational REALM-dilated cardiomyopathy (DCM) (NCT03439514) clinical trial in  Between 2020 and 2022, REALM-DCM randomized 37 patients with actigraphy worn on the nondominant wrist continuously to monitor daily PA. Of those, 35 participants had analyzable data for this analysis. The median duration of actigraphy monitoring for all participants was 293 days across 120 patient visits. Over 85% of the visits met a predefined threshold of wear-time compliance of 10 h of awake wear time for at least 4 days within the 2-week monitoring period prior to and after clinic visits. Kansas City Cardiomyopathy Questionnaire (KCCQ) physical limitation scores were positively associated with several actigraphy-quantified PA metrics, including moderate-to-vigorous physical activity (MVPA), moderate activity, non-sedentary behavior, total step counts, total activity counts (all 3 axes and their vector magnitude). Six-minute walk time distance was positively associated with time spent in MVPA and moderate activity, and total step counts. Patient Global Impression (PGI) Symptom Heart Failure Severity was negatively associated with non-sedentary behavior, total activity counts (vector magnitude, X- and Y-axes), and light activity. Actigraphy endpoints also distinguished between NYHA class II and class III patients. Actigraphy endpoints did not correlate with the KCCQ total score. This is the largest and most longitudinal dataset of  This study looked at how physical activity levels in patients with a specific type of heart disease, called ", "url": "https://pubmed.ncbi.nlm.nih.gov/41693767/", "fetched_at": "2026-04-02T19:17:45.537697"}, {"id": "40918212", "title": "Smartwatch bradycardia alarms leading to a diagnosis of lamin A/C cardiomyopathy: a case report.", "authors": "Rushakoff Joshua A, Flores Rosario Karen, Grover Phoenix, Wang Andrew", "journal": "European heart journal. Case reports", "pub_date": "2025-Sep", "abstract": "Genetic aetiologies of early-onset arrhythmias and cardiomyopathy (CM) are common, but timely diagnosis requires a high index of suspicion. An asymptomatic 47-year-old man presented to cardiology clinic for smartwatch low-rate alarms. His brother had exertional syncope and died in his 20s from heart failure. Transthoracic echocardiogram showed reduced left ventricular ejection fraction (35%). A Holter monitor showed third-degree atrioventricular block and frequent pauses (longest 4.9 s). He was admitted to the hospital and following a cardiac magnetic resonance imaging with late gadolinium enhancement a cardiac resynchronization therapy-defibrillator was placed. Genetic testing identified a pathogenic variant in the lamins protein A and C (LMNA) gene. Left ventricular dysfunction with or without arrhythmias should raise concern for familial CM and warrants further evaluation. Lamin A/C cardiomyopathy is the second most prevalent cause of familial dilated CM and is notable for an indolent course with conduction disturbances that frequently precede left ventricular dysfunction. Smartwatch alarms can potentially help with the early identification of patients with risk factors for familial CM before the development of overt symptoms.", "url": "https://pubmed.ncbi.nlm.nih.gov/40918212/", "fetched_at": "2026-04-02T19:45:41.448991"}, {"id": "40792443", "title": "Genetic architecture of dilated cardiomyopathy in Poland: variant distribution, clinical characteristics, and prognosis.", "authors": "Chmielewski Przemysław, Truszkowska Grażyna, Kostrzewa Grażyna, Michalak Ewa, Stawiński Piotr et al.", "journal": "Polish archives of internal medicine", "pub_date": "2025-Sep", "abstract": "Genetic variants are the leading cause of dilated cardiomyopathy (DCM). Data on genetic testing in DCM from Central European populations are scarce. We sought to determine the genetic architecture of DCM in Poland and to assess its influence on patient clinical characteristics and prognosis. The study included 280 DCM patients (mean [SD] age, 39 [13] y; 68% men) who underwent next‑generation sequencing or in whom disease‑causing variants were identified using single‑gene testing. DCM‑related variants were identified in 46% of the patients. Variants in titin (TTN) and lamin A/C (LMNA) genes were the most frequent (18% and 8% of the study cohort, respectively). Other genes with variant frequency equal to or above 2% included desmoplakin (DSP), myosin heavy chain 7 (MYH7), sodium voltage‑gated channel α subunit 5 (SCN5A), filamin C (FLNC), BCL2‑associated athanogene 3 (BAG3), and dystrophin (DMD). Positive family history, atrioventricular block, or atrial arrhythmias were found more often in the causative variant carriers, whereas the frequency of left bundle branch block or hypertension was lower. Severe DCM and a composite end point (cardiovascular death, heart transplantation, left ventricular assist device implantation) occurred with similar frequency in gene‑negative DCM and TTN‑related DCM, whereas the prognosis was worse in the remaining variant carriers. The risks of severe DCM and the composite end point were 2.4- and 3‑fold higher, respectively, for LMNA‑related DCM and 2.3- and 2‑fold higher for variants in the other genes. The distribution of causative genetic variants in Polish DCM patients is similar to that in Western European cohorts. The presence of the causative variants in the genes other than TTN is associated with a poorer prognosis.", "url": "https://pubmed.ncbi.nlm.nih.gov/40792443/", "fetched_at": "2026-04-02T19:45:41.449147"}, {"id": "41300702", "title": "Genetically Confirmed Familial Case of Nonsyndromic Cardiac Progeria Caused by the ", "authors": "Nuzhnaya Ekaterina, Sharova Margarita, Chubykina Uliana, Orlova Anna, Vorontsova Ekaterina et al.", "journal": "Genes", "pub_date": "2025-Oct", "abstract": "We describe the first genetically confirmed familial case of nonsyndromic cardiac progeria caused by the ", "url": "https://pubmed.ncbi.nlm.nih.gov/41300702/", "fetched_at": "2026-04-02T19:17:45.538562"}, {"id": "41180383", "title": "Generation of Nonintegrative-Induced Pluripotent Stem Cells in Hutchinson-Gilford Progeria Syndrome: Enhancing Aging Research.", "authors": "Kadiwala Juned, Shakur Rameen", "journal": "Aging medicine (Milton (N.S.W))", "pub_date": "2025-Oct", "abstract": "Heart failure and cardiovascular disease are the primary causes of mortality in patients with Hutchinson-Gilford Progeria Syndrome (HGPS), resulting from mutations in the LMNA gene. In this study, we investigated a familial pedigree of HGPS to derive induced pluripotent stem (iPS) cells using a nonintegrating Sendai virus method from both affected and unaffected family members. The goal was to create a comprehensive robust and reliable cellar model to study the accelerated aging disease's progression. The resulting iPSCs fulfilled all pluripotency criteria, demonstrated differentiation into all three germ layers, and retained the HGPS mutation. In addition, these iPSCs exhibited key HGPS characteristics, such as shortened telomeres, abnormal Lamin A (Progerin) expression, and reduced cardiac marker levels. Thus, our approach offers a robust, reliable, and accurate representation of the disease pathology for the aging community.", "url": "https://pubmed.ncbi.nlm.nih.gov/41180383/", "fetched_at": "2026-04-02T19:17:45.538824"}, {"id": "41166658", "title": "Clustered Regularly Interspaced Short Palindromic Repeats Genome Editing for Cardiovascular Disease: The Future Is Here.", "authors": "Sami Nabeel, Parikh Manish A, Frishman William H, Peterson Stephen J", "journal": "Cardiology in review", "pub_date": "2025-Oct", "abstract": "Clustered regularly interspaced short palindromic repeats (CRISPR)-based genome editing has expanded from experimental biology to early clinical application, raising the possibility of durable therapies for cardiovascular disease. Because many cardiac conditions are monogenic, they provide clear targets for allele-specific correction or modulation. In hypertrophic cardiomyopathy, preclinical research has shown that base editing of pathogenic MYH7 and MYBPC3 mutations can restore sarcomere function; concurrently, RNA-targeting approaches selectively suppress mutant transcripts. Dilated cardiomyopathy is more heterogeneous: TTN truncations cause haploinsufficiency that can be offset by CRISPR activation, while RBM20 and LMNA mutations require precise correction or interference to restore splicing and nuclear stability. Genome editing is also being tested in familial hypercholesterolemia, where inactivation of PCSK9 using lipid nanoparticle-delivered base editors has now advanced to first-in-human trials, achieving sustained LDL-C lowering. Concurrently, efforts targeting ANGPTL3 and APOB highlight the prospect of multigene modulation of lipid metabolism. In arrhythmic syndromes, patient-derived cardiomyocytes edited at SCN5A and KCNQ1 genes have enabled high-fidelity disease models, while in vivo correction of RYR2 in catecholaminergic polymorphic ventricular tachycardia confirms the viability of editing an arrhythmia substrate. In cardiac regeneration, CRISPR activation of developmental transcription factors has enabled direct reprogramming of fibroblasts into cardiomyocyte-like cells within scar tissue. Even with these advances, delivery remains a bottleneck due to immune responses to viral vectors, limitations in the efficiency of lipid nanoparticles in the heart, and the precision required to target cardiomyocytes or conduction cells, all of which slow progress. Future work will depend as much on technical refinement as on navigating ethical, regulatory, and socie", "url": "https://pubmed.ncbi.nlm.nih.gov/41166658/", "fetched_at": "2026-04-02T19:17:45.538858"}, {"id": "41165919", "title": "Co-morbid monogenic disorders at chromosome region 1q2: LMNA- and FLG-related disorders in a patient referred for assessment of joint hypermobility.", "authors": "Osundiji Mayowa A, Bello Adedamola O, Hand Jennifer L", "journal": "Chromosome research : an international journal on the molecular, supramolecular and evolutionary aspects of chromosome biology", "pub_date": "2025-Oct", "abstract": "The phenotypic similarities and genetic heterogeneity occurring in diverse forms of Ehlers Danlos Syndrome (EDS) subtypes and many heritable connective tissue disorders can pose a diagnostic challenge. In the wake of the growing applications of next-generation sequencing technologies including exome and genome sequencing, opportunities for achieving definitive genetic diagnosis are increasingly arising. We present a 46-year-old man with joint laxity, recurrent joint subluxations, pelvic floor dysfunction, and postural orthostatic tachycardia syndrome (POTS), who was referred for EDS assessment. His medical history included morbid obesity requiring gastric bypass surgery, hearing loss, asthma, retinopathy, myopia, atrial septal defect, narcolepsy with cataplexy, polyneuropathy, folliculitis, lichen simplex chronicus, atopic dermatitis, and hypogonadism. His family history was significant for multiple first- and second-degree relatives who died from cardiac diseases including cases of childhood deaths. Physical examination showed joint laxity with Beighton score of 3/9, bilateral pes planus, hearing loss and macrocephaly. Exome sequencing revealed heterozygous variants LMNA c.1262 T > C p.L421P [classified as likely pathogenic], FLG c.2282_2285del p. S761Cfs*36 [classified as pathogenic], and FLG c.1501 C > T p. R501* [classified as pathogenic]. Mitochondria sequencing revealed a variant of uncertain significance (VUS), MT-ND2 m.5047 T > C p.V193A that is present at 9% heteroplasmy in blood. These findings show co-occurrence of pathogenic sequence variants in neighboring genes located in chromosome 1q2 region [LMNA and FLG] in a patient with features of hereditary connective tissue disorders. Our study highlights the capability of exome sequencing in achieving some actionable diagnosis in cases of co-morbid genetic disorders with overlapping and non-specific symptoms.", "url": "https://pubmed.ncbi.nlm.nih.gov/41165919/", "fetched_at": "2026-04-02T19:17:45.538905"}, {"id": "41082656", "title": "Precise gene editing of pathogenic Lamin A mutations corrects cardiac disease.", "authors": "Caravia Xurde M, Hayashi Brian, Li Hui, Gan Peiheng, Alzhanov Damir et al.", "journal": "Proceedings of the National Academy of Sciences of the United States of America", "pub_date": "2025-Oct", "abstract": "Mutations in the Lamin A (", "url": "https://pubmed.ncbi.nlm.nih.gov/41082656/", "fetched_at": "2026-04-02T19:45:41.448199"}, {"id": "41025522", "title": "Atypical clinical features in a young boy with LMNA mutation: expanding the spectrum of laminopathies.", "authors": "Cantarutti Nicoletta, Casarini Maria C, Drago Fabrizio", "journal": "Cardiology in the young", "pub_date": "2025-Oct", "abstract": "Laminopathies represent a group of inherited disorders, with emerging novel and atypical manifestations. We present the case of a 17-year-old boy with LMNA mutation, showing dilated cardiomyopathy, aortic root dilatation, pontine cavernous angiomas, sensorineural hearing loss, and osteogenic sarcoma. These findings expand the known phenotypic spectrum of laminopathies and highlight the need for multidisciplinary evaluation from a young age.", "url": "https://pubmed.ncbi.nlm.nih.gov/41025522/", "fetched_at": "2026-04-02T19:45:41.448811"}, {"id": "40848704", "title": "Disease Penetrance in Genotype-Positive But Clinically Unaffected Relatives From Families With Dilated Cardiomyopathy.", "authors": "Cannie Douglas E, Bakalakos Athanasios, Syrris Petros, Protonotarios Alexandros, Lorenzini Massimiliano et al.", "journal": "JACC. Heart failure", "pub_date": "2025-Oct", "abstract": "Serial clinical assessment of genotype-positive relatives from families with dilated cardiomyopathy (DCM) is recommended, but there are limited data to guide screening intervals. This study sought to understand the influence of age, sex, and genotype on disease expression. Families with a DCM phenotype and a likely pathogenic or pathogenic variant in DCM-related genes were identified. Consecutive genotype-positive relatives who were clinically unaffected at baseline assessment were retrospectively recruited. The incidence rates of disease penetrance during follow-up observation were stratified by age, sex, and genotype. A primary composite endpoint of heart failure and malignant ventricular arrhythmia was evaluated. A total of 130 relatives (59 male [45%], median age: 31.4 years [Q1-Q3: 25.1-47.6 years]) from 74 families were included. The incidence rate of phenotype development during 80 months of follow-up was 11.6 per 100 person-years (Q1-Q3: 9.0-14.3 per 100 person-years). A phenotype developed in more men than women (16.1 vs 8.9 per 100 person-years, respectively; log-rank P value = 0.007). LMNA variant carriers had the highest incidence rate of disease penetrance at 17.7 per 100 person-years (Q1-Q3: 9.8-25.7 per 100 person-years). Baseline LVEF was strongly associated with disease penetrance. Four relatives (3.1%) had the primary composite endpoint; 3 (9.4%) relatives with an implantable cardiac defibrillator received an appropriate shock. Rates of disease penetrance are high in genotype-positive relatives and particularly high in men and LMNA variant carriers. Baseline LVEF is strongly associated with disease penetrance. These findings emphasize the importance of regular evaluation of this cohort and underline the potential for tailored screening intervals.", "url": "https://pubmed.ncbi.nlm.nih.gov/40848704/", "fetched_at": "2026-04-02T19:45:41.449083"}, {"id": "41623137", "title": "Increased epicardial adipose tissue is part of the phenotype of LMNA-associated partial lipodystrophy and could contribute to increased cardiovascular risk.", "authors": "Lamothe Sophie, Ancel Patricia, Belalem Inès, Lecaque Leïla, Fournel Joris et al.", "journal": "Diabetes & metabolism", "pub_date": "2025-Nov", "abstract": "LMNA-associated familial partial lipodystrophy (FPLD2) is characterized by limb lipoatrophy, cervicofacial and visceral abdominal lipohypertrophy, insulin resistance-related complications and early coronary artery disease (CAD), but epicardial adipose tissue (EAT) is poorly described. We aimed to characterize EAT as a potential new marker of cardiovascular risk in patients with FPLD2. Using a validated deep-learning algorithm, we measured EAT volume from cardiac CT-scans routinely performed for coronary artery calcium (CAC) scoring in patients with FPLD2 (n = 26, 24 women, 65 % with diabetes, median age 49 [32;57] years) compared to patients with type-2 diabetes (T2D) (n = 44, 40 women, age 49 [41;59], p = 0.18). Although lower BMI (23.3 [21;26.6] vs. 27.2 [24.7;29.6], P = 0.03) and HbA1c (6.5 [5.8;7.7] vs. 7.8 [7;8.5] %, P = 0.003) in patients with FPLD2 vs. T2D, EAT volume (110 [72;150] vs. 60 [42;78] ml, P < 0.001) and prevalence of CAD (19 vs. 2 %, P = 0.003) were higher. EAT was positively related to CAC score in the FPLD2 group. Our findings support that EAT is increased in patients with FPLD2 and represents a specific ectopic adipose tissue which could contribute to the increased cardiovascular risk.", "url": "https://pubmed.ncbi.nlm.nih.gov/41623137/", "fetched_at": "2026-04-02T19:17:45.538023"}, {"id": "41317940", "title": "Updated quantitative thresholds for cardiac magnetic resonance imaging-based diagnosis of arrhythmogenic right ventricular cardiomyopathy.", "authors": "Carrick Richard T, Muller Steven A, Gasperetti Alessio, Asatryan Babken, Murray Brittney et al.", "journal": "Heart rhythm", "pub_date": "2025-Nov", "abstract": "Arrhythmogenic right ventricular cardiomyopathy (ARVC) is an inherited cardiomyopathy associated with life-threatening ventricular arrhythmias. Currently, ARVC diagnosis is defined by the 2010 modified task force criteria. This study aimed to evaluate the implementation of updated cardiac magnetic resonance (CMR) imaging thresholds used to define pathologic right ventricular (RV) dilation and systolic dysfunction in the diagnosis of ARVC. This was a retrospective, observational cohort study that enrolled patients with ARVC with available quantitative CMR evaluated at the Johns Hopkins ARVC Center. Reclassification of RV diagnostic criteria was reevaluated using updated standards for RV structure and function. 430 patients with ARVC were enrolled. Mean age was 35.1 years, 47.7% were female, and 66.3% had pathogenic variants in ARVC-associated genes. Mean RV end-diastolic volume index was 114 mL/m Incorporation of modern standards for normal RV structure and function improved the specificity of the ARVC modified task force criteria without reducing sensitivity. These findings support the use of updated CMR-derived criteria for defining the presence or absence of pathologic RV phenotype during ARVC diagnostic evaluation.", "url": "https://pubmed.ncbi.nlm.nih.gov/41317940/", "fetched_at": "2026-04-02T19:17:45.538525"}, {"id": "41290254", "title": "Rare clinical convergence: pulmonary sarcoidosis with dilated cardiomyopathy and central myopathy.",
