"authors": "Kan Alan, Lara Beatriz, Arun Tarunya, Banerjee Prithwish", "journal": "BMJ case reports", "pub_date": "2025-Nov", "abstract": "A female in her early 40s with a history of acute decompensated congestive heart failure was admitted following a farming accident and received a contrast-enhanced CT trauma scan of the whole body which subsequently revealed extensive lung fibrosis, cavitations, granulomas and hilar lymphadenopathy. Subsequent whole body 18F-fluorodeoxyglucose positron emission tomography-computed tomography (FDG PET-CT) showed no evidence of metabolic activity within the myocardium or skeletal muscles, excluding cardiac sarcoidosis and inflammatory cardiac disease, but extensive pulmonary metabolic activity consistent with pulmonary sarcoidosis. Cardiac MRI ventricular volume studies excluded inflammatory, infiltrative or ischaemic pathology; however, genetic testing identified the LMNA A/C gene mutation. She had also exhibited truncal, proximal and axial muscle weakness following her original admission. In this report, we present the rare and challenging coexistence of pulmonary sarcoidosis and LMNA-related dilated cardiomyopathy with laminopathy-associated proximal myopathy and describe the challenges with overlapping multisystem diseases.", "url": "https://pubmed.ncbi.nlm.nih.gov/41290254/", "fetched_at": "2026-04-02T19:17:45.538642"}, {"id": "41287366", "title": "Identification and Validation of Novel Lactylation-Related Gene Signature in Dilated Cardiomyopathy.", "authors": "Liu Jia, Liu Chong, Yu Jingjia, Xu Kai", "journal": "Archiv der Pharmazie", "pub_date": "2025-Nov", "abstract": "Dilated cardiomyopathy (DCM) is a progressive myocardial disorder with limited therapeutic options. Recent studies suggest that metabolic reprogramming, including lactate accumulation and protein lactylation, contributes to heart failure pathogenesis, but their roles in DCM remain poorly defined. We analyzed the global burden of cardiomyopathy and myocarditis using GBD data and performed transcriptomic profiling using GSE120895 and GSE5406 datasets. Weighted gene co-expression network analysis (WGCNA), differential gene expression, and known lactylation-related genes (LRGs) were integrated to identify key targets. LASSO regression was applied to construct a diagnostic model. Validation was conducted in an Lmna", "url": "https://pubmed.ncbi.nlm.nih.gov/41287366/", "fetched_at": "2026-04-02T19:17:45.538675"}, {"id": "41265769", "title": "The artificial intelligence-derived electrocardiographic age gap is associated with adverse clinical outcomes in LMNA-related cardiomyopathy.", "authors": "Castrichini Matteo, Sularz Agata, Bos J Martijn, Attia Zachi, Noseworthy Peter et al.", "journal": "Heart rhythm", "pub_date": "2025-Nov", "abstract": "", "url": "https://pubmed.ncbi.nlm.nih.gov/41265769/", "fetched_at": "2026-04-02T19:17:45.538753"}, {"id": "40296583", "title": "Integrated role of cardiac magnetic resonance and genetics in predicting left ventricular reverse remodelling in dilated and non-dilated cardiomyopathy.", "authors": "Setti Martina, Iseppi Manuela, Verdonschot Job A J, Rizzi Jacopo G, Paldino Alessia et al.", "journal": "European journal of heart failure", "pub_date": "2025-Nov", "abstract": "Left ventricular reverse remodelling (LVRR) is a prognostic marker in patients with dilated (DCM) and non-dilated left ventricular cardiomyopathy (NDLVC). The utility of combining late gadolinium enhancement (LGE) and genetic testing in predicting LVRR in DCM/NDLVC remains a knowledge gap. This study aimed to assess an integrated approach including LGE data and genetics to predict LVRR in DCM/NDLVC patients. This multicentre observational study included DCM/NDLVC patients with: (i) baseline echocardiographic left ventricular ejection fraction (LVEF) <50%; (ii) genetic testing; (iii) baseline cardiac magnetic resonance (CMR); (iv) 12-month follow-up echocardiographic data. LVRR was defined as LVEF increase ≥10% or LVEF ≥50% (if baseline LVEF <45%) at 12 months. Outcome measures were: (i) all-cause mortality, heart transplant, or left ventricular assist device implantation (D/HT/LVAD); (ii) sudden cardiac death or major ventricular arrhythmias (SCD/MVA). Arrhythmogenic genes studied were LMNA, DSP, FLNC, and RBM20. Among 1757 DCM/NDLVC with genetic data, 616 met eligibility (462 DCM, 154 NDLVC; age 51 ± 14 years, 34% female). LVRR occurred in 314 patients (51%): 251 (54%) in DCM and 63 (41%) in NDLVC (p = 0.004). Independent predictors of LVRR within 1 year included titin truncating variants, absence of arrhythmogenic genes, and absence of LGE ring-like pattern. In patients with LVEF <35%, only the presence of LGE ring-like pattern and arrhythmogenic genes remained independently related to a lower rate of LVRR and increased SCD/MVA risk. In a large genetically and CMR characterized DCM/NDLVC cohort, arrhythmogenic genotypes and LGE ring-like pattern were inversely related to LVRR, particularly in patients with LVEF <35%.", "url": "https://pubmed.ncbi.nlm.nih.gov/40296583/", "fetched_at": "2026-04-02T19:45:41.449417"}, {"id": "39998502", "title": "Cardiac phenotypes in LMNA mutations.", "authors": "Rouhi Leila", "journal": "Current opinion in cardiology", "pub_date": "2025-May", "abstract": "This review highlights the diverse cardiac manifestations of LMNA mutations, focusing on their underlying molecular mechanisms and clinical implications. As LMNA mutations are implicated in cardiomyopathies, such as dilated cardiomyopathy (DCM), arrhythmogenic cardiomyopathy (ARVC), and conduction system diseases, understanding these phenotypes is critical for advancing diagnosis and management strategies. Recent studies reveal that LMNA mutations disrupt nuclear envelope stability, activating the DNA damage response (DDR) and compromising chromatin organization and mechanotransduction. Mouse models have elucidated pathways linking LMNA dysfunction to fibrosis, arrhythmias, and myocardial remodeling. Emerging evidence demonstrates that fibroblasts play a crucial role in cardiac phenotypes. Advances in genetic screening have also underscored the importance of early identification and risk stratification, particularly for arrhythmias and sudden cardiac death. The diverse spectrum of LMNA-related cardiac phenotypes, from isolated conduction defects to severe DCM and ARVC, underscores the necessity of personalized care strategies. Bridging insights from molecular studies and clinical research paves the way for targeted therapies to slow disease progression and improve patient outcomes. Future efforts should prioritize translational research on molecular mechanisms with potential in mouse models, alongside a deeper exploration of genotype-phenotype correlations, to refine and implement effective therapeutic interventions.", "url": "https://pubmed.ncbi.nlm.nih.gov/39998502/", "fetched_at": "2026-04-02T19:45:41.449673"}, {"id": "40225500", "title": "Lamin AC Cardiomyopathy, the Next Masquerader: Laminopathy Mimicking Cardiac Sarcoidosis.", "authors": "Bashir Hanad, Palmer Cassady, Reddy Abhimanyu, Mazur Wojciech, OBrien Thomas et al.", "journal": "Cureus", "pub_date": "2025-Mar", "abstract": "Phenotypic expression of lamin AC-dilated cardiomyopathy (LMNA-DCM) and cardiac sarcoidosis (CS) at times presents with similar clinical findings, including arrhythmia, conduction abnormalities, and heart failure. Lamin AC-dilated cardiomyopathy is one of the most common causes of genetic DCM with an autosomal dominant inheritance pattern. Contrastingly, a smaller proportion of sarcoid cases present with isolated cardiac involvement, highlighting the intricate nature of this systemic disease. This paper presents three cases highlighting potential pitfalls in the clinical diagnosis and management of laminopathies. Also highlighted is the need for extreme caution when endomyocardial biopsies are equivocal and there is sole reliance on cardiac imaging to establish diagnostic criteria. In addition, this case series highlights the imperative role of genetic testing during the initial workup for establishing the accurate etiology in the setting of cardiomyopathy. The strikingly similar clinical characteristics of LMNA-DCM and CS underscore the necessity for a robust diagnostic approach, including early integration of genetic testing, as this approach holds great promise for improving outcomes and the quality of life for those grappling with these challenging cardiac conditions. Innovative strategies, including comprehensive advanced imaging protocols and precision medicine, promise to advance our comprehension and management of both disease entities.", "url": "https://pubmed.ncbi.nlm.nih.gov/40225500/", "fetched_at": "2026-04-02T19:45:41.449480"}, {"id": "40557388", "title": "Refractory ventricular tachycardias associated with LMNA-related dilated cardiomyopathy successfully eliminated by open-chest mapping and cryoablation during LVAD implantation.", "authors": "Itonaga Jumpei, Takase Susumu, Fujino Takeo, Matsunaga Shogo, Sakamoto Kazuo et al.", "journal": "HeartRhythm case reports", "pub_date": "2025-Jun", "abstract": "", "url": "https://pubmed.ncbi.nlm.nih.gov/40557388/", "fetched_at": "2026-04-02T19:45:41.449259"}, {"id": "40372342", "title": "The Cardiovascular Magnetic Resonance Phenotype of Lamin Heart Disease.", "authors": "Topriceanu Constantin-Cristian, Al-Farih Mashael, Joy George, Chan Fiona, Webber Matt et al.", "journal": "JACC. Cardiovascular imaging", "pub_date": "2025-Jun", "abstract": "Lamin (LMNA) heart disease is a lethal form of dilated cardiomyopathy (DCM). The authors explored its cardiovascular magnetic resonance (CMR) phenotype to discover prognostically useful and subclinical biomarkers. This prospective multicenter study recruited 4 groups: LMNA carriers with left ventricular ejection fraction ≥55% (Lamin+EF), LMNA carriers with left ventricular ejection fraction <50% (Lamin-EF), individuals with DCM with wild-type LMNA (DCMwt), and healthy volunteers. Phantom-calibrated CMR comprising cines, late gadolinium enhancement, and multiparametric mapping was undertaken. Left ventricular shapes were reconstructed using generalized Procrustes analysis. Serum biomarkers were collected at the time of CMR. Using a major adverse cardiovascular events (MACE) outcome of cardiovascular death, life-threatening ventricular tachyarrhythmia, heart transplantation, or atrioventricular block requiring pacing, we explored the prognostic value of CMR metrics using Cox regression. A total of 187 individuals were recruited (50% male): 29 with Lamin+EF (38 ± 14 years), 38 with Lamin-EF (45 ± 17 years), 73 with DCMwt (45 ± 15 years), and 47 healthy volunteers (44 ± 20 years). Compared to HVs, Lamin+EF had longer phantom-normalized T The CMR phenotype of LMNA carriers with preserved left ventricular systolic function consists of longer T", "url": "https://pubmed.ncbi.nlm.nih.gov/40372342/", "fetched_at": "2026-04-02T19:45:41.449333"}, {"id": "40065010", "title": "EMD missense variant causes X-linked isolated dilated cardiomyopathy with myocardial emerin deficiency.", "authors": "Bulmer Linda, Ljungman Charlotta, Hallin Johan, Dahlberg Pia, Polte Christian L et al.", "journal": "European journal of human genetics : EJHG", "pub_date": "2025-Jun", "abstract": "Pathogenic variants in the EMD gene cause X-linked Emery-Dreifuss muscular dystrophy type 1 (EDMD1), typically presenting with joint contractures and skeletal muscle atrophy, followed by atrial arrhythmias, cardiac conduction defects, and atrial dilatation. Although an association with isolated dilated cardiomyopathy (DCM) has been suggested, evidence is currently insufficient to verify the gene-disease association. We investigated the causality of a missense variant, c.23C>G, p.Ser8Trp, in EMD in a large family with a history of DCM and suspected sudden cardiac death (SCD) in males. DCM was diagnosed in six hemizygous males aged 36-50 and detailed phenotyping identified end-stage heart failure, cardiac conduction defects, and ventricular arrhythmias as prominent features. Cardiac magnetic resonance imaging showed late gadolinium enhancement with mixed ischemic and non-ischemic patterns. Muscular dystrophy was absent in all six males, of whom five underwent neuromuscular examination including serum-creatine kinase measurement. Immunohistochemical analysis showed greatly reduced levels of emerin in both cardiac and skeletal muscle samples. The EMD variant c.23C>G co-segregated with DCM, with an estimated LOD score of 3.9 and full-likelihood Bayes factor of >2500:1 in favor of causality. Among the 17 heterozygous females, ages 20-87, one developed DCM at age 72. We concluded that the EMD c.23C>G missense variant is associated with DCM in the absence of muscular dystrophy, thereby providing new evidence of isolated DCM as a distinct cardiac EMD-phenotype, separate from EDMD1. The phenotypic similarities with LMNA-DCM, with a high risk of cardiac conduction defects and ventricular arrhythmias, might warrant early interventions to prevent SCD.", "url": "https://pubmed.ncbi.nlm.nih.gov/40065010/", "fetched_at": "2026-04-02T19:45:41.449631"}, {"id": "40794869", "title": "Liquid-liquid phase separation of lamin drives altered chromatin organization in cardiomyopathic mutations of lamin A.", "authors": "Nath Subhradip, Dutta Shuvadip, Sarkar Shreyasi Dey, Sengupta Duhita, Mitra Mithun K et al.", "journal": "Nucleic acids research", "pub_date": "2025-Jul", "abstract": "Lamins are intermediate filaments constituting the nuclear lamina which maintains the structural integrity of the nucleus and play a key role in the spatiotemporal genome organization. Mutations in lamin A/C have been associated with a plethora of diseases including dilated cardiomyopathy. In this study, we focused on lamin A mutants E161K and K97E which are widely reported in patients afflicted with dilated cardiomyopathy. We established that these mutations cause large scale disruption of the peripheral lamina and consequent heterochromatin (HC) organization, along with the formation of lamin A aggregates inside the nucleoplasm. Using coarse-grained polymer simulations, we explored the interplay between lamin, nuclear membrane, and chromatin showing that disruptions in these interactions can reproduce the experimental phenotypes. Simulations also predict altered positioning depending on HC content and altered lamin dynamics in E161K and K97E mutants. The predictions from the simulations were verified using 3D FISH to delineate the reorganization of chromosome territories in these mutants. Based on the disengagement of lamin A foci from HC, we subsequently investigated the dynamic properties of the mutant aggregates using advanced imaging techniques. Through this, we report that mutant lamin aggregates show internal rearrangement and external exchange at the mesoscopic-level reminiscent of liquid-liquid phase separation.", "url": "https://pubmed.ncbi.nlm.nih.gov/40794869/", "fetched_at": "2026-04-02T19:45:41.449112"}, {"id": "40610603", "title": "Clinical and metabolic consequences of a historic pathogenic lamin A/C founder variant.", "authors": "Wong L Y, Torfs T, Vanherle S J V, Janssen J, Claes G R F et al.", "journal": "Scientific reports", "pub_date": "2025-Jul", "abstract": "A novel LMNA p.(Glu105Leu) variant was identified in five families with dilated cardiomyopathy (DCM), revealed as a local founder variant originating approximately 650 years ago. Genetic testing and clinical analysis of 795 DCM patients demonstrated that probands with this variant typically present with severe DCM in their sixties, characterized by high prevalence of late gadolinium enhancement, arrhythmias, and conduction disorders. Time-to-event analysis suggested a later onset of clinical symptoms compared to other LMNA variants, with a trend towards longer event-free survival. Microscopic imaging of patient fibroblasts, induced pluripotent stem cell-derived cardiomyocytes (iPSC-CMs), and heart tissue confirmed structural nuclear LMNA-associated abnormalities. Patient iPSC-CMs exhibited distinct sarcomeric disorganization, increased glucose uptake and glycogen content, reduced mitochondrial function and biogenesis, and delayed contractile function. These findings support the pathogenicity of the variant and demonstrate its profound impact on structural and metabolic functions in cardiomyocytes.", "url": "https://pubmed.ncbi.nlm.nih.gov/40610603/", "fetched_at": "2026-04-02T19:45:41.449232"}, {"id": "39941414", "title": "", "authors": "Lorca Rebeca, Alén Alberto, Salgado María, Misiego-Margareto Rosario, Dolado-Cuello Javier et al.", "journal": "Journal of clinical medicine", "pub_date": "2025-Jan", "abstract": "", "url": "https://pubmed.ncbi.nlm.nih.gov/39941414/", "fetched_at": "2026-04-02T19:45:41.449714"}, {"id": "39869235", "title": "Contemporary Insights into LMNA Cardiomyopathy.", "authors": "Balakrishnan Iswaree D, Lakdawala Neal K", "journal": "Current cardiology reports", "pub_date": "2025-Jan", "abstract": "This review aims to explore how a diagnosis of LMNA-related cardiomyopathy (LMNA-CM) informs clinical management, focusing on the prevention and management of its complications, through practical clinical strategies. Longitudinal studies have enhanced our understanding of the natural history of LMNA-CM including its arrhythmic and non-arrhythmic complications. A LMNA specific ventricular arrhythmia risk prediction strategy has been integrated into clinical practice guidelines. Although less robust, observational studies are shaping gene-specific strategies for mitigating other complications including atrioventricular block, atrial fibrillation and cardiomyopathy, while novel therapies have been evaluated in clinical trials. LMNA-CM follows an aggressive yet generally stereotyped course. Early recognition of anticipated complications allows for more effective prevention and management in both symptomatic and asymptomatic patients.", "url": "https://pubmed.ncbi.nlm.nih.gov/39869235/", "fetched_at": "2026-04-02T19:45:41.449875"}, {"id": "40237734", "title": "[New pathogenic mutation in LMNA gene: Clinical case of familial cardiomyopathy].", "authors": "Kashtanova S Y, Rimskaya E М, Meshkov A N, Mironova N А, Dzhumaniiazova I K et al.", "journal": "Terapevticheskii arkhiv", "pub_date": "2025-Feb", "abstract": "We present a clinical case of familial  Представлено описание клинического случая семейной ассоциированной с мутацией в гене ", "url": "https://pubmed.ncbi.nlm.nih.gov/40237734/", "fetched_at": "2026-04-02T19:45:41.449454"}, {"id": "40130092", "title": "The Future of Clustered Regularly Interspaced Short Palindromic Repeats (CRISPR)-Cas9 Gene Therapy in Cardiomyopathies: A Review of Its Therapeutic Potential and Emerging Applications.", "authors": "Moradi Ali, Khoshniyat Sina, Nzeako Tochukwu, Khazeei Tabari Mohammad Amin, Olanisa Olawale O et al.", "journal": "Cureus", "pub_date": "2025-Feb", "abstract": "Cardiomyopathies, among the leading causes of heart failure and sudden cardiac death, are often driven by genetic mutations affecting the heart's structural proteins. Despite significant advancements in understanding the genetic basis of hypertrophic cardiomyopathy (HCM), dilated cardiomyopathy (DCM), and arrhythmogenic right ventricular cardiomyopathy (ARVC), effective long-term therapies remain limited. The advent of clustered regularly interspaced short palindromic repeats (CRISPR) and CRISPR-associated protein 9 (Cas9) gene editing offers a promising therapeutic strategy to address these genetic disorders at their root. CRISPR-Cas9 enables precise modification of pathogenic variants (PVs) in genes encoding sarcomeric and desmosomal proteins, which are frequently implicated in cardiomyopathies. By inducing site-specific double-stranded breaks in DNA, followed by repair through nonhomologous end joining (NHEJ) or homology-directed repair (HDR), this system allows for targeted correction of mutations. In preclinical models, CRISPR-Cas9 has shown promise in correcting HCM-associated mutations in β-myosin heavy chain 7 (MYH7), preventing disease phenotypes such as ventricular hypertrophy and myocardial fibrosis. Similarly, gene editing has successfully rectified DCM-linked mutations in Titin (TTN) and LMNA, resulting in improved heart function and reduced pathological remodeling. For ARVC, CRISPR-Cas9 has demonstrated the ability to repair mutations in desmosomal genes such as plakophilin 2 (PKP2), thereby restoring normal cardiac function and cellular adhesion. Despite these successes, challenges remain, including mosaicism, delivery efficiency, and off-target effects. Nevertheless, CRISPR-Cas9 represents a transformative approach to treating genetic cardiomyopathies, potentially offering long-lasting cures by directly addressing their underlying genetic causes.", "url": "https://pubmed.ncbi.nlm.nih.gov/40130092/", "fetched_at": "2026-04-02T19:45:41.449588"}, {"id": "39895490", "title": "Systematic Review, Meta-Analysis, and Population Study to Determine the Biologic Sex Ratio in Dilated Cardiomyopathy.", "authors": "Bergan Natalie, Prachee Ishika, Curran Lara, McGurk Kathryn A, Lu Chang et al.", "journal": "Circulation", "pub_date": "2025-Feb", "abstract": "Dilated cardiomyopathy (DCM) appears to be diagnosed twice as often in male than in female patients. This could be attributed to underdiagnosis in female patients or sex differences in susceptibility. Up to 30% of cases have an autosomal dominant monogenic cause, where equal sex prevalence would be expected. The aim of this systematic review, meta-analysis, and population study was to assess the sex ratio in patients with DCM, stratified by genetic status, and evaluate whether this is influenced by diagnostic bias. A literature search identified DCM patient cohorts with discernible sex ratios. Exclusion criteria were studies with a small (n<100), pediatric, or peripartum population. Meta-analysis and metaregression compared the proportion of female participants for an overall DCM cohort and the following subtypes: all genetic DCM, individual selected DCM genes ( A total of 99 studies, with 37 525 participants, were included. The overall DCM cohort had a 0.30 female proportion (95% CI, 0.28-0.32), corresponding to a male:female ratio (M:F) of 2.38:1. This was similar to patients with an identified DCM variant (0.31 [95% CI, 0.26-0.36]; M:F 2.22:1;  This study demonstrates that DCM is twice as prevalent in male patients. This was partially mitigated by implementing sex-specific DCM diagnostic criteria. The persistent male excess in genotype-positive patients with an equally prevalent genetic risk suggests additional genetic or environmental drivers for sex-biased penetrance. URL: https://www.crd.york.ac.uk/prospero; Unique identifier: CRD42023451944.", "url": "https://pubmed.ncbi.nlm.nih.gov/39895490/", "fetched_at": "2026-04-02T19:45:41.449803"}, {"id": "41331194", "title": "Epidemiology of paediatric inherited arrhythmogenic diseases under \"Real World\" conditions: findings from a 10-year longitudinal study in Eastern Austria.", "authors": "Albinni Sulaima, Heno Julian, Gwechenberger Marianne, Michel-Behnke Ina, Gass Matthias et al.", "journal": "European journal of pediatrics", "pub_date": "2025-Dec", "abstract": "Inherited arrhythmogenic diseases (IADs), such as long QT syndrome (LQTS), Brugada syndrome (BrS), arrhythmogenic right ventricular cardiomyopathy (ARVC), catecholaminergic polymorphic ventricular tachycardia (CPVT) and laminopathies (LP), are rare conditions in which arrhythmogenic sudden cardiac death (SCD) may occur as the first symptom. We analysed paediatric prevalence data obtained under \"Real World\" conditions, defined as a diagnosis based on clinical symptoms, family history or incidentally written ECGs without screening or registry programmes. Findings were compared to published data. This single centre cross-sectional study was performed over a 10-year period in Eastern Austria. We collected all patients with genetically and/or clinically diagnosed IADs (LQTS, SQT, BrS, CPVT, ARVC and laminopathies) and determined the prevalence and paths to diagnosis for each IAD. At the most recent reference date (2024/12/31), 112 patients were enrolled, corresponding to a paediatric prevalence of 1:7000 of all IADs. Subgroup analysis revealed a prevalence of 1:13,000 for LQTS, 1:22,000 for BrS, 1:43,000 for ARVC and 1:368,000 for CVPT. Most patients with LQTS (62%) were diagnosed after incidental ECG, whereas BrS (79%) and ARVC (64%) were diagnosed mainly by family screening.  This first study on the prevalence of paediatric IADs obtained under \"Real World\" conditions at a tertiary care centre, reports significantly lower numbers compared to published data. Our findings on patients' paths to diagnosis suggest that LQTS patients may benefit from selected age-dependent screening programmes, whereas for BrS and ARVC, family screening and intensive collaboration with adult care providers are crucial for diagnosis. • Although hereditary primary electrical disorders are rare diseases, they may account for 30% or more of all sudden cardiac deaths in the young, making early detection in the general paediatric population crucial. • This is the first study on population-based pae", "url": "https://pubmed.ncbi.nlm.nih.gov/41331194/", "fetched_at": "2026-04-02T19:17:45.538430"}, {"id": "41321620", "title": "Phenotype specific nuclear lamina remodeling in hiPSC derived cardiomyocytes bearing ", "authors": "Coscarella Isabella Leite, Usman Olalekan H, Wang Lili, Landim-Vieira Maicon, Wirstiuk Lillian et al.", "journal": "iScience", "pub_date": "2025-Dec", "abstract": "Cardiomyocytes endure physical stress from the myocardium environment while generating their own mechanical strains. The force generated by sarcomeres is transmitted both longitudinally to adjacent sarcomeres and laterally to the cytoskeleton via intermediate filaments. This mechanical stimulus impacts other organelles, including the nucleus, thus playing a vital role in sensing and signaling nuclear adaptations. However, there is limited understanding of how changes in cardiac contractility affect nuclear mechanics. Here, we sought to investigate the effects of hyper- and hypo-contractility in nuclei of human induced pluripotent stem cell-derived cardiomyocytes (hiPSC-CMs) bearing ", "url": "https://pubmed.ncbi.nlm.nih.gov/41321620/", "fetched_at": "2026-04-02T19:17:45.538491"}, {"id": "41210585", "title": "Prime editing corrects the dilated cardiomyopathy causing RBM20-P633L-mutation in human cardiomyocytes.", "authors": "Roman Alexandra, Zimmer Anja, Gotthardt Michael, Steinmetz Lars M, Kühn Ralf et al.", "journal": "Molecular therapy. Nucleic acids", "pub_date": "2025-Dec", "abstract": "Prime editing (PE) is an innovative next-generation gene editing tool that has therapeutic potential in post-mitotic organs, such as the human heart. However, its applicability and efficiency in non-proliferating cells, e.g., human cardiomyocytes, is not yet established. Here, we apply PE directly in cardiomyocytes differentiated from human induced pluripotent stem cells (hi-CMs) carrying dilated-cardiomyopathy-causing mutations. A target array (TA) containing the mutations LMNA", "url": "https://pubmed.ncbi.nlm.nih.gov/41210585/", "fetched_at": "2026-04-02T19:17:45.538795"}, {"id": "40938777", "title": "Impact of genotype-phenotype associations on prognosis in dilated cardiomyopathy.", "authors": "Stroeks Sophie L V M, Wang Ping, Merlo Marco, Muller Steven, Paldino Alessia et al.", "journal": "European journal of heart failure", "pub_date": "2025-Dec", "abstract": "Dilated cardiomyopathy (DCM) has a monogenic aetiology in up to 40% of patients. Understanding the spectrum of genotype-phenotype associations in DCM is crucial for risk stratification and personalized treatment. We aimed to (i) characterize genotype-specific features, (ii) evaluate whether phenotype-based clustering reflects underlying genotype, and (iii) compare the prognostic value of genotype- versus phenotype-based approaches. A multicentre cohort of 534 DCM patients with a (likely) pathogenic variant were grouped by genotype (genotype-first approach) and clustered by clinical phenotype (phenotype-first approach). We compared clinical characteristics, identified genotype-phenotype associations, and evaluated outcomes, including all-cause mortality, heart failure hospitalization, heart transplantation, and malignant ventricular arrhythmias. Using the genotype-first approach, significant genotype-phenotype associations were found for 10 genes. FLNC, LMNA, DSP, and PLN variants were linked to arrhythmias. BAG3, TNNT2, DMD, and TTN were associated with increased cardiac volumes and decreased left ventricular ejection fraction (LVEF). Clustering identified four phenotypic clusters: (1) young, moderately reduced LVEF; (2) arrhythmias, moderate reduced LVEF; (3) low LVEF; (4) arrhythmias, low LVEF. There were no clear correlations between phenotypic clusters and genotype. The genotype-first approach showed that LMNA, FLNC, and BAG3 variants had the highest risk for heart failure and arrhythmogenic adverse outcomes. The phenotype-first approach indicated that clusters 3 and 4 were associated with the worst prognosis. Overall, genotype was the strongest predictor of outcome. Patients with a genetic form of DCM exhibit clinical and genetic heterogeneity. Genotype-based risk stratification is more accurate compared to a phenotype-first approach, highlighting the importance of broad genetic screening among patients with DCM. Additionally, gene-specific risk prediction shou", "url": "https://pubmed.ncbi.nlm.nih.gov/40938777/", "fetched_at": "2026-04-02T19:45:41.448917"}, {"id": "40878535", "title": "Arrhythmic genotypes in dilated cardiomyopathy and risk of advanced heart failure.", "authors": "Mora-Ayestarán Nerea, Ochoa Juan Pablo, Gómez-González Cristina, Navarro-Peñalver Marina, Gallego-Delgado María et al.", "journal": "European heart journal", "pub_date": "2025-Dec", "abstract": "Certain genetic forms of dilated cardiomyopathy (DCM) entail a higher arrhythmic risk. It is unknown whether DCM patients with high-risk arrhythmic genotypes also develop more advanced heart failure (AHF) complications. AHF events were studied according to DCM genotype. Clinical data from 1203 genotyped DCM patients were collected from 19 Spanish centres. Patients were classified into high-risk arrhythmic genotypes (LMNA, FLNC, desmosomal genes, PLN, TMEM43, RBM20), TTN, other genes, and genotype negative (Gen-). The primary endpoint was a composite of AHF events (ventricular assist device implantation, heart transplant, and AHF-related mortality). The secondary endpoint was a combination of malignant ventricular arrhythmias (MVA). A DCM-causing variant was identified in a high-risk arrhythmic gene in 185 patients (15.4%), 193 (16.0%) had variants in TTN, 134 (11.1%) in other genes, and 691 (57.4%) were Gen-. After a median follow-up of 5.7 years (interquartile range 2.9-9.1 years), AHF events occurred in 45 (24.3%) patients in the high-risk arrhythmic group, while in 25 (18.7%), 25 (13.0%), and 70 (10.1%) patients with other genotypes, TTN, and Gen-, respectively (hazard ratio 1.85, 95% confidence interval 1.31-2.61 for high-risk arrhythmic genes compared with other groups). MVA occurred in 55 patients (29.7%) (hazard ratio 2.52, 95% confidence interval 1.81-3.51 for high-risk genotypes vs other groups). High-risk arrhythmic genotype was the main independent predictor of AHF in multivariate analysis. High-risk arrhythmic genotype and late gadolinium enhancement were independent predictors of MVA. Patients with high-risk arrhythmic genotypes also experience more AHF events, supporting a differential therapeutic approach in this group of patients beyond sudden death prevention.", "url": "https://pubmed.ncbi.nlm.nih.gov/40878535/", "fetched_at": "2026-04-02T19:45:41.449050"}, {"id": "39894135", "title": "Extensive cardiac involvement in laminopathies diagnosed in pediatric-aged patients: A single-center study.", "authors": "Hayes Emily A, Foreman Kaitlyn, Wright Lydia K, Gajarski Robert J, Hor Kan et al.", "journal": "Heart rhythm", "pub_date": "2025-Dec", "abstract": "Pathogenic variations in lamin A/C (LMNA) result in a group of inherited conditions termed laminopathies. Cardiac manifestations of laminopathies include atrial and ventricular arrhythmias, atrioventricular conduction disorders, and cardiomyopathy, with or without skeletal muscle involvement. Because of rarity and previous cardiac characterization as adult onset, pediatric data are limited. This study sought to investigate the natural history of cardiac disease in pediatric patients with pathogenic LMNA variants. We identified patients ≤18 years with genetically confirmed pathogenic variants in LMNA observed at a single center between 2003 and 2024. Clinical phenotypes along with cardiac test results were retrospectively catalogued. We identified 12 patients with pathogenic LMNA variant with a median age of 4.9 years at diagnosis (interquartile range, 3.7-10.7 years). Of the 12 patients, 9 (75%) were male and 10 (83%) had skeletal muscle involvement. Cardiac manifestations developed in 9 patients (75%) during a median follow-up of 9.5 years (interquartile range, 7.0-13.3 years). Nine patients (75%) had conduction abnormalities or arrhythmias (atrioventricular block, ventricular/atrial tachycardias), and 4 (33%) had cardiovascular implantable electronic devices placed. Two (17%) patients were diagnosed with cardiomyopathy, 1 (8%) requiring heart transplant. Two (17%) patients died during the study. Cardiac involvement, specifically cardiomyopathy and progressive conduction system abnormalities, were common in pediatric patients with pathogenic LMNA variants. Early genetic diagnosis of laminopathies with frequent surveillance for arrhythmias and cardiac dysfunction is necessary for more timely initiation of advanced therapies to prevent adverse events. More comprehensive phenotype-genotype correlation is strongly needed to better understand early cardiac manifestations in laminopathies.", "url": "https://pubmed.ncbi.nlm.nih.gov/39894135/", "fetched_at": "2026-04-02T19:45:41.449833"}, {"id": "40940734", "title": "Profibrotic Molecules Are Reduced in CRISPR-Edited Emery-Dreifuss Muscular Dystrophy Fibroblasts.", "authors": "Cattin Eleonora, Schena Elisa, Mattioli Elisabetta, Marcuzzo Stefania, Bonanno Silvia et al.", "journal": "Cells", "pub_date": "2025-Aug", "abstract": "Emery-Dreifuss muscular dystrophy (EDMD) is caused by mutations in ", "url": "https://pubmed.ncbi.nlm.nih.gov/40940734/", "fetched_at": "2026-04-02T19:45:41.448863"}, {"id": "40689545", "title": "Variant-Specific Late Gadolinium Enhancement Patterns Influence Clinical Outcomes in ", "authors": "Castrichini Matteo, Garmany Ramin, Siontis Konstantinos C, Collins Jeremy D, Bois John P et al.", "journal": "Journal of the American Heart Association", "pub_date": "2025-Aug", "abstract": "Disease-causative variants in  Retrospective analysis of 822 genotype-positive patients with arrhythmogenic/dilated cardiomyopathy was used to identify those with disease-causative variants in  Among the 72/116 (62%)  ", "url": "https://pubmed.ncbi.nlm.nih.gov/40689545/", "fetched_at": "2026-04-02T19:45:41.449186"}, {"id": "40509996", "title": "Plasma Proteomics Reveals Dysregulated Pathways Across the Spectrum ", "authors": "Tahir Usman A, Reichart Daniel, Purohit Anisha, Barber Jacob L, Tiwari Gaurav et al.", "journal": "Circulation. Genomic and precision medicine", "pub_date": "2025-Aug", "abstract": "Pathogenic variants in the  To identify proteins and biological pathways associated with likely pathogenic/pathogenic  We identified several novel proteins associated with  Proteomic profiling in individuals with likely pathogenic/pathogenic ", "url": "https://pubmed.ncbi.nlm.nih.gov/40509996/", "fetched_at": "2026-04-02T19:45:41.449298"}, {"id": "40155570", "title": "Dilated cardiomyopathy: from genes and molecules to potential treatments.", "authors": "Wang Xiumei, Lang Zekun, Yan Zeyi, Xu Jing, Zhang Jinyuan et al.", "journal": "Molecular and cellular biochemistry", "pub_date": "2025-Aug", "abstract": "Dilated cardiomyopathy is a myocardial condition marked by the enlargement of the heart's ventricular chambers and the gradual decline in systolic function, frequently resulting in congestive heart failure. Dilated cardiomyopathy has obvious familial characteristics, and mutations in related pathogenic genes can account for about 50% of patients with dilated cardiomyopathy. The most common genes related to dilated cardiomyopathy include TTN, LMNA, MYH7, etc. With more and more research on these genes, it will undoubtedly provide more potential targets and therapeutic pathways for the treatment of dilated cardiomyopathy. In addition, myocardial inflammation, myocardial metabolism abnormalities and cardiomyocyte apoptosis all have an important impact on the pathogenesis of dilated cardiomyopathy. Approximately half of sudden deaths among children and adolescents, along with the majority of patients undergoing heart transplantation, stem from cardiomyopathy. Therefore, precise and prompt clinical diagnosis holds paramount importance. Currently, diagnosis primarily hinges on the patient's medical background and imaging tests, with the significance of genetic testing steadily gaining prominence. The primary treatment for dilated cardiomyopathy remains heart transplantation. However, the scarcity of donors and the risk of severe immune rejection underscore the pressing need for novel therapies. Presently, research is actively exploring preclinical treatments like stem cell therapy as potential solutions.", "url": "https://pubmed.ncbi.nlm.nih.gov/40155570/", "fetched_at": "2026-04-02T19:45:41.449548"}, {"id": "40191636", "title": "A case report of non-lamin A/C dilated cardiomyopathy presenting in a patient with Najjar-Malouf syndrome.", "authors": "Flury Gian, Arquint Flurina", "journal": "European heart journal. Case reports", "pub_date": "2025-Apr", "abstract": "Phenotyping and genotyping of cardiomyopathies are becoming increasingly important. We describe a rare form of syndromic dilated cardiomyopathy, years after the initial diagnosis of intellectual disability and hypergonadotropic hypogonadism, known as Najjar-Malouf syndrome or cardiogenital syndrome. A 45-year-old woman was referred for inpatient treatment because of progressive dyspnoea, chest tightness, and ankle oedema. She had a diagnosis of undefined psychomotor development delay and hypergonadotropic hypogonadism, for which she has been receiving hormone substitution treatment since she was 19 years old. The physical examination revealed signs of congestion as well as a right convex thoracic scoliosis and hyperkyphosis. Cardiac biomarkers were elevated, and echocardiography showed severe dilated cardiomyopathy with impaired systolic function, severe pulmonary hypertension, and secondary mitral regurgitation. Cardiac magnetic resonance imaging showed a severely dilated left ventricle with severely reduced left ventricular ejection fraction (20%), thinned myocardium, and late-gadolinium enhancement predominantly in the septum. Genetic screening for dilatative cardiomyopathy-associated genes revealed no mutations, in particular, no mutation of the lamin A/C (LMNA) gene. The patient progressed to heart failure with severely reduced ejection fraction 26 years after diagnosis of psychomotor development delay and hypergonadotropic hypogonadism. The triad of intellectual disability, hypergonadotropic hypogonadism, and cardiomyopathy enabled the diagnosis of Najjar-Malouf syndrome, also known as cardiogenital syndrome. This case underscores the diagnostic and therapeutic challenges of Najjar-Malouf syndrome, emphasizing the significance of thorough evaluation and genetic testing, particularly considering the association with LMNA mutations. Further research is needed to improve understanding and management strategies for this rare syndrome.", "url": "https://pubmed.ncbi.nlm.nih.gov/40191636/", "fetched_at": "2026-04-02T19:45:41.449504"}, {"id": "39923945", "title": "Domain-specific association of single-nucleotide variants in the LMNA gene with the phenotypic expression of dilated cardiomyopathy.", "authors": "Zhuo Wen, Jiang Zhenhong, Xun Mengwei, Lin Mouwen, Zhou Qiongqiong et al.", "journal": "International journal of cardiology", "pub_date": "2025-Apr", "abstract": "LMNA gene variants cause a spectrum of phenotypes referred to as laminopathies. However, the topological distribution of the LMNA variants and their phenotypic effects have not been delineated. We investigated the associations of variants located at different LMNA domains with clinical phenotypes in dilated cardiomyopathy (DCM) patients. All reported single-nucleotide variants (SNVs) in LMNA were obtained from the ClinVar, HGMD and PubMed databases. The associated phenotypes were collected from PubMed. The pathogenicity of the variants was determined according to the 2015 ACMG/AMP criteria. 236 DCM-related pathogenic/likely pathogenic (P/LP) nonsynonymous SNVs (nsSNVs) were enriched at the intermediate filament (IF) Rod region. Left ventricular ejection fraction was lower in DCM patients carrying P/LP nsSNVs at the Coil 1B and Tail regions than at those with P/LP variants at the Coil 2 region. Similarly, atrioventricular block and pacemaker implantation-related P/LP nsSNVs were enriched at the IF rod region; ventricular tachycardia/fibrillation and implantable cardiac defibrillator implantation-related P/LP nsSNVs were enriched at the Tail domain. Representative mutations in IF Rod and Tail region were selected for mechanism investigation. The ryanodine receptor (RYR2) and membrane Cav1.2 protein expression was significantly increased with variants in Tail region (C1621T and C1718T) compared with variants in IF Rod region (G497C and A575G) and WT group. LMNA P/LP nsSNVs were found to be enriched in the IF rod domain, and a domain-dependent association of the variants with the phenotypic features of DCM was identified. These findings are provisional and, upon replication in independent studies, might be useful in genotype-phenotype correlation studies in DCM caused by LMNA mutations.", "url": "https://pubmed.ncbi.nlm.nih.gov/39923945/", "fetched_at": "2026-04-02T19:45:41.449742"}, {"id": "41815328", "title": "Hutchinson-Gilford progeria syndrome alters the endothelial genetic response to laminar shear stress.", "authors": "Kennedy Crystal C, Carter Jonathan L, Truskey George A", "journal": "Frontiers in physiology", "pub_date": "2025", "abstract": "Hutchinson-Gilford Progeria Syndrome (HGPS) is a fatal, accelerated-aging disease caused by a mutation in the nuclear envelope protein Lamin A. The resulting mutant protein, progerin, accumulates on the nuclear envelope, causing nuclear blebbing, altered gene expression, and other cellular defects. The primary pathology of HGPS is atherosclerosis, leading to stroke or heart attack. Given that atherosclerosis generally begins with endothelial dysfunction, we examined whether the HGPS endothelium has an altered genetic response to shear stress, contributing to atherogenesis. We exposed HGPS and healthy iPSC-derived endothelial cells (viECs) to steady laminar shear stress at 12 dyn/cm Elongation after flow is impaired in HGPS viECs compared with healthy viECs. DE analysis showed fewer significant DE genes and a lower magnitude of gene expression change after flow in HGPS compared with healthy viECs. GSEA identified differences in the gene sets altered by flow-induced DE, including Cholesterol Homeostasis, which was overrepresented in HGPS viECs. LGALS3, encoding the atherosclerosis marker galectin-3, was a main driver of this overrepresentation. RT-PCR confirmed LGALS3 is robustly upregulated in HGPS viECs compared with healthy viECs after flow. Treatment with an adenine base editor correcting the HGPS mutation restored LGALS3 expression to healthy levels. These observations indicate that HGPS ECs have an aberrant molecular response to atheroprotective shear stress, including impaired elongation and upregulation of the pro-inflammatory gene LGALS3, which contributes to atherogenesis in HGPS patients.", "url": "https://pubmed.ncbi.nlm.nih.gov/41815328/", "fetched_at": "2026-04-02T19:17:45.537222"}, {"id": "41357091", "title": "Severe cardiac valvular calcification in two Chinese brothers with mandibuloacral dysplasia type A: a case report.", "authors": "Guo Yi, Zhang Xinyi, Meng Yanfei, Guo Qiuzhe, Wang Xiaoqi et al.", "journal": "Frontiers in cardiovascular medicine", "pub_date": "2025", "abstract": "Mandibuloacral dysplasia type A (MADA) is a rare progeroid syndrome associated with mutations in the Lamin A/C (LMNA) gene, primarily affecting skeletal, cutaneous, and adipose tissues. While certain LMNA gene mutations are known to cause cardiomyopathy and conduction system disease, severe early-onset calcific valvular heart disease is not conventionally considered a typical feature of MADA. This report describes two brothers from a consanguineous Han Chinese family who presented with classical MADA phenotypes alongside severe, early-onset cardiac valvular calcification. Genetic investigation revealed that both affected brothers carried a homozygous missense mutation, c.785A > G (p.Glu262Gly), in the LMNA gene. The elder brother, aged 41, successfully underwent transcatheter aortic valve implantation (TAVI) due to severe aortic valve stenosis. This finding represents the first association, to our knowledge, between the homozygous LMNA c.785A > G (p.Glu262Gly) mutation and significant severe early-onset cardiac valvular calcification manifesting as a prominent feature within the MADA phenotype, thus expanding the clinical spectrum associated with MADA and this specific LMNA variant. This case highlights a potentially underrecognized cardiovascular manifestation in MADA patients and underscores the importance of comprehensive cardiac assessment in affected individuals, particularly those from consanguineous families.", "url": "https://pubmed.ncbi.nlm.nih.gov/41357091/", "fetched_at": "2026-04-02T19:17:45.538343"}, {"id": "40364824", "title": "Similar burden of rare genetic variants in ischemic and non-ischemic dilated cardiomyopathy.", "authors": "Cao Louie, Rushakoff Joshua, Williamson Ian, Karlstaedt Anja, Kittleson Michelle et al.", "journal": "Frontiers in cardiovascular medicine", "pub_date": "2025", "abstract": "The aim of the study was to determine the prevalence of rare disease-causing variants in cardiomyopathy-associated genes in a cohort of patients with ischemic and non-ischemic dilated cardiomyopathy undergoing heart transplant. We conducted a single-center cohort study of 60 adult patients with left ventricular ejection fraction ≤50% and left ventricular end-diastolic dimension ≥95th percentile for sex/height who underwent heart transplant between January 2017 and December 2023 and consented to participate in a cardiac tissue biobank. We evaluated the prevalence of rare (minor allele frequency <0.1%) disease-causing (pathogenic or likely pathogenic by American College of Genetics and Genomics criteria) variants in cardiomyopathy-associated genes. A total of 60 individuals fulfilled the inclusion criteria: 16 with ischemic dilated cardiomyopathy [88% men, median age 65 years, interquartile range (IQR) 64-68 years] and 44 with non-ischemic dilated cardiomyopathy (80% men, median age 53 years, IQR 39-65 years). We found that the prevalence of disease-causing variants was similar between patients with ischemic dilated cardiomyopathy (3/16 or 19%; 95% credible interval 6%-36%) and those with non-ischemic dilated cardiomyopathy (10/44 or 23%; 95% credible interval 12%-33%). Variants in the ischemic dilated cardiomyopathy group were found in the  Patients with ischemic dilated cardiomyopathy undergoing heart transplant possessed a similar burden of rare disease-causing variants as those with non-ischemic dilated cardiomyopathy. Our results suggest that genetic testing may be beneficial in patients with advanced heart failure requiring heart transplant due to ischemic dilated cardiomyopathy to detect disease-causing variants in cardiomyopathy-associated genes.", "url": "https://pubmed.ncbi.nlm.nih.gov/40364824/", "fetched_at": "2026-04-02T19:45:41.449367"}], "trials": [{"nct_id": "NCT05394506", "title": "Modifying Factors in Striated Muscle Laminopathies", "status": "RECRUITING", "phase": "NA", "conditions": "Laminopathies, Emery Dreifuss Muscular Dystrophy 2, LMNA-Related Congenital Muscular Dystrophy, Dilated Cardiomyopathy-1A", "interventions": ", ", "start_date": "2022-09-08", "primary_end": "2027-09-30", "locations": "", "url": "https://clinicaltrials.gov/study/NCT05394506", "fetched_at": "2026-04-02T19:45:42.089813"}, {"nct_id": "NCT03860454", "title": "The Deep Phenotype of Lamin A/C Cardiomyopathy", "status": "UNKNOWN", "phase": "", "conditions": "Lamin A/C Gene Mutation, Dilated Cardiomyopathy, Familial", "interventions": "", "start_date": "2019-03-07", "primary_end": "2025-02-01", "locations": "", "url": "https://clinicaltrials.gov/study/NCT03860454", "fetched_at": "2026-04-02T19:45:42.088788"}, {"nct_id": "NCT03439514", "title": "A Study of ARRY-371797 (PF-07265803) in Patients With Symptomatic Dilated Cardiomyopathy Due to a Lamin A/C Gene Mutation", "status": "TERMINATED", "phase": "PHASE3", "conditions": "Dilated Cardiomyopathy, Lamin A/C Gene Mutation", "interventions": ", ", "start_date": "2018-04-17", "primary_end": "2022-10-13", "locations": "", "url": "https://clinicaltrials.gov/study/NCT03439514", "fetched_at": "2026-04-02T19:45:42.089859"}, {"nct_id": "NCT02601066", "title": "Cardiac Arrhythmias and Sudden Death in Patients Affected With Laminopathies", "status": "UNKNOWN", "phase": "NA", "conditions": "Cardiomyopathy Associated With Myopathy and Sudden Death", "interventions": "", "start_date": "2015-09", "primary_end": "2018-12", "locations": "", "url": "https://clinicaltrials.gov/study/NCT02601066", "fetched_at": "2026-04-02T19:45:42.089786"}, {"nct_id": "NCT02351856", "title": "A Rollover Study of ARRY-371797 in Patients With LMNA-Related Dilated Cardiomyopathy", "status": "COMPLETED", "phase": "PHASE2", "conditions": "LMNA-Related Dilated Cardiomyopathy", "interventions": "", "start_date": "2015-02-02", "primary_end": "2020-12-21", "locations": "", "url": "https://clinicaltrials.gov/study/NCT02351856", "fetched_at": "2026-04-02T19:45:42.089829"}, {"nct_id": "NCT02057341", "title": "A Study of ARRY-371797 in Patients With LMNA-Related Dilated Cardiomyopathy", "status": "COMPLETED", "phase": "PHASE2", "conditions": "LMNA-Related Dilated Cardiomyopathy", "interventions": "", "start_date": "2014-02", "primary_end": "2016-05", "locations": "", "url": "https://clinicaltrials.gov/study/NCT02057341", "fetched_at": "2026-04-02T19:45:42.089844"}], "news": [{"id": "c37260525c4ab4e7d3d789feb07c64bb", "title": "Disrupting the LINC complex by AAV mediated gene transduction prevents progression of Lamin induced cardiomyopathy - Nature", "source": "\"laminopathy cardiomyopathy\" - Google News", "pub_date": "Thu, 05 Aug 2021 07:00:00 GMT", "url": "https://news.google.com/rss/articles/CBMiX0FVX3lxTFBmdS0tbUJ2ZUhsbFVWUmJkMS1DZ2RxakRXQldRV19mM0RrTG9jTDY0QjFZdHd0UDU1TkdEVGV3SXk3SF9EQmFaQXFTU09pRnk5c0JvMWl2ZnN3dGN0WERz?oc=5", "summary": "<a href=\"https://news.google.com/rss/articles/CBMiX0FVX3lxTFBmdS0tbUJ2ZUhsbFVWUmJkMS1DZ2RxakRXQldRV19mM0RrTG9jTDY0QjFZdHd0UDU1TkdEVGV3SXk3SF9EQmFaQXFTU09pRnk5c0JvMWl2ZnN3dGN0WERz?oc=5\" target=\"_blank\">Disrupting the LINC complex by AAV mediated gene transduction prevents pro // ── Stats ─────────────────────────────────────────────────────────────────
document.getElementById("ts").textContent = DATA.stats.last_updated;
document.getElementById("stat-pubs").textContent = DATA.stats.total_pubs;
document.getElementById("stat-trials").textContent = DATA.stats.total_trials;
document.getElementById("stat-recruiting").textContent = DATA.stats.recruiting;
document.getElementById("stat-news").textContent = DATA.stats.total_news;

// ── Tabs ──────────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById("panel-" + name).classList.add("active");
  btn.classList.add("active");
}

// ── Publications ──────────────────────────────────────────────────────────
let pubFilter = "";
function filterPubs() {
  pubFilter = document.getElementById("search-pubs").value.toLowerCase();
  renderPubs();
}

function renderPubs() {
  const filtered = DATA.publications.filter(p =>
    (p.title || "").toLowerCase().includes(pubFilter) ||
    (p.authors || "").toLowerCase().includes(pubFilter) ||
    (p.abstract || "").toLowerCase().includes(pubFilter) ||
    (p.journal || "").toLowerCase().includes(pubFilter)
  );
  document.getElementById("count-pubs").textContent =
    `Showing ${filtered.length} of ${DATA.publications.length} publications`;
  const el = document.getElementById("pubs-list");
  if (!filtered.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🔬</div>No results found.</div>';
    return;
  }
  el.innerHTML = filtered.map(p => `
    <div class="card">
      <div class="card-header">
        <div class="card-title"><a href="${p.url}" target="_blank">${p.title || "—"}</a></div>
        <div class="card-date">${p.pub_date || ""}</div>
      </div>
      <div class="card-meta">
        <strong>${p.journal || "—"}</strong>${p.authors ? " · " + p.authors : ""}
      </div>
      ${p.abstract ? `
        <div class="abstract" id="abs-${p.id}">${p.abstract}</div>
        <span class="toggle-abstract" onclick="toggleAbs('${p.id}', this)">▸ show abstract</span>
      ` : ""}
    </div>
  `).join("");
}

function toggleAbs(id, el) {
  const abs = document.getElementById("abs-" + id);
  abs.classList.toggle("open");
  el.textContent = abs.classList.contains("open") ? "▾ hide abstract" : "▸ show abstract";
}

// ── Trials ────────────────────────────────────────────────────────────────
let trialStatusFilter = "ALL";
let trialSearch = "";

function badgeClass(status) {
  if (!status) return "badge-other";
  const s = status.toUpperCase();
  if (s.includes("RECRUIT")) return "badge-recruiting";
  if (s.includes("ACTIVE") || s.includes("ENROLLING")) return "badge-active";
  if (s.includes("COMPLET")) return "badge-completed";
  return "badge-other";
}

function buildTrialFilters() {
  const statuses = [...new Set(DATA.trials.map(t => t.status).filter(Boolean))];
  const el = document.getElementById("trial-filters");
  el.innerHTML = `<button class="filter-btn active" onclick="setTrialFilter('ALL', this)">All</button>` +
    statuses.map(s => `<button class="filter-btn" onclick="setTrialFilter('${s}', this)">${s.replace(/_/g,' ')}</button>`).join("");
}

function setTrialFilter(status, btn) {
  trialStatusFilter = status;
  document.querySelectorAll("#trial-filters .filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderTrials();
}

function filterTrials() {
  trialSearch = document.getElementById("search-trials").value.toLowerCase();
  renderTrials();
}

function renderTrials() {
  const filtered = DATA.trials.filter(t => {
    const matchStatus = trialStatusFilter === "ALL" || t.status === trialStatusFilter;
    const matchSearch = !trialSearch ||
      (t.title || "").toLowerCase().includes(trialSearch) ||
      (t.conditions || "").toLowerCase().includes(trialSearch) ||
      (t.interventions || "").toLowerCase().includes(trialSearch);
    return matchStatus && matchSearch;
  });
  document.getElementById("count-trials").textContent =
    `Showing ${filtered.length} of ${DATA.trials.length} trials`;
  const el = document.getElementById("trials-list");
  if (!filtered.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🧪</div>No trials found.</div>';
    return;
  }
  el.innerHTML = filtered.map(t => `
    <div class="trial-card">
      <div class="trial-header">
        <div class="trial-title"><a href="${t.url}" target="_blank">${t.title || "—"}</a></div>
        <span class="badge ${badgeClass(t.status)}">${(t.status || "—").replace(/_/g," ")}</span>
      </div>
      <div class="trial-meta">
        <span><strong>${t.nct_id}</strong></span>
        ${t.phase ? `<span>Phase: <strong>${t.phase}</strong></span>` : ""}
        ${t.start_date ? `<span>Start: <strong>${t.start_date}</strong></span>` : ""}
        ${t.primary_end ? `<span>End: <strong>${t.primary_end}</strong></span>` : ""}
        ${t.locations ? `<span>📍 ${t.locations}</span>` : ""}
        ${t.interventions ? `<span>💊 ${t.interventions}</span>` : ""}
      </div>
    </div>
  `).join("");
}

// ── News ──────────────────────────────────────────────────────────────────
let newsFilter = "";
function filterNews() {
  newsFilter = document.getElementById("search-news").value.toLowerCase();
  renderNews();
}
function renderNews() {
  const filtered = DATA.news.filter(n =>
    (n.title || "").toLowerCase().includes(newsFilter) ||
    (n.source || "").toLowerCase().includes(newsFilter) ||
    (n.summary || "").toLowerCase().includes(newsFilter)
  );
  document.getElementById("count-news").textContent =
    `Showing ${filtered.length} of ${DATA.news.length} news items`;
  const el = document.getElementById("news-list");
  if (!filtered.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📰</div>No news found.</div>';
    return;
  }
  el.innerHTML = filtered.map(n => `
    <div class="card">
      <div class="card-header">
        <div class="card-title"><a href="${n.url}" target="_blank">${n.title || "—"}</a></div>
        <div class="card-date">${(n.pub_date || "").substring(0, 16)}</div>
      </div>
      <div class="card-meta"><strong>${n.source || "—"}</strong></div>
      ${n.summary ? `<div style="color:#9aa39b;font-size:12px;line-height:1.7">${n.summary}</div>` : ""}
    </div>
  `).join("");
}

// ── Init ──────────────────────────────────────────────────────────────────
renderPubs();
buildTrialFilters();
renderTrials();
renderNews();
</script>
