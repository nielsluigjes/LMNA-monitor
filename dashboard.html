<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LMNA Cardiac Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f0e;
    --surface: #141817;
    --surface2: #1c201e;
    --border: #2a2e2b;
    --accent: #b8f5a0;
    --accent2: #5bc4f5;
    --accent3: #f5c45b;
    --danger: #f55b5b;
    --text: #e8ede9;
    --muted: #6b756c;
    --recruiting: #b8f5a0;
    --completed: #6b756c;
    --active: #5bc4f5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    padding: 48px 48px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 24px;
    flex-wrap: wrap;
  }
  .logo-block h1 {
    font-family: 'Fraunces', serif;
    font-size: 2.8rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .logo-block p {
    color: var(--muted);
    margin-top: 6px;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .last-updated {
    color: var(--muted);
    font-size: 11px;
    text-align: right;
  }
  .last-updated span {
    display: block;
    color: var(--accent);
    font-size: 13px;
    margin-top: 2px;
  }

  /* STATS BAR */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-bottom: 1px solid var(--border);
  }
  .stat {
    padding: 28px 40px;
    border-right: 1px solid var(--border);
  }
  .stat:last-child { border-right: none; }
  .stat-num {
    font-family: 'Fraunces', serif;
    font-size: 3rem;
    font-weight: 700;
    line-height: 1;
    color: var(--text);
  }
  .stat-num.green { color: var(--accent); }
  .stat-label {
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* NAV TABS */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 48px;
    gap: 0;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .tab {
    padding: 16px 24px;
    cursor: pointer;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: 'DM Mono', monospace;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* MAIN CONTENT */
  main { padding: 40px 48px; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* SEARCH */
  .search-bar {
    margin-bottom: 28px;
    position: relative;
  }
  .search-bar input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--muted); }

  /* CARDS */
  .card-grid { display: flex; flex-direction: column; gap: 2px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px 24px;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: var(--accent); }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 8px;
  }
  .card-title {
    font-family: 'Fraunces', serif;
    font-size: 1rem;
    font-weight: 300;
    color: var(--text);
    line-height: 1.4;
    flex: 1;
  }
  .card-title a { color: inherit; text-decoration: none; }
  .card-title a:hover { color: var(--accent); }
  .card-date {
    color: var(--muted);
    font-size: 11px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .card-meta {
    color: var(--muted);
    font-size: 11px;
    margin-bottom: 10px;
  }
  .card-meta strong { color: var(--accent2); }
  .abstract {
    color: #9aa39b;
    font-size: 12px;
    line-height: 1.7;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }
  .abstract.open { max-height: 400px; }
  .toggle-abstract {
    color: var(--muted);
    font-size: 10px;
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 8px;
    display: inline-block;
  }
  .toggle-abstract:hover { color: var(--accent); }

  /* BADGES */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 2px;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
    flex-shrink: 0;
  }
  .badge-recruiting { background: rgba(184,245,160,0.15); color: var(--recruiting); border: 1px solid rgba(184,245,160,0.3); }
  .badge-active { background: rgba(91,196,245,0.15); color: var(--active); border: 1px solid rgba(91,196,245,0.3); }
  .badge-completed { background: rgba(107,117,108,0.15); color: var(--completed); border: 1px solid rgba(107,117,108,0.3); }
  .badge-other { background: rgba(245,196,91,0.15); color: var(--accent3); border: 1px solid rgba(245,196,91,0.3); }

  /* TRIAL CARDS */
  .trial-grid { display: flex; flex-direction: column; gap: 2px; }
  .trial-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px 24px;
    transition: border-color 0.15s;
  }
  .trial-card:hover { border-color: var(--accent2); }
  .trial-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 10px; }
  .trial-title {
    font-family: 'Fraunces', serif;
    font-size: 1rem;
    font-weight: 300;
    line-height: 1.4;
  }
  .trial-title a { color: inherit; text-decoration: none; }
  .trial-title a:hover { color: var(--accent2); }
  .trial-meta { display: flex; flex-wrap: wrap; gap: 16px; font-size: 11px; color: var(--muted); }
  .trial-meta span strong { color: var(--text); }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 3rem; margin-bottom: 16px; }

  /* FILTER ROW */
  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(184,245,160,0.08);
  }

  /* RESULT COUNT */
  .result-count { color: var(--muted); font-size: 11px; margin-bottom: 16px; }

  @media (max-width: 768px) {
    header { padding: 24px; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .tabs { padding: 0 24px; overflow-x: auto; }
    main { padding: 24px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-block">
    <h1>LMNA Monitor</h1>
    <p>Cardiac Disease Intelligence Dashboard</p>
  </div>
  <div class="last-updated">
    last updated<span id="ts">—</span>
  </div>
</header>

<div class="stats-bar">
  <div class="stat">
    <div class="stat-num" id="stat-news">—</div>
    <div class="stat-label">News</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="stat-pubs">—</div>
    <div class="stat-label">Publications</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="stat-trials">—</div>
    <div class="stat-label">Trials</div>
  </div>
  <div class="stat">
    <div class="stat-num green" id="stat-recruiting">—</div>
    <div class="stat-label">Recruiting Trials</div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('news', this)">News</button>
  <button class="tab" onclick="switchTab('trials', this)">Clinical Trials</button>
  <button class="tab" onclick="switchTab('publications', this)">Publications</button>
</div>

<main>

<!-- NEWS -->
<div id="panel-news" class="panel active">
  <div class="search-bar">
    <input type="text" id="search-news" placeholder="Search news..." oninput="filterNews()">
  </div>
  <div class="result-count" id="count-news"></div>
  <div class="card-grid" id="news-list"></div>
</div>

<!-- TRIALS -->
<div id="panel-trials" class="panel">
  <div class="filter-row" id="trial-filters"></div>
  <div class="search-bar">
    <input type="text" id="search-trials" placeholder="Search trials..." oninput="filterTrials()">
  </div>
  <div class="result-count" id="count-trials"></div>
  <div class="trial-grid" id="trials-list"></div>
</div>

<!-- PUBLICATIONS -->
<div id="panel-publications" class="panel">
  <div class="search-bar">
    <input type="text" id="search-pubs" placeholder="Search titles, authors, abstracts..." oninput="filterPubs()">
  </div>
  <div class="result-count" id="count-pubs"></div>
  <div class="card-grid" id="pubs-list"></div>
</div>

</main>

<script>
const DATA = {"publications": [{"id": "41841259", "title": "Simtuzumab Attenuates Loxl2-Mediated Extracellular Matrix Remodeling and Preserves Cardiac Function in ", "authors": "Kervella Marie, Behrens Charlotta S, Peccate Cécile, Guesmia Zoheir, Grandi Fiorella et al.", "journal": "Circulation. Heart failure", "pub_date": "2026-Mar", "abstract": "Dilated cardiomyopathy caused by  Here, we employed human induced pluripotent stem cells (hiPSCs) derived from a patient carrying a  We demonstrated that  Taken together, our findings underscore the crucial role of Loxl2 as a therapeutic target and suggest that its inhibition could be a promising strategy to preserve cardiac function in ", "url": "https://pubmed.ncbi.nlm.nih.gov/41841259/", "fetched_at": "2026-04-02T19:49:13.335244"}, {"id": "41830141", "title": "LMNA-p.Arg78Trp and MYH6-p.Val893Met Mutations Associated with Left Ventricular Noncompaction.", "authors": "Zhang Jing, Bu Xiang, Jiang Xin", "journal": "Combinatorial chemistry & high throughput screening", "pub_date": "2026-Mar", "abstract": "Left ventricular noncompaction (LVNC), an uncommon myocardial disorder, is pathologically defined by the presence of excessive trabecular meshwork and deep intertrabecular recesses within the ventricular chamber. Despite recognized genetic heterogeneity underlying LVNC pathogenesis, the molecular determinants remain incompletely elucidated. We recruited a multigenerational Chinese LVNC pedigree and systematically collected clinical data, comprehensive family histories, and peripheral blood samples from the proband and relatives for genetic investigation. The proband, diagnosed with LVNC by cardiac magnetic resonance, presented with classical morphological features of the disease and ultimately succumbed to sudden cardiac death. Next-generation sequencing identified compound heterozygous missense variants in the proband: LMNA(NM_001257374.1) c.232C>T (p.Arg78Trp) and MYH6(NM_002471.3) c.2677G>A (p.Val893Met). Segregation analysis of two asymptomatic younger family members - diagnosed with LVNC via cardiac magnetic resonance despite lacking obvious clinical symptoms - revealed heterozygosity for either LMNA c.232C>T (p.Arg78Trp) or the MYH6 c.2677G>A (p.Val893Met). Notably, mutation-negative relatives displayed neither clinical manifestations nor echocardiographic evidence of LVNC. These novel pathogenic variants have established the association between genotype and phenotype in familial LVNC, providing critical biomarkers for clinical genetic screening. Our findings have expanded the range of gene mutations associated with LVNC and further enhanced the understanding of the phenotypic characteristics of these mutations. Integrated genetic and cardiac magnetic resonance imaging analyses demonstrated that LMNA c.232C>T (p.Arg78Trp) and/or MYH6 c.2677G>A (p.Val893Met) variants were associated with LVNC.", "url": "https://pubmed.ncbi.nlm.nih.gov/41830141/", "fetched_at": "2026-04-02T19:49:13.335266"}, {"id": "41790128", "title": "Laminopathies: natural history and risk prediction of heart failure.", "authors": "Charron Philippe, Proukhnitzky Julie, Ben Yaou Rabah, Richard Pascale, Dembélé Mohamed et al.", "journal": "European heart journal", "pub_date": "2026-Mar", "abstract": "Patients with LMNA gene variants are at high risk for dilated cardiomyopathy and heart failure (HF), but no prediction model for severe HF events exists. This study aimed to describe the incidence of severe HF events and develop a prediction model in a large cohort of patients with adult-onset laminopathies. From a population of 660 patients enrolled in the French LMNA nationwide registry, 470 adults were included in the derivation cohort. An independent international validation cohort included 245 additional patients. Baseline characteristics at genetic testing were assessed and the cumulative incidence of the primary endpoint HF-major adverse cardiac events (HF-MACE) was calculated, defined as HF hospitalization, HF-related death, mechanical circulatory support, or heart transplantation. Predictors of HF-MACE were studied after excluding patients with left ventricular ejection fraction (LVEF) <30% at baseline using a Fine-Gray competing risk model, adjusted hazard ratio (aHR) with 95% confidence interval (CI), and Harrell's concordance (C-) index. A secondary composite endpoint, without hospitalization, was also studied. Among 470 patients of the derivation cohort, HF-MACE occurred in 65 over a median follow-up of 7.1 years (interquartile range: 3.4-12.1). Four independent predictors of HF-MACE were identified: male sex (aHR 1.86; 95% CI 1.060-3.290), LVEF <50% (aHR 2.18; 95% CI 1.080-4.400), missense variants in head and rod domains (aHR 2.91; 95% CI 1.110-7.630), and complete left bundle branch block (aHR 2.99; 95% CI 1.400-6.400). The C-index of the model was 0.750 (95% CI 0.720-0.780) in the derivation cohort and 0.758 (95% CI 0.720-0.800) in the validation cohort. The 5-year cumulative incidence of HF-MACE was 1.5% (95% CI 0.6-3.6), 5.0% (95% CI 1.8-8.2), and 22.0% (95% CI 15.6-28.4) among patients with 0, 1, and ≥2 risk factors, respectively. In patients with LVEF <30% at baseline, the 1-year incidence of HF-MACE was 50%, and those patients were excluded fro", "url": "https://pubmed.ncbi.nlm.nih.gov/41790128/", "fetched_at": "2026-04-02T19:49:13.335343"}, {"id": "41580472", "title": "An integrative approach to identify novel miRNA-mRNA interaction networks in LMNA-cardiomyopathy.", "authors": "Córdoba-Caballero José, Bonet Fernando, Campuzano Oscar, Sarquella-Brugada Georgia, Perez de Castro Ignacio et al.", "journal": "Scientific reports", "pub_date": "2026-Jan", "abstract": "Dilated cardiomyopathy caused by variants in the LMNA gene leads to malignant arrhythmogenic events, faster phenotype progression and high risk of sudden cardiac death. The pathophysiological mechanisms triggering disease progression remains poorly understood. We investigated the mRNA and miRNA transcriptome in the myocardial tissue of 50-week-old LMNA", "url": "https://pubmed.ncbi.nlm.nih.gov/41580472/", "fetched_at": "2026-04-02T19:49:13.335496"}, {"id": "41574032", "title": "Pathological classification of non-ischaemic dilated cardiomyopathy based on deep learning.", "authors": "Jia Hao, Wang Yifan, Lv Zhimin, Zhao Yiqi, Zhang Ningning et al.", "journal": "European heart journal. Digital health", "pub_date": "2026-Jan", "abstract": "Non-ischaemic dilated cardiomyopathy (NIDCM) is a major cause of heart failure (HF) and heart transplantation (HTx), characterized by heterogeneity in aetiology, clinical phenotype, and disease progression. Nevertheless, precision medicine-based diagnostics and treatment strategies for NIDCM remain lacking. This proof-of-concept study aimed to stratify NIDCM patients by pathological features and identify those at high-risk for malignant arrhythmia (MA) and rapid progression to end-stage HF. 293 NIDCM-HTx patients were included in this study. A total of 3516 heart tissue slides from six representative sites of each patient were analyzed using deep learning-based computational pathology (DL-CPath) and unsupervised clustering to identify pathological subgroups (PGs): PGA, PGB, and PGC. PGA was characterized by interstitial fibrosis, cardiomyocyte vacuolization, microvascular intimal hyperplasia, and myocyte disarray, and had the highest rates of MA ( DL-based pathological classification effectively extracted clinically-meaningful imaging features and enabled the identification of high-risk NIDCM subgroup. Each PG exhibited unique histopathological and clinical characteristics, highlighting distinct phenotypes and risk profiles.", "url": "https://pubmed.ncbi.nlm.nih.gov/41574032/", "fetched_at": "2026-04-02T19:49:13.335522"}, {"id": "41265985", "title": "Epigenetic Regulation in Dilated Cardiomyopathy.", "authors": "Liu Chia-Feng, Leon Steven, Tang W H Wilson", "journal": "Heart failure clinics", "pub_date": "2026-Jan", "abstract": "Dilated cardiomyopathy (DCM) is a nonischemic heart muscle disease characterized by impaired contractility, cardiac dilation, and heart failure, with both genetic and nongenetic causes. Emerging evidence highlights epigenetic mechanisms, including deoxyribonucleic acid methylation, histone modifications, chromatin remodeling, and noncoding RNAs, as critical regulators of gene expression in DCM pathogenesis. This article explores familial DCM linked to pathogenic variants in genes like lamin A/C and titin, as well as nongenetic forms such as diabetic and autoimmune DCM. By summarizing recent discoveries, it highlights the epigenetic factors in bridging genetic and environmental influences, offering potential biomarkers and therapeutic targets for improved DCM management.", "url": "https://pubmed.ncbi.nlm.nih.gov/41265985/", "fetched_at": "2026-04-02T19:49:13.335691"}, {"id": "41746849", "title": "Experience on genetic testing for primary dilated cardiomyopathy in a single Austrian genetic center and the role of myocardial inflammation.", "authors": "Manzanilla Romero Héctor Hugo, Steil Anja Savina, Santner Viktoria, Von der Heidt Andreas, Verheyen Nicolas et al.", "journal": "Cardiology", "pub_date": "2026-Feb", "abstract": "Molecular genetic testing is increasingly offered to patients with dilated cardiomyopathy (DCM). The diagnosis of an inherited cardiomyopathy has major implications for medical care of patients and relatives. We report the results of a genotype-phenotype analysis of DCM investigated in Austria. 194 patients with DCM underwent genetic testing over a period of 6 years. We analyzed the clinical and genetic characteristics of 105 DCM patients who showed a genetic variant, and compared the genetic findings and outcome measures of patients with inflammation on endomyocardial biopsy and those without. In 51.4% (54/105) patients at least one likely pathogenic or pathogenic genetic variant (LP/P) was detected. 51 of 105 patients (48.6%) showed only variants of unknown significance (VUS). Most LP/P variants (34,3%) were detected in the TTN gene. Clinical characteristics of the most prevalent genetic subgroups (TTN, LMNA, MYH7, MYH6, DMD, SCN5A) were not significantly different. DCM patients with inflammation had significantly higher frequency of memory of infection, left bundle branch block, mitral valve insufficiency, but normal CK-MB levels. We added a case report where two family members initially were considered to have an inflammatory cardiomyopathy before a pathogenic variant in LMNA was found. Cardiac features of DCM were not predictive of a specific genetic subgroup. We recommend applying multigene panels extensively, since a large proportion of patients without a family history or evidence of inflammation showed a genetic predisposition for DCM. However, the large number of VUS remains a challenge.", "url": "https://pubmed.ncbi.nlm.nih.gov/41746849/", "fetched_at": "2026-04-02T19:49:13.335365"}, {"id": "41688022", "title": "Attenuated lamin A-prohibitin2 interaction leads to mitochondrial dysfunction in LMNA 289 A>G-mediated dilated cardiomyopathy.", "authors": "Nath Subhradip, Prusty Debasish, Islam Sk Ramiz, Manna Soumen Kanti, Sengupta Kaushik et al.", "journal": "The Journal of biological chemistry", "pub_date": "2026-Feb", "abstract": "Lamins are critical in maintaining nuclear homeostasis, chromosome positioning, and modulating mechanotransduction. Recent studies indicated the involvement of lamin A in mitochondrial homeostasis and the regulation of superoxide. Missense mutations in LMNA are linked to a spectrum of diseases known as laminopathies, which include conditions, such as dilated cardiomyopathy (DCM), muscular dystrophy, and progeria. K97E is one such mutation, which leads to DCM with severe phenotypes. In this study, we established direct reduction of interaction between lamin A K97E and prohibitin 2. As a sequel, mitochondria exhibited reduced fusion, elevated fragmentation, and ATP deficiency. On the other hand, impaired RhoA/extracellular signal-regulated kinase/focal adhesion kinase signaling cascade disrupted filamentous actin assembly, thereby promoting actin-mitochondria association, further facilitating mitochondrial fission. This feedback loop led to mitochondrial depolarization, and global metabolic derangement, in particular, reduced glycolytic capacity and incomplete fatty acid oxidation accompanied by elevated superoxide levels. In cardiomyocytes, such dysfunction may be correlated with contractile defects and arrhythmias. Thus, our findings elucidated for the first time the pivotal role of lamin A in cellular bioenergetics and mechanotransduction, offering novel insights into DCM pathophysiology, which could open newer vistas for developing targeted therapeutic strategies.", "url": "https://pubmed.ncbi.nlm.nih.gov/41688022/", "fetched_at": "2026-04-02T19:49:13.335433"}, {"id": "41667453", "title": "Telomere shortening in laminopathic dilated cardiomyopathy.", "authors": "Chang Alex C Y, Pardon Gaspard, Chang Andrew C H, Wang Chenguang, Termglinchan Vittavat et al.", "journal": "NPJ Regenerative medicine", "pub_date": "2026-Feb", "abstract": "Laminopathies are a group of rare disease due to mutations in the LMNA gene, which is crucial for nuclear integrity and cellular rigidity. Depending on the mutation, the disease manifests in striated muscles, adipose tissues, nerves, and the heart. Although many laminopathic patients exhibit accelerated aging syndromes, the connection as to why loss of LMNA drives aging remains unknown. Herein, we present evidence that cardiomyocytes from laminopathic heart sections exhibit shortened telomeres. Patient derived hiPSC-CMs we observed LMNA mutation results in myocardial enlargement and altered contractility in cardiomyocytes. Further, laminopathic murine cardiomyocytes recapitulates telomere attrition phenotype.", "url": "https://pubmed.ncbi.nlm.nih.gov/41667453/", "fetched_at": "2026-04-02T19:49:13.335458"}, {"id": "41384904", "title": "Autosomal-Recessive LMNA Dilated Cardiomyopathy.", "authors": "Sterner Rosalie M, Coon Lea M, Black John L, Moyer Ann M, Maleszewski Joseph J et al.", "journal": "JACC. Case reports", "pub_date": "2026-Feb", "abstract": "Variants in the LMNA gene (which encodes intermediate filaments lamin A and lamin C) result in a variety of phenotypes that include overlapping features, such as progeroid syndromes, muscular dystrophies, peripheral neuropathies, lipodystrophies, and cardiac disease (including dilated cardiomyopathy and conduction disorders). We describe a case of primary biventricular, nonischemic dilated cardiomyopathy and no myopathic symptoms with a homozygous LMNA c.991C>T (p.Arg331Trp) likely pathogenic variant. The patient, a 39-year-old woman, presented with symptoms of dilated cardiomyopathy and has had ablation, medical management, and a pacemaker placed because of arrythmias. Most LMNA disorders are inherited in an autosomal-dominant fashion, with rare autosomal-recessive laminopathies mainly involving neuromuscular phenotypes. Laminopathies that have involved cardiomyopathies have all been reported to be autosomal dominant. To our knowledge, this is the first reported case of an autosomal-recessive laminopathy with primary dilated cardiomyopathy.", "url": "https://pubmed.ncbi.nlm.nih.gov/41384904/", "fetched_at": "2026-04-02T19:49:13.335540"}, {"id": "41379058", "title": "Truncating Titin and Lamin A/C Variants in Anthracycline-Induced Cardiomyopathy.", "authors": "Advani Pooja P, McPherson Alyssa D, Reddy Joseph S, Schneider Jay W, Baheti Saurabh et al.", "journal": "JACC. Advances", "pub_date": "2026-Feb", "abstract": "Anthracycline chemotherapy-related cardiomyopathy (CCM) is a serious adverse event that can occur several years after completion of therapy. Demographic and clinical risk factors have failed to predict which patients will experience CCM. Genetic variants may account for a significant proportion of interindividual variation and CCM. This study aimed to identify genetic variants in the known idiopathic cardiomyopathy genes that predispose patients to CCM. We developed a cardiotoxicity registry. Patients were (and continue to be) enrolled and consented for chart review and DNA sequencing. We sequenced whole exomes of the first 136 patients (anthracycline, n = 55; anti-HER2 [no anthracycline], n = 71; other chemotherapy, n = 10), primarily focusing on titin (TTN) truncating variants, known to be present in ∼25% of patients with primary dilated cardiomyopathy, and previously reported in 7.5% of patients with CCM, followed by exploration of rare nonsynonymous variants in 62 established genes for idiopathic cardiomyopathy. Eighteen of 55 patients treated with anthracycline experienced CCM. TTN truncating variants were identified in 2 of 18 (11%) CCM patients and absent in 37 patients who did not experience CCM. We identified a pathogenic variant in lamin A/C (p.Arg190Gln) in 1/18 (5.5%) patients and the same rare (p.Glu1127Gly) variant in ryanodine receptor 2 occurred in 2/18 (11%) of patients. We observed enrichment of rare missense variants in patients with anthracycline CCM compared to anti-HER2 therapy without anthracycline CCM (P < 0.00001). Three of 18 anthracycline CCM patients carried likely pathogenic variants in the most common causative genes for idiopathic dilated cardiomyopathy, TTN, and lamin A/C. Rare nonsynonymous variants in ryanodine receptor 2 and other idiopathic cardiomyopathy genes warrant further investigation.", "url": "https://pubmed.ncbi.nlm.nih.gov/41379058/", "fetched_at": "2026-04-02T19:49:13.335561"}, {"id": "41295940", "title": "Sex Differences in Dilated Cardiomyopathy: Evidence Gaps and Future Directions.", "authors": "Stroeks Sophie L V M, Oko-Osi Shanelle, Arasu Arianna, Hirst Jane E, Tayal Upasana Paz et al.", "journal": "Journal of the American College of Cardiology", "pub_date": "2026-Feb", "abstract": "Dilated cardiomyopathy (DCM), which affects 1 in 250 people, is a leading global cause of heart failure and the most common indication for heart transplantation. Evidence suggests that DCM is more prevalent in men, but whether this reflects biological differences or underdiagnosis in women remains uncertain. This review explores the impact of sex on DCM, examining differences in epidemiology, etiology, clinical presentation, treatment response, and outcomes. Women often present with less severe cardiac phenotypes, including lower levels of fibrosis and better left ventricular function, yet the long-term prognosis of DCM in women is less clear. Through a systematic review and meta-analysis, we found that male DCM patients with variants in PLN, DSP, and LMNA had higher arrhythmic event rates compared with TTNtv and BAG3 carriers. In female patients with DCM, those with RBM20, DSP, and PLN variants faced the highest arrhythmic risk, and TTNtv carriers the lowest. PLN and LMNA variants had the highest heart failure risk in both sexes, whereas BAG3, RBM20, and TTN variants had lower heart failure rates in female compared with male carriers. These findings highlight the influence of sex and genotype on clinical outcomes. Current risk-stratification tools, such as those used for implantable cardioverter-defibrillators, may undertreat women owing to reliance on sex-neutral thresholds. We highlight the role of genetic, environmental, and reproductive factors in shaping these disparities, including the influence of pregnancy, pregnancy complications, and menopause. This review identifies key gaps in knowledge and calls for expanded representation of women in DCM studies and the development of sex-specific risk models. Addressing these gaps is essential to improving outcomes and advancing equitable personalized care for all DCM patients.", "url": "https://pubmed.ncbi.nlm.nih.gov/41295940/", "fetched_at": "2026-04-02T19:49:13.335642"}, {"id": "41919383", "title": "Twenty-Five-Year Follow-Up of the MDDC1 Family: A ", "authors": "Capovilla Teresa Maria, Iseppi Manuela, Distaso Salvatore, Gigli Marta, Dal Ferro Matteo et al.", "journal": "Circulation. Genomic and precision medicine", "pub_date": "2026-Apr", "abstract": "", "url": "https://pubmed.ncbi.nlm.nih.gov/41919383/", "fetched_at": "2026-04-02T19:49:13.334912"}, {"id": "41797063", "title": "Generation of the human induced pluripotent stem cell (hiPSC) line AUMCi015-A from a heterozygous carrier of the LMNA p.Q493X rare pathogenic variant.", "authors": "de Vries Dylan K, van den Bout Anouk, de Haan Hugoline, Kouwenberg Janneke, Tijsen Anke J et al.", "journal": "Stem cell research", "pub_date": "2026-Apr", "abstract": "Dilated cardiomyopathy (DCM) caused by rare pathogenic variants in LMNA is a severe hereditary heart disease characterized by lethal arrythmias and progressive heart failure. Here, we describe a human induced pluripotent stem cell (hiPSC) line reprogrammed by non-integrative Sendai virus from dermal fibroblasts of a female DCM patient carrying the heterozygous LMNA p.Q493X rare pathogenic variant. The obtained hiPSCs have a normal karyotype, show high expression of pluripotency markers at the mRNA and protein level, and are able to differentiate into derivatives of all three germ layers. Therefore, this newly-generated hiPSC line enables modeling of DCM caused by rare pathogenic variants in LMNA.", "url": "https://pubmed.ncbi.nlm.nih.gov/41797063/", "fetched_at": "2026-04-02T19:49:13.335286"}, {"id": "41718518", "title": "Dilated Cardiomyopathy and Later Onset Limb-Girdle Muscular Dystrophy Associated With Fukutin and LaminA/C Mutations.", "authors": "Cardona Perez Alejandra, Moenning Renee, Bodkin Cynthia, Gutmann Laurie, Helm Benjamin M et al.", "journal": "JACC. Case reports", "pub_date": "2026-Apr", "abstract": "Nonischemic dilated cardiomyopathy (DCM) can result from pathogenic variants in genes affecting myocardial structure and function. FKTN and LMNA mutations may involve both cardiac and skeletal muscle, consistent with limb-girdle muscular dystrophy (LGMD), with cardiac disease sometimes preceding neuromuscular symptoms. We report on 2 adults presenting with advanced DCM requiring heart transplantation, who were later diagnosed with LGMD. A 22-year-old woman had biallelic FKTN variants, and a 37-year-old man carried a heterozygous LMNA pathogenic variant. Both had elevated creatine kinase prior to proximal muscle weakness. Muscle biopsy and genetic testing confirmed dystrophic processes. These cases demonstrate that genetically mediated DCM may initially present as isolated cardiac disease. Early genetic testing can guide transplant planning, long-term care, and family counseling.", "url": "https://pubmed.ncbi.nlm.nih.gov/41718518/", "fetched_at": "2026-04-02T19:49:13.335384"}, {"id": "41693767", "title": "Actigraphy-Quantified Physical Activity Measurements in Patients with Symptomatic ", "authors": "Garcia-Pavia Pablo, Cai Xuemei, Di Junrui, Li Huihua, Demanuele Charmaine et al.", "journal": "Digital biomarkers", "pub_date": "2026", "abstract": "Actigraphy-quantified physical activity (PA) allows for continuous measurements of PA that are reflective of real-world day-to-day functioning and morbidity in persons living with cardiomyopathy. This analysis reports the results of actigraphy monitoring and relates these to other clinical outcome assessments in the phase 3, multinational REALM-dilated cardiomyopathy (DCM) (NCT03439514) clinical trial in  Between 2020 and 2022, REALM-DCM randomized 37 patients with actigraphy worn on the nondominant wrist continuously to monitor daily PA. Of those, 35 participants had analyzable data for this analysis. The median duration of actigraphy monitoring for all participants was 293 days across 120 patient visits. Over 85% of the visits met a predefined threshold of wear-time compliance of 10 h of awake wear time for at least 4 days within the 2-week monitoring period prior to and after clinic visits. Kansas City Cardiomyopathy Questionnaire (KCCQ) physical limitation scores were positively associated with several actigraphy-quantified PA metrics, including moderate-to-vigorous physical activity (MVPA), moderate activity, non-sedentary behavior, total step counts, total activity counts (all 3 axes and their vector magnitude). Six-minute walk time distance was positively associated with time spent in MVPA and moderate activity, and total step counts. Patient Global Impression (PGI) Symptom Heart Failure Severity was negatively associated with non-sedentary behavior, total activity counts (vector magnitude, X- and Y-axes), and light activity. Actigraphy endpoints also distinguished between NYHA class II and class III patients. Actigraphy endpoints did not correlate with the KCCQ total score. This is the largest and most longitudinal dataset of  This study looked at how physical activity levels in patients with a specific type of heart disease, called ", "url": "https://pubmed.ncbi.nlm.nih.gov/41693767/", "fetched_at": "2026-04-02T19:49:13.335404"}, {"id": "40918212", "title": "Smartwatch bradycardia alarms leading to a diagnosis of lamin A/C cardiomyopathy: a case report.", "authors": "Rushakoff Joshua A, Flores Rosario Karen, Grover Phoenix, Wang Andrew", "journal": "European heart journal. Case reports", "pub_date": "2025-Sep", "abstract": "Genetic aetiologies of early-onset arrhythmias and cardiomyopathy (CM) are common, but timely diagnosis requires a high index of suspicion. An asymptomatic 47-year-old man presented to cardiology clinic for smartwatch low-rate alarms. His brother had exertional syncope and died in his 20s from heart failure. Transthoracic echocardiogram showed reduced left ventricular ejection fraction (35%). A Holter monitor showed third-degree atrioventricular block and frequent pauses (longest 4.9 s). He was admitted to the hospital and following a cardiac magnetic resonance imaging with late gadolinium enhancement a cardiac resynchronization therapy-defibrillator was placed. Genetic testing identified a pathogenic variant in the lamins protein A and C (LMNA) gene. Left ventricular dysfunction with or without arrhythmias should raise concern for familial CM and warrants further evaluation. Lamin A/C cardiomyopathy is the second most prevalent cause of familial dilated CM and is notable for an indolent course with conduction disturbances that frequently precede left ventricular dysfunction. Smartwatch alarms can potentially help with the early identification of patients with risk factors for familial CM before the development of overt symptoms.", "url": "https://pubmed.ncbi.nlm.nih.gov/40918212/", "fetched_at": "2026-04-02T19:49:13.335849"}, {"id": "40792443", "title": "Genetic architecture of dilated cardiomyopathy in Poland: variant distribution, clinical characteristics, and prognosis.", "authors": "Chmielewski Przemysław, Truszkowska Grażyna, Kostrzewa Grażyna, Michalak Ewa, Stawiński Piotr et al.", "journal": "Polish archives of internal medicine", "pub_date": "2025-Sep", "abstract": "Genetic variants are the leading cause of dilated cardiomyopathy (DCM). Data on genetic testing in DCM from Central European populations are scarce. We sought to determine the genetic architecture of DCM in Poland and to assess its influence on patient clinical characteristics and prognosis. The study included 280 DCM patients (mean [SD] age, 39 [13] y; 68% men) who underwent next‑generation sequencing or in whom disease‑causing variants were identified using single‑gene testing. DCM‑related variants were identified in 46% of the patients. Variants in titin (TTN) and lamin A/C (LMNA) genes were the most frequent (18% and 8% of the study cohort, respectively). Other genes with variant frequency equal to or above 2% included desmoplakin (DSP), myosin heavy chain 7 (MYH7), sodium voltage‑gated channel α subunit 5 (SCN5A), filamin C (FLNC), BCL2‑associated athanogene 3 (BAG3), and dystrophin (DMD). Positive family history, atrioventricular block, or atrial arrhythmias were found more often in the causative variant carriers, whereas the frequency of left bundle branch block or hypertension was lower. Severe DCM and a composite end point (cardiovascular death, heart transplantation, left ventricular assist device implantation) occurred with similar frequency in gene‑negative DCM and TTN‑related DCM, whereas the prognosis was worse in the remaining variant carriers. The risks of severe DCM and the composite end point were 2.4- and 3‑fold higher, respectively, for LMNA‑related DCM and 2.3- and 2‑fold higher for variants in the other genes. The distribution of causative genetic variants in Polish DCM patients is similar to that in Western European cohorts. The presence of the causative variants in the genes other than TTN is associated with a poorer prognosis.", "url": "https://pubmed.ncbi.nlm.nih.gov/40792443/", "fetched_at": "2026-04-02T19:49:13.335945"}, {"id": "41166658", "title": "Clustered Regularly Interspaced Short Palindromic Repeats Genome Editing for Cardiovascular Disease: The Future Is Here.", "authors": "Sami Nabeel, Parikh Manish A, Frishman William H, Peterson Stephen J", "journal": "Cardiology in review", "pub_date": "2025-Oct", "abstract": "Clustered regularly interspaced short palindromic repeats (CRISPR)-based genome editing has expanded from experimental biology to early clinical application, raising the possibility of durable therapies for cardiovascular disease. Because many cardiac conditions are monogenic, they provide clear targets for allele-specific correction or modulation. In hypertrophic cardiomyopathy, preclinical research has shown that base editing of pathogenic MYH7 and MYBPC3 mutations can restore sarcomere function; concurrently, RNA-targeting approaches selectively suppress mutant transcripts. Dilated cardiomyopathy is more heterogeneous: TTN truncations cause haploinsufficiency that can be offset by CRISPR activation, while RBM20 and LMNA mutations require precise correction or interference to restore splicing and nuclear stability. Genome editing is also being tested in familial hypercholesterolemia, where inactivation of PCSK9 using lipid nanoparticle-delivered base editors has now advanced to first-in-human trials, achieving sustained LDL-C lowering. Concurrently, efforts targeting ANGPTL3 and APOB highlight the prospect of multigene modulation of lipid metabolism. In arrhythmic syndromes, patient-derived cardiomyocytes edited at SCN5A and KCNQ1 genes have enabled high-fidelity disease models, while in vivo correction of RYR2 in catecholaminergic polymorphic ventricular tachycardia confirms the viability of editing an arrhythmia substrate. In cardiac regeneration, CRISPR activation of developmental transcription factors has enabled direct reprogramming of fibroblasts into cardiomyocyte-like cells within scar tissue. Even with these advances, delivery remains a bottleneck due to immune responses to viral vectors, limitations in the efficiency of lipid nanoparticles in the heart, and the precision required to target cardiomyocytes or conduction cells, all of which slow progress. Future work will depend as much on technical refinement as on navigating ethical, regulatory, and socie", "url": "https://pubmed.ncbi.nlm.nih.gov/41166658/", "fetched_at": "2026-04-02T19:49:13.335732"}, {"id": "41082656", "title": "Precise gene editing of pathogenic Lamin A mutations corrects cardiac disease.", "authors": "Caravia Xurde M, Hayashi Brian, Li Hui, Gan Peiheng, Alzhanov Damir et al.", "journal": "Proceedings of the National Academy of Sciences of the United States of America", "pub_date": "2025-Oct", "abstract": "Mutations in the Lamin A (", "url": "https://pubmed.ncbi.nlm.nih.gov/41082656/", "fetched_at": "2026-04-02T19:49:13.335755"}, {"id": "41025522", "title": "Atypical clinical features in a young boy with LMNA mutation: expanding the spectrum of laminopathies.", "authors": "Cantarutti Nicoletta, Casarini Maria C, Drago Fabrizio", "journal": "Cardiology in the young", "pub_date": "2025-Oct", "abstract": "Laminopathies represent a group of inherited disorders, with emerging novel and atypical manifestations. We present the case of a 17-year-old boy with LMNA mutation, showing dilated cardiomyopathy, aortic root dilatation, pontine cavernous angiomas, sensorineural hearing loss, and osteogenic sarcoma. These findings expand the known phenotypic spectrum of laminopathies and highlight the need for multidisciplinary evaluation from a young age.", "url": "https://pubmed.ncbi.nlm.nih.gov/41025522/", "fetched_at": "2026-04-02T19:49:13.335770"}, {"id": "40848704", "title": "Disease Penetrance in Genotype-Positive But Clinically Unaffected Relatives From Families With Dilated Cardiomyopathy.", "authors": "Cannie Douglas E, Bakalakos Athanasios, Syrris Petros, Protonotarios Alexandros, Lorenzini Massimiliano et al.", "journal": "JACC. Heart failure", "pub_date": "2025-Oct", "abstract": "Serial clinical assessment of genotype-positive relatives from families with dilated cardiomyopathy (DCM) is recommended, but there are limited data to guide screening intervals. This study sought to understand the influence of age, sex, and genotype on disease expression. Families with a DCM phenotype and a likely pathogenic or pathogenic variant in DCM-related genes were identified. Consecutive genotype-positive relatives who were clinically unaffected at baseline assessment were retrospectively recruited. The incidence rates of disease penetrance during follow-up observation were stratified by age, sex, and genotype. A primary composite endpoint of heart failure and malignant ventricular arrhythmia was evaluated. A total of 130 relatives (59 male [45%], median age: 31.4 years [Q1-Q3: 25.1-47.6 years]) from 74 families were included. The incidence rate of phenotype development during 80 months of follow-up was 11.6 per 100 person-years (Q1-Q3: 9.0-14.3 per 100 person-years). A phenotype developed in more men than women (16.1 vs 8.9 per 100 person-years, respectively; log-rank P value = 0.007). LMNA variant carriers had the highest incidence rate of disease penetrance at 17.7 per 100 person-years (Q1-Q3: 9.8-25.7 per 100 person-years). Baseline LVEF was strongly associated with disease penetrance. Four relatives (3.1%) had the primary composite endpoint; 3 (9.4%) relatives with an implantable cardiac defibrillator received an appropriate shock. Rates of disease penetrance are high in genotype-positive relatives and particularly high in men and LMNA variant carriers. Baseline LVEF is strongly associated with disease penetrance. These findings emphasize the importance of regular evaluation of this cohort and underline the potential for tailored screening intervals.", "url": "https://pubmed.ncbi.nlm.nih.gov/40848704/", "fetched_at": "2026-04-02T19:49:13.335905"}, {"id": "41290254", "title": "Rare clinical convergence: pulmonary sarcoidosis with dilated cardiomyopathy and central myopathy.", "authors": "Kan Alan, Lara Beatriz, Arun Tarunya, Banerjee Prithwish", "journal": "BMJ case reports", "pub_date": "2025-Nov", "abstract": "A female in her early 40s with a history of acute decompensated congestive heart failure was admitted following a farming accident and received a contrast-enhanced CT trauma scan of the whole body which subsequently revealed extensive lung fibrosis, cavitations, granulomas and hilar lymphadenopathy. Subsequent whole body 18F-fluorodeoxyglucose positron emission tomography-computed tomography (FDG PET-CT) showed no evidence of metabolic activity within the myocardium or skeletal muscles, excluding cardiac sarcoidosis and inflammatory cardiac disease, but extensive pulmonary metabolic activity consistent with pulmonary sarcoidosis. Cardiac MRI ventricular volume studies excluded inflammatory, infiltrative or ischaemic pathology; however, genetic testing identified the LMNA A/C gene mutation. She had also exhibited truncal, proximal and axial muscle weakness following her original admission. In this report, we present the rare and challenging coexistence of pulmonary sarcoidosis and LMNA-related dilated cardiomyopathy with laminopathy-associated proximal myopathy and describe the challenges with overlapping multisystem diseases.", "url": "https://pubmed.ncbi.nlm.nih.gov/41290254/", "fetched_at": "2026-04-02T19:49:13.335658"}, {"id": "41287366", "title": "Identification and Validation of Novel Lactylation-Related Gene Signature in Dilated Cardiomyopathy.", "authors": "Liu Jia, Liu Chong, Yu Jingjia, Xu Kai", "journal": "Archiv der Pharmazie", "pub_date": "2025-Nov", "abstract": "Dilated cardiomyopathy (DCM) is a progressive myocardial disorder with limited therapeutic options. Recent studies suggest that metabolic reprogramming, including lactate accumulation and protein lactylation, contributes to heart failure pathogenesis, but their roles in DCM remain poorly defined. We analyzed the global burden of cardiomyopathy and myocarditis using GBD data and performed transcriptomic profiling using GSE120895 and GSE5406 datasets. Weighted gene co-expression network analysis (WGCNA), differential gene expression, and known lactylation-related genes (LRGs) were integrated to identify key targets. LASSO regression was applied to construct a diagnostic model. Validation was conducted in an Lmna", "url": "https://pubmed.ncbi.nlm.nih.gov/41287366/", "fetched_at": "2026-04-02T19:49:13.335677"}, {"id": "40296583", "title": "Integrated role of cardiac magnetic resonance and genetics in predicting left ventricular reverse remodelling in dilated and non-dilated cardiomyopathy.", "authors": "Setti Martina, Iseppi Manuela, Verdonschot Job A J, Rizzi Jacopo G, Paldino Alessia et al.", "journal": "European journal of heart failure", "pub_date": "2025-Nov", "abstract": "Left ventricular reverse remodelling (LVRR) is a prognostic marker in patients with dilated (DCM) and non-dilated left ventricular cardiomyopathy (NDLVC). The utility of combining late gadolinium enhancement (LGE) and genetic testing in predicting LVRR in DCM/NDLVC remains a knowledge gap. This study aimed to assess an integrated approach including LGE data and genetics to predict LVRR in DCM/NDLVC patients. This multicentre observational study included DCM/NDLVC patients with: (i) baseline echocardiographic left ventricular ejection fraction (LVEF) <50%; (ii) genetic testing; (iii) baseline cardiac magnetic resonance (CMR); (iv) 12-month follow-up echocardiographic data. LVRR was defined as LVEF increase ≥10% or LVEF ≥50% (if baseline LVEF <45%) at 12 months. Outcome measures were: (i) all-cause mortality, heart transplant, or left ventricular assist device implantation (D/HT/LVAD); (ii) sudden cardiac death or major ventricular arrhythmias (SCD/MVA). Arrhythmogenic genes studied were LMNA, DSP, FLNC, and RBM20. Among 1757 DCM/NDLVC with genetic data, 616 met eligibility (462 DCM, 154 NDLVC; age 51 ± 14 years, 34% female). LVRR occurred in 314 patients (51%): 251 (54%) in DCM and 63 (41%) in NDLVC (p = 0.004). Independent predictors of LVRR within 1 year included titin truncating variants, absence of arrhythmogenic genes, and absence of LGE ring-like pattern. In patients with LVEF <35%, only the presence of LGE ring-like pattern and arrhythmogenic genes remained independently related to a lower rate of LVRR and increased SCD/MVA risk. In a large genetically and CMR characterized DCM/NDLVC cohort, arrhythmogenic genotypes and LGE ring-like pattern were inversely related to LVRR, particularly in patients with LVEF <35%.", "url": "https://pubmed.ncbi.nlm.nih.gov/40296583/", "fetched_at": "2026-04-02T19:49:13.336117"}, {"id": "39998502", "title": "Cardiac phenotypes in LMNA mutations.", "authors": "Rouhi Leila", "journal": "Current opinion in cardiology", "pub_date": "2025-May", "abstract": "This review highlights the diverse cardiac manifestations of LMNA mutations, focusing on their underlying molecular mechanisms and clinical implications. As LMNA mutations are implicated in cardiomyopathies, such as dilated cardiomyopathy (DCM), arrhythmogenic cardiomyopathy (ARVC), and conduction system diseases, understanding these phenotypes is critical for advancing diagnosis and management strategies. Recent studies reveal that LMNA mutations disrupt nuclear envelope stability, activating the DNA damage response (DDR) and compromising chromatin organization and mechanotransduction. Mouse models have elucidated pathways linking LMNA dysfunction to fibrosis, arrhythmias, and myocardial remodeling. Emerging evidence demonstrates that fibroblasts play a crucial role in cardiac phenotypes. Advances in genetic screening have also underscored the importance of early identification and risk stratification, particularly for arrhythmias and sudden cardiac death. The diverse spectrum of LMNA-related cardiac phenotypes, from isolated conduction defects to severe DCM and ARVC, underscores the necessity of personalized care strategies. Bridging insights from molecular studies and clinical research paves the way for targeted therapies to slow disease progression and improve patient outcomes. Future efforts should prioritize translational research on molecular mechanisms with potential in mouse models, alongside a deeper exploration of genotype-phenotype correlations, to refine and implement effective therapeutic interventions.", "url": "https://pubmed.ncbi.nlm.nih.gov/39998502/", "fetched_at": "2026-04-02T19:49:13.336280"}, {"id": "40225500", "title": "Lamin AC Cardiomyopathy, the Next Masquerader: Laminopathy Mimicking Cardiac Sarcoidosis.", "authors": "Bashir Hanad, Palmer Cassady, Reddy Abhimanyu, Mazur Wojciech, OBrien Thomas et al.", "journal": "Cureus", "pub_date": "2025-Mar", "abstract": "Phenotypic expression of lamin AC-dilated cardiomyopathy (LMNA-DCM) and cardiac sarcoidosis (CS) at times presents with similar clinical findings, including arrhythmia, conduction abnormalities, and heart failure. Lamin AC-dilated cardiomyopathy is one of the most common causes of genetic DCM with an autosomal dominant inheritance pattern. Contrastingly, a smaller proportion of sarcoid cases present with isolated cardiac involvement, highlighting the intricate nature of this systemic disease. This paper presents three cases highlighting potential pitfalls in the clinical diagnosis and management of laminopathies. Also highlighted is the need for extreme caution when endomyocardial biopsies are equivocal and there is sole reliance on cardiac imaging to establish diagnostic criteria. In addition, this case series highlights the imperative role of genetic testing during the initial workup for establishing the accurate etiology in the setting of cardiomyopathy. The strikingly similar clinical characteristics of LMNA-DCM and CS underscore the necessity for a robust diagnostic approach, including early integration of genetic testing, as this approach holds great promise for improving outcomes and the quality of life for those grappling with these challenging cardiac conditions. Innovative strategies, including comprehensive advanced imaging protocols and precision medicine, promise to advance our comprehension and management of both disease entities.", "url": "https://pubmed.ncbi.nlm.nih.gov/40225500/", "fetched_at": "2026-04-02T19:49:13.336157"}, {"id": "40557388", "title": "Refractory ventricular tachycardias associated with LMNA-related dilated cardiomyopathy successfully eliminated by open-chest mapping and cryoablation during LVAD implantation.", "authors": "Itonaga Jumpei, Takase Susumu, Fujino Takeo, Matsunaga Shogo, Sakamoto Kazuo et al.", "journal": "HeartRhythm case reports", "pub_date": "2025-Jun", "abstract": "", "url": "https://pubmed.ncbi.nlm.nih.gov/40557388/", "fetched_at": "2026-04-02T19:49:13.336017"}, {"id": "40372342", "title": "The Cardiovascular Magnetic Resonance Phenotype of Lamin Heart Disease.", "authors": "Topriceanu Constantin-Cristian, Al-Farih Mashael, Joy George, Chan Fiona, Webber Matt et al.", "journal": "JACC. Cardiovascular imaging", "pub_date": "2025-Jun", "abstract": "Lamin (LMNA) heart disease is a lethal form of dilated cardiomyopathy (DCM). The authors explored its cardiovascular magnetic resonance (CMR) phenotype to discover prognostically useful and subclinical biomarkers. This prospective multicenter study recruited 4 groups: LMNA carriers with left ventricular ejection fraction ≥55% (Lamin+EF), LMNA carriers with left ventricular ejection fraction <50% (Lamin-EF), individuals with DCM with wild-type LMNA (DCMwt), and healthy volunteers. Phantom-calibrated CMR comprising cines, late gadolinium enhancement, and multiparametric mapping was undertaken. Left ventricular shapes were reconstructed using generalized Procrustes analysis. Serum biomarkers were collected at the time of CMR. Using a major adverse cardiovascular events (MACE) outcome of cardiovascular death, life-threatening ventricular tachyarrhythmia, heart transplantation, or atrioventricular block requiring pacing, we explored the prognostic value of CMR metrics using Cox regression. A total of 187 individuals were recruited (50% male): 29 with Lamin+EF (38 ± 14 years), 38 with Lamin-EF (45 ± 17 years), 73 with DCMwt (45 ± 15 years), and 47 healthy volunteers (44 ± 20 years). Compared to HVs, Lamin+EF had longer phantom-normalized T The CMR phenotype of LMNA carriers with preserved left ventricular systolic function consists of longer T", "url": "https://pubmed.ncbi.nlm.nih.gov/40372342/", "fetched_at": "2026-04-02T19:49:13.336063"}, {"id": "40065010", "title": "EMD missense variant causes X-linked isolated dilated cardiomyopathy with myocardial emerin deficiency.", "authors": "Bulmer Linda, Ljungman Charlotta, Hallin Johan, Dahlberg Pia, Polte Christian L et al.", "journal": "European journal of human genetics : EJHG", "pub_date": "2025-Jun", "abstract": "Pathogenic variants in the EMD gene cause X-linked Emery-Dreifuss muscular dystrophy type 1 (EDMD1), typically presenting with joint contractures and skeletal muscle atrophy, followed by atrial arrhythmias, cardiac conduction defects, and atrial dilatation. Although an association with isolated dilated cardiomyopathy (DCM) has been suggested, evidence is currently insufficient to verify the gene-disease association. We investigated the causality of a missense variant, c.23C>G, p.Ser8Trp, in EMD in a large family with a history of DCM and suspected sudden cardiac death (SCD) in males. DCM was diagnosed in six hemizygous males aged 36-50 and detailed phenotyping identified end-stage heart failure, cardiac conduction defects, and ventricular arrhythmias as prominent features. Cardiac magnetic resonance imaging showed late gadolinium enhancement with mixed ischemic and non-ischemic patterns. Muscular dystrophy was absent in all six males, of whom five underwent neuromuscular examination including serum-creatine kinase measurement. Immunohistochemical analysis showed greatly reduced levels of emerin in both cardiac and skeletal muscle samples. The EMD variant c.23C>G co-segregated with DCM, with an estimated LOD score of 3.9 and full-likelihood Bayes factor of >2500:1 in favor of causality. Among the 17 heterozygous females, ages 20-87, one developed DCM at age 72. We concluded that the EMD c.23C>G missense variant is associated with DCM in the absence of muscular dystrophy, thereby providing new evidence of isolated DCM as a distinct cardiac EMD-phenotype, separate from EDMD1. The phenotypic similarities with LMNA-DCM, with a high risk of cardiac conduction defects and ventricular arrhythmias, might warrant early interventions to prevent SCD.", "url": "https://pubmed.ncbi.nlm.nih.gov/40065010/", "fetched_at": "2026-04-02T19:49:13.336253"}, {"id": "40794869", "title": "Liquid-liquid phase separation of lamin drives altered chromatin organization in cardiomyopathic mutations of lamin A.", "authors": "Nath Subhradip, Dutta Shuvadip, Sarkar Shreyasi Dey, Sengupta Duhita, Mitra Mithun K et al.", "journal": "Nucleic acids research", "pub_date": "2025-Jul", "abstract": "Lamins are intermediate filaments constituting the nuclear lamina which maintains the structural integrity of the nucleus and play a key role in the spatiotemporal genome organization. Mutations in lamin A/C have been associated with a plethora of diseases including dilated cardiomyopathy. In this study, we focused on lamin A mutants E161K and K97E which are widely reported in patients afflicted with dilated cardiomyopathy. We established that these mutations cause large scale disruption of the peripheral lamina and consequent heterochromatin (HC) organization, along with the formation of lamin A aggregates inside the nucleoplasm. Using coarse-grained polymer simulations, we explored the interplay between lamin, nuclear membrane, and chromatin showing that disruptions in these interactions can reproduce the experimental phenotypes. Simulations also predict altered positioning depending on HC content and altered lamin dynamics in E161K and K97E mutants. The predictions from the simulations were verified using 3D FISH to delineate the reorganization of chromosome territories in these mutants. Based on the disengagement of lamin A foci from HC, we subsequently investigated the dynamic properties of the mutant aggregates using advanced imaging techniques. Through this, we report that mutant lamin aggregates show internal rearrangement and external exchange at the mesoscopic-level reminiscent of liquid-liquid phase separation.", "url": "https://pubmed.ncbi.nlm.nih.gov/40794869/", "fetched_at": "2026-04-02T19:49:13.335923"}, {"id": "40610603", "title": "Clinical and metabolic consequences of a historic pathogenic lamin A/C founder variant.", "authors": "Wong L Y, Torfs T, Vanherle S J V, Janssen J, Claes G R F et al.", "journal": "Scientific reports", "pub_date": "2025-Jul", "abstract": "A novel LMNA p.(Glu105Leu) variant was identified in five families with dilated cardiomyopathy (DCM), revealed as a local founder variant originating approximately 650 years ago. Genetic testing and clinical analysis of 795 DCM patients demonstrated that probands with this variant typically present with severe DCM in their sixties, characterized by high prevalence of late gadolinium enhancement, arrhythmias, and conduction disorders. Time-to-event analysis suggested a later onset of clinical symptoms compared to other LMNA variants, with a trend towards longer event-free survival. Microscopic imaging of patient fibroblasts, induced pluripotent stem cell-derived cardiomyocytes (iPSC-CMs), and heart tissue confirmed structural nuclear LMNA-associated abnormalities. Patient iPSC-CMs exhibited distinct sarcomeric disorganization, increased glucose uptake and glycogen content, reduced mitochondrial function and biogenesis, and delayed contractile function. These findings support the pathogenicity of the variant and demonstrate its profound impact on structural and metabolic functions in cardiomyocytes.", "url": "https://pubmed.ncbi.nlm.nih.gov/40610603/", "fetched_at": "2026-04-02T19:49:13.336000"}, {"id": "39941414", "title": "", "authors": "Lorca Rebeca, Alén Alberto, Salgado María, Misiego-Margareto Rosario, Dolado-Cuello Javier et al.", "journal": "Journal of clinical medicine", "pub_date": "2025-Jan", "abstract": "", "url": "https://pubmed.ncbi.nlm.nih.gov/39941414/", "fetched_at": "2026-04-02T19:49:13.336305"}, {"id": "39869235", "title": "Contemporary Insights into LMNA Cardiomyopathy.", "authors": "Balakrishnan Iswaree D, Lakdawala Neal K", "journal": "Current cardiology reports", "pub_date": "2025-Jan", "abstract": "This review aims to explore how a diagnosis of LMNA-related cardiomyopathy (LMNA-CM) informs clinical management, focusing on the prevention and management of its complications, through practical clinical strategies. Longitudinal studies have enhanced our understanding of the natural history of LMNA-CM including its arrhythmic and non-arrhythmic complications. A LMNA specific ventricular arrhythmia risk prediction strategy has been integrated into clinical practice guidelines. Although less robust, observational studies are shaping gene-specific strategies for mitigating other complications including atrioventricular block, atrial fibrillation and cardiomyopathy, while novel therapies have been evaluated in clinical trials. LMNA-CM follows an aggressive yet generally stereotyped course. Early recognition of anticipated complications allows for more effective prevention and management in both symptomatic and asymptomatic patients.", "url": "https://pubmed.ncbi.nlm.nih.gov/39869235/", "fetched_at": "2026-04-02T19:49:13.336405"}, {"id": "40237734", "title": "[New pathogenic mutation in LMNA gene: Clinical case of familial cardiomyopathy].", "authors": "Kashtanova S Y, Rimskaya E М, Meshkov A N, Mironova N А, Dzhumaniiazova I K et al.", "journal": "Terapevticheskii arkhiv", "pub_date": "2025-Feb", "abstract": "We present a clinical case of familial  Представлено описание клинического случая семейной ассоциированной с мутацией в гене ", "url": "https://pubmed.ncbi.nlm.nih.gov/40237734/", "fetched_at": "2026-04-02T19:49:13.336140"}, {"id": "40130092", "title": "The Future of Clustered Regularly Interspaced Short Palindromic Repeats (CRISPR)-Cas9 Gene Therapy in Cardiomyopathies: A Review of Its Therapeutic Potential and Emerging Applications.", "authors": "Moradi Ali, Khoshniyat Sina, Nzeako Tochukwu, Khazeei Tabari Mohammad Amin, Olanisa Olawale O et al.", "journal": "Cureus", "pub_date": "2025-Feb", "abstract": "Cardiomyopathies, among the leading causes of heart failure and sudden cardiac death, are often driven by genetic mutations affecting the heart's structural proteins. Despite significant advancements in understanding the genetic basis of hypertrophic cardiomyopathy (HCM), dilated cardiomyopathy (DCM), and arrhythmogenic right ventricular cardiomyopathy (ARVC), effective long-term therapies remain limited. The advent of clustered regularly interspaced short palindromic repeats (CRISPR) and CRISPR-associated protein 9 (Cas9) gene editing offers a promising therapeutic strategy to address these genetic disorders at their root. CRISPR-Cas9 enables precise modification of pathogenic variants (PVs) in genes encoding sarcomeric and desmosomal proteins, which are frequently implicated in cardiomyopathies. By inducing site-specific double-stranded breaks in DNA, followed by repair through nonhomologous end joining (NHEJ) or homology-directed repair (HDR), this system allows for targeted correction of mutations. In preclinical models, CRISPR-Cas9 has shown promise in correcting HCM-associated mutations in β-myosin heavy chain 7 (MYH7), preventing disease phenotypes such as ventricular hypertrophy and myocardial fibrosis. Similarly, gene editing has successfully rectified DCM-linked mutations in Titin (TTN) and LMNA, resulting in improved heart function and reduced pathological remodeling. For ARVC, CRISPR-Cas9 has demonstrated the ability to repair mutations in desmosomal genes such as plakophilin 2 (PKP2), thereby restoring normal cardiac function and cellular adhesion. Despite these successes, challenges remain, including mosaicism, delivery efficiency, and off-target effects. Nevertheless, CRISPR-Cas9 represents a transformative approach to treating genetic cardiomyopathies, potentially offering long-lasting cures by directly addressing their underlying genetic causes.", "url": "https://pubmed.ncbi.nlm.nih.gov/40130092/", "fetched_at": "2026-04-02T19:49:13.336226"}, {"id": "39895490", "title": "Systematic Review, Meta-Analysis, and Population Study to Determine the Biologic Sex Ratio in Dilated Cardiomyopathy.", "authors": "Bergan Natalie, Prachee Ishika, Curran Lara, McGurk Kathryn A, Lu Chang et al.", "journal": "Circulation", "pub_date": "2025-Feb", "abstract": "Dilated cardiomyopathy (DCM) appears to be diagnosed twice as often in male than in female patients. This could be attributed to underdiagnosis in female patients or sex differences in susceptibility. Up to 30% of cases have an autosomal dominant monogenic cause, where equal sex prevalence would be expected. The aim of this systematic review, meta-analysis, and population study was to assess the sex ratio in patients with DCM, stratified by genetic status, and evaluate whether this is influenced by diagnostic bias. A literature search identified DCM patient cohorts with discernible sex ratios. Exclusion criteria were studies with a small (n<100), pediatric, or peripartum population. Meta-analysis and metaregression compared the proportion of female participants for an overall DCM cohort and the following subtypes: all genetic DCM, individual selected DCM genes ( A total of 99 studies, with 37 525 participants, were included. The overall DCM cohort had a 0.30 female proportion (95% CI, 0.28-0.32), corresponding to a male:female ratio (M:F) of 2.38:1. This was similar to patients with an identified DCM variant (0.31 [95% CI, 0.26-0.36]; M:F 2.22:1;  This study demonstrates that DCM is twice as prevalent in male patients. This was partially mitigated by implementing sex-specific DCM diagnostic criteria. The persistent male excess in genotype-positive patients with an equally prevalent genetic risk suggests additional genetic or environmental drivers for sex-biased penetrance. URL: https://www.crd.york.ac.uk/prospero; Unique identifier: CRD42023451944.", "url": "https://pubmed.ncbi.nlm.nih.gov/39895490/", "fetched_at": "2026-04-02T19:49:13.336360"}, {"id": "41321620", "title": "Phenotype specific nuclear lamina remodeling in hiPSC derived cardiomyocytes bearing ", "authors": "Coscarella Isabella Leite, Usman Olalekan H, Wang Lili, Landim-Vieira Maicon, Wirstiuk Lillian et al.", "journal": "iScience", "pub_date": "2025-Dec", "abstract": "Cardiomyocytes endure physical stress from the myocardium environment while generating their own mechanical strains. The force generated by sarcomeres is transmitted both longitudinally to adjacent sarcomeres and laterally to the cytoskeleton via intermediate filaments. This mechanical stimulus impacts other organelles, including the nucleus, thus playing a vital role in sensing and signaling nuclear adaptations. However, there is limited understanding of how changes in cardiac contractility affect nuclear mechanics. Here, we sought to investigate the effects of hyper- and hypo-contractility in nuclei of human induced pluripotent stem cell-derived cardiomyocytes (hiPSC-CMs) bearing ", "url": "https://pubmed.ncbi.nlm.nih.gov/41321620/", "fetched_at": "2026-04-02T19:49:13.335613"}, {"id": "41210585", "title": "Prime editing corrects the dilated cardiomyopathy causing RBM20-P633L-mutation in human cardiomyocytes.", "authors": "Roman Alexandra, Zimmer Anja, Gotthardt Michael, Steinmetz Lars M, Kühn Ralf et al.", "journal": "Molecular therapy. Nucleic acids", "pub_date": "2025-Dec", "abstract": "Prime editing (PE) is an innovative next-generation gene editing tool that has therapeutic potential in post-mitotic organs, such as the human heart. However, its applicability and efficiency in non-proliferating cells, e.g., human cardiomyocytes, is not yet established. Here, we apply PE directly in cardiomyocytes differentiated from human induced pluripotent stem cells (hi-CMs) carrying dilated-cardiomyopathy-causing mutations. A target array (TA) containing the mutations LMNA", "url": "https://pubmed.ncbi.nlm.nih.gov/41210585/", "fetched_at": "2026-04-02T19:49:13.335715"}, {"id": "40938777", "title": "Impact of genotype-phenotype associations on prognosis in dilated cardiomyopathy.", "authors": "Stroeks Sophie L V M, Wang Ping, Merlo Marco, Muller Steven, Paldino Alessia et al.", "journal": "European journal of heart failure", "pub_date": "2025-Dec", "abstract": "Dilated cardiomyopathy (DCM) has a monogenic aetiology in up to 40% of patients. Understanding the spectrum of genotype-phenotype associations in DCM is crucial for risk stratification and personalized treatment. We aimed to (i) characterize genotype-specific features, (ii) evaluate whether phenotype-based clustering reflects underlying genotype, and (iii) compare the prognostic value of genotype- versus phenotype-based approaches. A multicentre cohort of 534 DCM patients with a (likely) pathogenic variant were grouped by genotype (genotype-first approach) and clustered by clinical phenotype (phenotype-first approach). We compared clinical characteristics, identified genotype-phenotype associations, and evaluated outcomes, including all-cause mortality, heart failure hospitalization, heart transplantation, and malignant ventricular arrhythmias. Using the genotype-first approach, significant genotype-phenotype associations were found for 10 genes. FLNC, LMNA, DSP, and PLN variants were linked to arrhythmias. BAG3, TNNT2, DMD, and TTN were associated with increased cardiac volumes and decreased left ventricular ejection fraction (LVEF). Clustering identified four phenotypic clusters: (1) young, moderately reduced LVEF; (2) arrhythmias, moderate reduced LVEF; (3) low LVEF; (4) arrhythmias, low LVEF. There were no clear correlations between phenotypic clusters and genotype. The genotype-first approach showed that LMNA, FLNC, and BAG3 variants had the highest risk for heart failure and arrhythmogenic adverse outcomes. The phenotype-first approach indicated that clusters 3 and 4 were associated with the worst prognosis. Overall, genotype was the strongest predictor of outcome. Patients with a genetic form of DCM exhibit clinical and genetic heterogeneity. Genotype-based risk stratification is more accurate compared to a phenotype-first approach, highlighting the importance of broad genetic screening among patients with DCM. Additionally, gene-specific risk prediction shou", "url": "https://pubmed.ncbi.nlm.nih.gov/40938777/", "fetched_at": "2026-04-02T19:49:13.335830"}, {"id": "40878535", "title": "Arrhythmic genotypes in dilated cardiomyopathy and risk of advanced heart failure.", "authors": "Mora-Ayestarán Nerea, Ochoa Juan Pablo, Gómez-González Cristina, Navarro-Peñalver Marina, Gallego-Delgado María et al.", "journal": "European heart journal", "pub_date": "2025-Dec", "abstract": "Certain genetic forms of dilated cardiomyopathy (DCM) entail a higher arrhythmic risk. It is unknown whether DCM patients with high-risk arrhythmic genotypes also develop more advanced heart failure (AHF) complications. AHF events were studied according to DCM genotype. Clinical data from 1203 genotyped DCM patients were collected from 19 Spanish centres. Patients were classified into high-risk arrhythmic genotypes (LMNA, FLNC, desmosomal genes, PLN, TMEM43, RBM20), TTN, other genes, and genotype negative (Gen-). The primary endpoint was a composite of AHF events (ventricular assist device implantation, heart transplant, and AHF-related mortality). The secondary endpoint was a combination of malignant ventricular arrhythmias (MVA). A DCM-causing variant was identified in a high-risk arrhythmic gene in 185 patients (15.4%), 193 (16.0%) had variants in TTN, 134 (11.1%) in other genes, and 691 (57.4%) were Gen-. After a median follow-up of 5.7 years (interquartile range 2.9-9.1 years), AHF events occurred in 45 (24.3%) patients in the high-risk arrhythmic group, while in 25 (18.7%), 25 (13.0%), and 70 (10.1%) patients with other genotypes, TTN, and Gen-, respectively (hazard ratio 1.85, 95% confidence interval 1.31-2.61 for high-risk arrhythmic genes compared with other groups). MVA occurred in 55 patients (29.7%) (hazard ratio 2.52, 95% confidence interval 1.81-3.51 for high-risk genotypes vs other groups). High-risk arrhythmic genotype was the main independent predictor of AHF in multivariate analysis. High-risk arrhythmic genotype and late gadolinium enhancement were independent predictors of MVA. Patients with high-risk arrhythmic genotypes also experience more AHF events, supporting a differential therapeutic approach in this group of patients beyond sudden death prevention.", "url": "https://pubmed.ncbi.nlm.nih.gov/40878535/", "fetched_at": "2026-04-02T19:49:13.335885"}, {"id": "39894135", "title": "Extensive cardiac involvement in laminopathies diagnosed in pediatric-aged patients: A single-center study.", "authors": "Hayes Emily A, Foreman Kaitlyn, Wright Lydia K, Gajarski Robert J, Hor Kan et al.", "journal": "Heart rhythm", "pub_date": "2025-Dec", "abstract": "Pathogenic variations in lamin A/C (LMNA) result in a group of inherited conditions termed laminopathies. Cardiac manifestations of laminopathies include atrial and ventricular arrhythmias, atrioventricular conduction disorders, and cardiomyopathy, with or without skeletal muscle involvement. Because of rarity and previous cardiac characterization as adult onset, pediatric data are limited. This study sought to investigate the natural history of cardiac disease in pediatric patients with pathogenic LMNA variants. We identified patients ≤18 years with genetically confirmed pathogenic variants in LMNA observed at a single center between 2003 and 2024. Clinical phenotypes along with cardiac test results were retrospectively catalogued. We identified 12 patients with pathogenic LMNA variant with a median age of 4.9 years at diagnosis (interquartile range, 3.7-10.7 years). Of the 12 patients, 9 (75%) were male and 10 (83%) had skeletal muscle involvement. Cardiac manifestations developed in 9 patients (75%) during a median follow-up of 9.5 years (interquartile range, 7.0-13.3 years). Nine patients (75%) had conduction abnormalities or arrhythmias (atrioventricular block, ventricular/atrial tachycardias), and 4 (33%) had cardiovascular implantable electronic devices placed. Two (17%) patients were diagnosed with cardiomyopathy, 1 (8%) requiring heart transplant. Two (17%) patients died during the study. Cardiac involvement, specifically cardiomyopathy and progressive conduction system abnormalities, were common in pediatric patients with pathogenic LMNA variants. Early genetic diagnosis of laminopathies with frequent surveillance for arrhythmias and cardiac dysfunction is necessary for more timely initiation of advanced therapies to prevent adverse events. More comprehensive phenotype-genotype correlation is strongly needed to better understand early cardiac manifestations in laminopathies.", "url": "https://pubmed.ncbi.nlm.nih.gov/39894135/", "fetched_at": "2026-04-02T19:49:13.336378"}, {"id": "40940734", "title": "Profibrotic Molecules Are Reduced in CRISPR-Edited Emery-Dreifuss Muscular Dystrophy Fibroblasts.", "authors": "Cattin Eleonora, Schena Elisa, Mattioli Elisabetta, Marcuzzo Stefania, Bonanno Silvia et al.", "journal": "Cells", "pub_date": "2025-Aug", "abstract": "Emery-Dreifuss muscular dystrophy (EDMD) is caused by mutations in ", "url": "https://pubmed.ncbi.nlm.nih.gov/40940734/", "fetched_at": "2026-04-02T19:49:13.335801"}, {"id": "40689545", "title": "Variant-Specific Late Gadolinium Enhancement Patterns Influence Clinical Outcomes in ", "authors": "Castrichini Matteo, Garmany Ramin, Siontis Konstantinos C, Collins Jeremy D, Bois John P et al.", "journal": "Journal of the American Heart Association", "pub_date": "2025-Aug", "abstract": "Disease-causative variants in  Retrospective analysis of 822 genotype-positive patients with arrhythmogenic/dilated cardiomyopathy was used to identify those with disease-causative variants in  Among the 72/116 (62%)  ", "url": "https://pubmed.ncbi.nlm.nih.gov/40689545/", "fetched_at": "2026-04-02T19:49:13.335970"}, {"id": "40509996", "title": "Plasma Proteomics Reveals Dysregulated Pathways Across the Spectrum ", "authors": "Tahir Usman A, Reichart Daniel, Purohit Anisha, Barber Jacob L, Tiwari Gaurav et al.", "journal": "Circulation. Genomic and precision medicine", "pub_date": "2025-Aug", "abstract": "Pathogenic variants in the  To identify proteins and biological pathways associated with likely pathogenic/pathogenic  We identified several novel proteins associated with  Proteomic profiling in individuals with likely pathogenic/pathogenic ", "url": "https://pubmed.ncbi.nlm.nih.gov/40509996/", "fetched_at": "2026-04-02T19:49:13.336041"}, {"id": "40155570", "title": "Dilated cardiomyopathy: from genes and molecules to potential treatments.", "authors": "Wang Xiumei, Lang Zekun, Yan Zeyi, Xu Jing, Zhang Jinyuan et al.", "journal": "Molecular and cellular biochemistry", "pub_date": "2025-Aug", "abstract": "Dilated cardiomyopathy is a myocardial condition marked by the enlargement of the heart's ventricular chambers and the gradual decline in systolic function, frequently resulting in congestive heart failure. Dilated cardiomyopathy has obvious familial characteristics, and mutations in related pathogenic genes can account for about 50% of patients with dilated cardiomyopathy. The most common genes related to dilated cardiomyopathy include TTN, LMNA, MYH7, etc. With more and more research on these genes, it will undoubtedly provide more potential targets and therapeutic pathways for the treatment of dilated cardiomyopathy. In addition, myocardial inflammation, myocardial metabolism abnormalities and cardiomyocyte apoptosis all have an important impact on the pathogenesis of dilated cardiomyopathy. Approximately half of sudden deaths among children and adolescents, along with the majority of patients undergoing heart transplantation, stem from cardiomyopathy. Therefore, precise and prompt clinical diagnosis holds paramount importance. Currently, diagnosis primarily hinges on the patient's medical background and imaging tests, with the significance of genetic testing steadily gaining prominence. The primary treatment for dilated cardiomyopathy remains heart transplantation. However, the scarcity of donors and the risk of severe immune rejection underscore the pressing need for novel therapies. Presently, research is actively exploring preclinical treatments like stem cell therap
