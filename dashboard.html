y as potential solutions.", "url": "https://pubmed.ncbi.nlm.nih.gov/40155570/", "fetched_at": "2026-04-02T19:49:13.336201"}, {"id": "40191636", "title": "A case report of non-lamin A/C dilated cardiomyopathy presenting in a patient with Najjar-Malouf syndrome.", "authors": "Flury Gian, Arquint Flurina", "journal": "European heart journal. Case reports", "pub_date": "2025-Apr", "abstract": "Phenotyping and genotyping of cardiomyopathies are becoming increasingly important. We describe a rare form of syndromic dilated cardiomyopathy, years after the initial diagnosis of intellectual disability and hypergonadotropic hypogonadism, known as Najjar-Malouf syndrome or cardiogenital syndrome. A 45-year-old woman was referred for inpatient treatment because of progressive dyspnoea, chest tightness, and ankle oedema. She had a diagnosis of undefined psychomotor development delay and hypergonadotropic hypogonadism, for which she has been receiving hormone substitution treatment since she was 19 years old. The physical examination revealed signs of congestion as well as a right convex thoracic scoliosis and hyperkyphosis. Cardiac biomarkers were elevated, and echocardiography showed severe dilated cardiomyopathy with impaired systolic function, severe pulmonary hypertension, and secondary mitral regurgitation. Cardiac magnetic resonance imaging showed a severely dilated left ventricle with severely reduced left ventricular ejection fraction (20%), thinned myocardium, and late-gadolinium enhancement predominantly in the septum. Genetic screening for dilatative cardiomyopathy-associated genes revealed no mutations, in particular, no mutation of the lamin A/C (LMNA) gene. The patient progressed to heart failure with severely reduced ejection fraction 26 years after diagnosis of psychomotor development delay and hypergonadotropic hypogonadism. The triad of intellectual disability, hypergonadotropic hypogonadism, and cardiomyopathy enabled the diagnosis of Najjar-Malouf syndrome, also known as cardiogenital syndrome. This case underscores the diagnostic and therapeutic challenges of Najjar-Malouf syndrome, emphasizing the significance of thorough evaluation and genetic testing, particularly considering the association with LMNA mutations. Further research is needed to improve understanding and management strategies for this rare syndrome.", "url": "https://pubmed.ncbi.nlm.nih.gov/40191636/", "fetched_at": "2026-04-02T19:49:13.336173"}, {"id": "39923945", "title": "Domain-specific association of single-nucleotide variants in the LMNA gene with the phenotypic expression of dilated cardiomyopathy.", "authors": "Zhuo Wen, Jiang Zhenhong, Xun Mengwei, Lin Mouwen, Zhou Qiongqiong et al.", "journal": "International journal of cardiology", "pub_date": "2025-Apr", "abstract": "LMNA gene variants cause a spectrum of phenotypes referred to as laminopathies. However, the topological distribution of the LMNA variants and their phenotypic effects have not been delineated. We investigated the associations of variants located at different LMNA domains with clinical phenotypes in dilated cardiomyopathy (DCM) patients. All reported single-nucleotide variants (SNVs) in LMNA were obtained from the ClinVar, HGMD and PubMed databases. The associated phenotypes were collected from PubMed. The pathogenicity of the variants was determined according to the 2015 ACMG/AMP criteria. 236 DCM-related pathogenic/likely pathogenic (P/LP) nonsynonymous SNVs (nsSNVs) were enriched at the intermediate filament (IF) Rod region. Left ventricular ejection fraction was lower in DCM patients carrying P/LP nsSNVs at the Coil 1B and Tail regions than at those with P/LP variants at the Coil 2 region. Similarly, atrioventricular block and pacemaker implantation-related P/LP nsSNVs were enriched at the IF rod region; ventricular tachycardia/fibrillation and implantable cardiac defibrillator implantation-related P/LP nsSNVs were enriched at the Tail domain. Representative mutations in IF Rod and Tail region were selected for mechanism investigation. The ryanodine receptor (RYR2) and membrane Cav1.2 protein expression was significantly increased with variants in Tail region (C1621T and C1718T) compared with variants in IF Rod region (G497C and A575G) and WT group. LMNA P/LP nsSNVs were found to be enriched in the IF rod domain, and a domain-dependent association of the variants with the phenotypic features of DCM was identified. These findings are provisional and, upon replication in independent studies, might be useful in genotype-phenotype correlation studies in DCM caused by LMNA mutations.", "url": "https://pubmed.ncbi.nlm.nih.gov/39923945/", "fetched_at": "2026-04-02T19:49:13.336323"}, {"id": "41357091", "title": "Severe cardiac valvular calcification in two Chinese brothers with mandibuloacral dysplasia type A: a case report.", "authors": "Guo Yi, Zhang Xinyi, Meng Yanfei, Guo Qiuzhe, Wang Xiaoqi et al.", "journal": "Frontiers in cardiovascular medicine", "pub_date": "2025", "abstract": "Mandibuloacral dysplasia type A (MADA) is a rare progeroid syndrome associated with mutations in the Lamin A/C (LMNA) gene, primarily affecting skeletal, cutaneous, and adipose tissues. While certain LMNA gene mutations are known to cause cardiomyopathy and conduction system disease, severe early-onset calcific valvular heart disease is not conventionally considered a typical feature of MADA. This report describes two brothers from a consanguineous Han Chinese family who presented with classical MADA phenotypes alongside severe, early-onset cardiac valvular calcification. Genetic investigation revealed that both affected brothers carried a homozygous missense mutation, c.785A > G (p.Glu262Gly), in the LMNA gene. The elder brother, aged 41, successfully underwent transcatheter aortic valve implantation (TAVI) due to severe aortic valve stenosis. This finding represents the first association, to our knowledge, between the homozygous LMNA c.785A > G (p.Glu262Gly) mutation and significant severe early-onset cardiac valvular calcification manifesting as a prominent feature within the MADA phenotype, thus expanding the clinical spectrum associated with MADA and this specific LMNA variant. This case highlights a potentially underrecognized cardiovascular manifestation in MADA patients and underscores the importance of comprehensive cardiac assessment in affected individuals, particularly those from consanguineous families.", "url": "https://pubmed.ncbi.nlm.nih.gov/41357091/", "fetched_at": "2026-04-02T19:49:13.335582"}, {"id": "40364824", "title": "Similar burden of rare genetic variants in ischemic and non-ischemic dilated cardiomyopathy.", "authors": "Cao Louie, Rushakoff Joshua, Williamson Ian, Karlstaedt Anja, Kittleson Michelle et al.", "journal": "Frontiers in cardiovascular medicine", "pub_date": "2025", "abstract": "The aim of the study was to determine the prevalence of rare disease-causing variants in cardiomyopathy-associated genes in a cohort of patients with ischemic and non-ischemic dilated cardiomyopathy undergoing heart transplant. We conducted a single-center cohort study of 60 adult patients with left ventricular ejection fraction ≤50% and left ventricular end-diastolic dimension ≥95th percentile for sex/height who underwent heart transplant between January 2017 and December 2023 and consented to participate in a cardiac tissue biobank. We evaluated the prevalence of rare (minor allele frequency <0.1%) disease-causing (pathogenic or likely pathogenic by American College of Genetics and Genomics criteria) variants in cardiomyopathy-associated genes. A total of 60 individuals fulfilled the inclusion criteria: 16 with ischemic dilated cardiomyopathy [88% men, median age 65 years, interquartile range (IQR) 64-68 years] and 44 with non-ischemic dilated cardiomyopathy (80% men, median age 53 years, IQR 39-65 years). We found that the prevalence of disease-causing variants was similar between patients with ischemic dilated cardiomyopathy (3/16 or 19%; 95% credible interval 6%-36%) and those with non-ischemic dilated cardiomyopathy (10/44 or 23%; 95% credible interval 12%-33%). Variants in the ischemic dilated cardiomyopathy group were found in the  Patients with ischemic dilated cardiomyopathy undergoing heart transplant possessed a similar burden of rare disease-causing variants as those with non-ischemic dilated cardiomyopathy. Our results suggest that genetic testing may be beneficial in patients with advanced heart failure requiring heart transplant due to ischemic dilated cardiomyopathy to detect disease-causing variants in cardiomyopathy-associated genes.", "url": "https://pubmed.ncbi.nlm.nih.gov/40364824/", "fetched_at": "2026-04-02T19:49:13.336085"}], "trials": [{"nct_id": "NCT05394506", "title": "Modifying Factors in Striated Muscle Laminopathies", "status": "RECRUITING", "phase": "NA", "conditions": "Laminopathies, Emery Dreifuss Muscular Dystrophy 2, LMNA-Related Congenital Muscular Dystrophy, Dilated Cardiomyopathy-1A", "interventions": ", ", "start_date": "2022-09-08", "primary_end": "2027-09-30", "locations": "", "url": "https://clinicaltrials.gov/study/NCT05394506", "fetched_at": "2026-04-02T18:00:26.888786"}, {"nct_id": "NCT03860454", "title": "The Deep Phenotype of Lamin A/C Cardiomyopathy", "status": "UNKNOWN", "phase": "", "conditions": "Lamin A/C Gene Mutation, Dilated Cardiomyopathy, Familial", "interventions": "", "start_date": "2019-03-07", "primary_end": "2025-02-01", "locations": "", "url": "https://clinicaltrials.gov/study/NCT03860454", "fetched_at": "2026-04-02T18:00:26.888558"}, {"nct_id": "NCT03439514", "title": "A Study of ARRY-371797 (PF-07265803) in Patients With Symptomatic Dilated Cardiomyopathy Due to a Lamin A/C Gene Mutation", "status": "TERMINATED", "phase": "PHASE3", "conditions": "Dilated Cardiomyopathy, Lamin A/C Gene Mutation", "interventions": ", ", "start_date": "2018-04-17", "primary_end": "2022-10-13", "locations": "", "url": "https:/ // ── Stats ─────────────────────────────────────────────────────────────────
document.getElementById("ts").textContent = DATA.stats.last_updated;
document.getElementById("stat-pubs").textContent = DATA.stats.total_pubs;
document.getElementById("stat-trials").textContent = DATA.stats.total_trials;
document.getElementById("stat-recruiting").textContent = DATA.stats.recruiting;
document.getElementById("stat-news").textContent = DATA.stats.total_news;

// ── Tabs ──────────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById("panel-" + name).classList.add("active");
  btn.classList.add("active");
}

// ── Publications ──────────────────────────────────────────────────────────
let pubFilter = "";
function filterPubs() {
  pubFilter = document.getElementById("search-pubs").value.toLowerCase();
  renderPubs();
}

function renderPubs() {
  const filtered = DATA.publications.filter(p =>
    (p.title || "").toLowerCase().includes(pubFilter) ||
    (p.authors || "").toLowerCase().includes(pubFilter) ||
    (p.abstract || "").toLowerCase().includes(pubFilter) ||
    (p.journal || "").toLowerCase().includes(pubFilter)
  );
  document.getElementById("count-pubs").textContent =
    `Showing ${filtered.length} of ${DATA.publications.length} publications`;
  const el = document.getElementById("pubs-list");
  if (!filtered.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🔬</div>No results found.</div>';
    return;
  }
  el.innerHTML = filtered.map(p => `
    <div class="card">
      <div class="card-header">
        <div class="card-title"><a href="${p.url}" target="_blank">${p.title || "—"}</a></div>
        <div class="card-date">${p.pub_date || ""}</div>
      </div>
      <div class="card-meta">
        <strong>${p.journal || "—"}</strong>${p.authors ? " · " + p.authors : ""}
      </div>
      ${p.abstract ? `
        <div class="abstract" id="abs-${p.id}">${p.abstract}</div>
        <span class="toggle-abstract" onclick="toggleAbs('${p.id}', this)">▸ show abstract</span>
      ` : ""}
    </div>
  `).join("");
}

function toggleAbs(id, el) {
  const abs = document.getElementById("abs-" + id);
  abs.classList.toggle("open");
  el.textContent = abs.classList.contains("open") ? "▾ hide abstract" : "▸ show abstract";
}

// ── Trials ────────────────────────────────────────────────────────────────
let trialStatusFilter = "ALL";
let trialSearch = "";

function badgeClass(status) {
  if (!status) return "badge-other";
  const s = status.toUpperCase();
  if (s.includes("RECRUIT")) return "badge-recruiting";
  if (s.includes("ACTIVE") || s.includes("ENROLLING")) return "badge-active";
  if (s.includes("COMPLET")) return "badge-completed";
  return "badge-other";
}

function buildTrialFilters() {
  const statuses = [...new Set(DATA.trials.map(t => t.status).filter(Boolean))];
  const el = document.getElementById("trial-filters");
  el.innerHTML = `<button class="filter-btn active" onclick="setTrialFilter('ALL', this)">All</button>` +
    statuses.map(s => `<button class="filter-btn" onclick="setTrialFilter('${s}', this)">${s.replace(/_/g,' ')}</button>`).join("");
}

function setTrialFilter(status, btn) {
  trialStatusFilter = status;
  document.querySelectorAll("#trial-filters .filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderTrials();
}

function filterTrials() {
  trialSearch = document.getElementById("search-trials").value.toLowerCase();
  renderTrials();
}

function renderTrials() {
  const filtered = DATA.trials.filter(t => {
    const matchStatus = trialStatusFilter === "ALL" || t.status === trialStatusFilter;
    const matchSearch = !trialSearch ||
      (t.title || "").toLowerCase().includes(trialSearch) ||
      (t.conditions || "").toLowerCase().includes(trialSearch) ||
      (t.interventions || "").toLowerCase().includes(trialSearch);
    return matchStatus && matchSearch;
  });
  document.getElementById("count-trials").textContent =
    `Showing ${filtered.length} of ${DATA.trials.length} trials`;
  const el = document.getElementById("trials-list");
  if (!filtered.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🧪</div>No trials found.</div>';
    return;
  }
  el.innerHTML = filtered.map(t => `
    <div class="trial-card">
      <div class="trial-header">
        <div class="trial-title"><a href="${t.url}" target="_blank">${t.title || "—"}</a></div>
        <span class="badge ${badgeClass(t.status)}">${(t.status || "—").replace(/_/g," ")}</span>
      </div>
      <div class="trial-meta">
        <span><strong>${t.nct_id}</strong></span>
        ${t.phase ? `<span>Phase: <strong>${t.phase}</strong></span>` : ""}
        ${t.start_date ? `<span>Start: <strong>${t.start_date}</strong></span>` : ""}
        ${t.primary_end ? `<span>End: <strong>${t.primary_end}</strong></span>` : ""}
        ${t.locations ? `<span>📍 ${t.locations}</span>` : ""}
        ${t.interventions ? `<span>💊 ${t.interventions}</span>` : ""}
      </div>
    </div>
  `).join("");
}

// ── News ──────────────────────────────────────────────────────────────────
let newsFilter = "";
function filterNews() {
  newsFilter = document.getElementById("search-news").value.toLowerCase();
  renderNews();
}
function renderNews() {
  const filtered = DATA.news.filter(n =>
    (n.title || "").toLowerCase().includes(newsFilter) ||
    (n.source || "").toLowerCase().includes(newsFilter) ||
    (n.summary || "").toLowerCase().includes(newsFilter)
  );
  document.getElementById("count-news").textContent =
    `Showing ${filtered.length} of ${DATA.news.length} news items`;
  const el = document.getElementById("news-list");
  if (!filtered.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📰</div>No news found.</div>';
    return;
  }
  el.innerHTML = filtered.map(n => `
    <div class="card">
      <div class="card-header">
        <div class="card-title"><a href="${n.url}" target="_blank">${n.title || "—"}</a></div>
        <div class="card-date">${(n.pub_date || "").substring(0, 16)}</div>
      </div>
      <div class="card-meta"><strong>${n.source || "—"}</strong></div>
      ${n.summary ? `<div style="color:#9aa39b;font-size:12px;line-height:1.7">${n.summary}</div>` : ""}
    </div>
  `).join("");
}

// ── Init ──────────────────────────────────────────────────────────────────
renderPubs();
buildTrialFilters();
renderTrials();
renderNews();
</script>
</body>
</html>
